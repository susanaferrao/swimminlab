// Gera o card de "Dados técnicos" — campos capturados automaticamente pelo
// vídeo (distâncias e tempos de breakout/entrada) que não aparecem no
// formulário manual mas são relevantes para consulta e verificação.
function renderDadosTecnicos(an, m, mPB, labelSerie1, labelSerie2) {
  const db = an.dadosBrutos || {};
  const dbPB = mPB ? (mPB.partida ? null : null) : null; // acedemos via an2 se necessário
  function val(id) { const v = db[id]; return (v !== undefined && v !== null && v !== '') ? parseFloat(v) : null; }
  function fmtM(v) { return v !== null ? fmtNum(v, 2, ' m') : '—'; }
  function fmtS(v) { return v !== null ? fmtNum(v, 2, ' s') : '—'; }

  let html = '<div class="rep-card"><div class="rep-card-title">Dados técnicos</div>' +
    '<div class="rep-card-desc">Valores capturados automaticamente pelo vídeo</div>';

  // Partida
  const dEntrada = val('distancia_entrada_m') || val('distancia_entrada_maos_m');
  const dBreakout = val('distancia_breakout_m');
  const tEntrada = val('tempo_entrada_maos_s');
  const tBreakout = val('tempo_breakout_s');

  if (dEntrada !== null || dBreakout !== null) {
    html += '<div class="rep-row"><div class="rep-row-label">Partida — distância de entrada</div><div class="rep-row-value">' + fmtM(dEntrada) + '</div></div>';
    html += '<div class="rep-row"><div class="rep-row-label">Partida — distância de breakout</div><div class="rep-row-value">' + fmtM(dBreakout) + '</div></div>';
  }

  // Viragens
  m.porViragem.forEach(function(v) {
    const dist = val('saida_dist_' + v.emMetros);
    const tBreak = val('tb_saida_' + v.emMetros);
    if (dist !== null || tBreak !== null) {
      html += '<div class="rep-row"><div class="rep-row-label">Viragem ' + v.emMetros + 'm — distância de breakout</div><div class="rep-row-value">' + fmtM(dist) + '</div></div>';
      html += '<div class="rep-row"><div class="rep-row-label">Viragem ' + v.emMetros + 'm — tempo do breakout</div><div class="rep-row-value">' + fmtS(tBreak) + '</div></div>';
    }
  });

  html += '</div>';
  return html;
}

function renderRepRow(label, v1, v2, fmt, maiorMelhor, label1, label2) {
  const COL1 = '#0096c7', COL2 = '#f4762a';

  // linha simples (sem comparação): formato anterior
  if (v2 === undefined || v2 === null) {
    return '<div class="rep-row"><div class="rep-row-label">' + escapeHtml(label) + '</div>' +
      '<div class="rep-row-value">' + (v1 !== null && v1 !== undefined ? fmt(v1) : '—') + '</div></div>';
  }

  function seta(a, b) {
    if (a === null || a === undefined || b === null || b === undefined) return '<span class="serie-arrow eq">—</span>';
    const eps = 0.001;
    const aMelhor = maiorMelhor ? (a > b + eps) : (a < b - eps);
    const bMelhor = maiorMelhor ? (b > a + eps) : (b < a - eps);
    if (aMelhor) return '<span class="serie-arrow up">↑</span>';
    if (bMelhor) return '<span class="serie-arrow down">↓</span>';
    return '<span class="serie-arrow eq">=</span>';
  }

  return '<div class="rep-row"><div class="rep-row-label">' + escapeHtml(label) + '</div>' +
    '<div class="rep-row-values">' +
    '<div class="rep-row-serie">' +
      '<div class="serie-dot" style="background:' + COL1 + '"></div>' +
      '<div class="serie-val">' + (v1 !== null && v1 !== undefined ? fmt(v1) : '—') + '</div>' +
      seta(v1, v2) +
    '</div>' +
    '<div class="rep-row-serie">' +
      '<div class="serie-dot" style="background:' + COL2 + '"></div>' +
      '<div class="serie-val">' + (v2 !== null && v2 !== undefined ? fmt(v2) : '—') + '</div>' +
      seta(v2, v1) +
    '</div>' +
    '</div></div>';
}

function renderGraficos(an, m, mPB, labelSerie1, labelSerie2) {
  // defaults para o relatório normal (1 análise vs PB)
  labelSerie1 = labelSerie1 || 'Atual';
  labelSerie2 = labelSerie2 || 'Melhor registo';
  const é50p50 = an.distancia === 50 && (an.tamanhoPiscina || 50) === 50;
  const é200p50 = an.distancia === 200 && (an.tamanhoPiscina || 50) === 50 && an.estilo !== 'ESTILOS';
  const tempoTotalStr = m.tempoTotal ? " · Total: " + fmtTempo(m.tempoTotal) : "";
  const tempoTotalPBStr = (mPB && mPB.tempoTotal) ? fmtTempo(mPB.tempoTotal) : "";
  let html = '';

  // --- Velocidade, Frequência, Distância/ciclo por troço ---
  if (!é50p50) html += chartCard('chart_vel', 'Velocidade de nado', 'm/s por troço de piscina limpa');
  if (!é50p50) {
    html += chartCard('chart_freq', 'Frequência de braçada', 'ciclos por minuto, por troço');
    html += chartCard('chart_dpc', 'Distância por ciclo', 'metros por ciclo, por troço');
  }

  if (m.porViragem.length) {
    html += chartCard('chart_viragem', 'Tempo de viragem', 'da marca −5m ao breakout +15m (aproximação + saída), por viragem');
    html += chartCard('chart_saida', 'Breakout de viragem', 'distância de breakout (m) após cada viragem');

    // Card de percurso subaquático pós-viragem: distância, tempo e velocidade
    // por cada viragem — categoria separada da partida como solicitado.
    if (m.porViragem.some(function(v) { return v.velSubaquatico !== null; })) {
      html += '<div class="rep-card"><div class="rep-card-title">Percurso subaquático pós-viragem</div>' +
        '<div class="rep-card-desc">Velocidade, distância e tempo do breakout após cada viragem</div>' +
        renderRepRowHeader(labelSerie1, mPB ? labelSerie2 : null);
      m.porViragem.forEach(function (v, i) {
        if (v.velSubaquatico === null && v.distSaida === null) return;
        const vPB = mPB ? mPB.porViragem[i] : null;
        const prefixo = 'Viragem ' + v.emMetros + 'm — ';
        html += renderRepRow(prefixo + 'Distância', v.distSaida, vPB ? vPB.distSaida : undefined, function(x) { return fmtNum(x, 2, ' m'); }, true, labelSerie1, labelSerie2);
        html += renderRepRow(prefixo + 'Tempo subaquático', v.tempoSubaquatico, vPB ? vPB.tempoSubaquatico : undefined, function(x) { return fmtNum(x, 2, ' s'); }, false, labelSerie1, labelSerie2);
        html += renderRepRow(prefixo + 'Velocidade', v.velSubaquatico, vPB ? vPB.velSubaquatico : undefined, function(x) { return fmtNum(x, 2, ' m/s'); }, true, labelSerie1, labelSerie2);
      });
      if (m.porViragem.length > 1) {
        html += '<div style="border-top:2px solid var(--rep-border);margin-top:4px;padding-top:4px">';
        html += renderRepRow('Média de velocidade subaquática pós-viragem', m.mediaVelSubaqVirag, mPB ? mPB.mediaVelSubaqVirag : undefined, function(x) { return fmtNum(x, 2, ' m/s'); }, true, labelSerie1, labelSerie2);
        html += '</div>';
      }
      html += '</div>';
    }
  }

  const éBilateral = an.estilo === 'MARIPOSA' || an.estilo === 'BRUCOS';
  html += chartCard('chart_ciclos50', 'Ciclos de braçada', 'contagem a cada ' + (an.tamanhoPiscina || 50) + 'm');
  if (!éBilateral) {
    html += chartCard('chart_bracadas', 'Braçadas', 'contagem por segmento');
  }

  // Sub-troços de ciclos para 50m piscina 50m
  // Gráficos de sub-troços — apenas para 50m p50 ou 200m p50, nunca os dois
  if (é50p50 && m.ciclosPorSubTroço) {
    html += chartCard('chart_ciclos_sub', 'Ciclos por troço', '15-25m · 25-35m · 35-45m · 45-50m');
    html += chartCard('chart_freq_sub', 'Frequência de braçada por troço', 'ciclos/min · 15-25m · 25-35m · 35-45m · 45-50m');
    html += chartCard('chart_dist_ciclo_sub', 'Distância por ciclo por troço', 'm/ciclo · 15-25m · 25-35m · 35-45m');
    html += chartCard('chart_vel_sub', 'Velocidade de nado por troço', 'm/s · 15-25m · 25-35m · 35-45m');
  }
  if (m.segmentosCorrida) {
    html += chartCard('chart_segmentos', 'Distribuição do tempo por fase', 'Partida (0-15m) · Nado limpo (15-45m) · Chegada (45-50m)');
  }

  // Troços de nado limpo 200m piscina 50m
  if (é200p50 && m.parciais25) {
    html += chartCard('chart_parc25', 'Parciais a cada 25m', '0-25m · 25-50m · 50-75m · 75-100m · 100-125m · 125-150m · 150-175m · 175-200m');
  }

  if (m.ondulacoes.length) {
    // Para 50m piscina 50m só há ondulações pós-partida — mostrar no card da Partida
    // em vez de gráfico separado (que teria apenas um ponto)
    if (!é50p50) {
      html += chartCard('chart_ond', 'Movimentos ondulatórios', 'contagem pós-partida e pós-viragem');
    }
  }

  if (m.respiracoes.length) {
    html += chartCard('chart_resp', 'Respirações', 'contagem por troço');
  }
  if (m.respirouNaChegada !== null) {
    html += '<div class="rep-card"><div class="rep-card-title">Respiração na chegada</div><div class="rep-card-desc">Últimos 5m antes de tocar na parede</div>' +
      '<div class="rep-row"><div class="rep-row-label">Respirou nos últimos 5m</div><div class="rep-row-value">' + (m.respirouNaChegada ? 'Sim' : 'Não') + '</div></div></div>';
  }

  if (!é50p50) {
    // Parciais a cada 25m — só piscina 25m
    if (an.tamanhoPiscina === 25 && m.parciais25 && m.parciais25.some(function(p){return p.parcial !== null;})) {
      html += chartCard('chart_parc25p25', 'Parciais a cada 25m', 'tempo de cada parcial' + tempoTotalStr + (mPB && tempoTotalPBStr ? ' vs ' + tempoTotalPBStr : ''));
    }
    html += chartCard('chart_parc50', 'Parciais a cada 50m', 'tempo de cada parcial' + tempoTotalStr + (mPB && tempoTotalPBStr ? ' vs ' + tempoTotalPBStr : ''));
    if (m.parciais100.length > 1) {
      html += chartCard('chart_parc100', 'Parciais a cada 100m', 'tempo de cada parcial' + tempoTotalStr + (mPB && tempoTotalPBStr ? ' vs ' + tempoTotalPBStr : ''));
    }
  }

  // --- Partida (tabela simples, não gráfico) ---
  html += '<div class="rep-card"><div class="rep-card-title">Partida</div><div class="rep-card-desc">Valores cronometrados na saída</div>' + renderRepRowHeader(labelSerie1, mPB ? labelSerie2 : null);
  const estiloPartida = an.isMedley || an.estilo === 'ESTILOS' ? 'MARIPOSA' : an.estilo;
  const camposPartida = familiaPartida(estiloPartida);
  camposPartida.forEach(function (c) {
    const v1 = m.partida[c.id];
    const v2 = mPB ? mPB.partida[c.id] : undefined;
    const maiorMelhor = c.unidade === 'm';
    const fmt = c.unidade === 's' ? function(v) { return fmtNum(v, 2, ' s'); } : function(v) { return fmtNum(v, 2, ' m'); };
    // No relatório, o take off do pé anterior aparece duas vezes:
    // com o label técnico e com o label de análise "Tempo de reação"
    const labelRel = c.label;
    html += renderRepRow(labelRel, v1, v2, fmt, maiorMelhor, labelSerie1, labelSerie2);
    if (c.id === 'takeoff_pe_anterior_s' || c.id === 'takeoff_pes_s') {
      html += renderRepRow('Tempo de reação', v1, v2, fmt, maiorMelhor, labelSerie1, labelSerie2);
    }
    if (c.id === 'tempo_entrada_maos_s') {
      const voo1 = m.partida.duracao_voo_s;
      const voo2 = mPB ? mPB.partida.duracao_voo_s : undefined;
      html += renderRepRow('Duração de voo', voo1, voo2, function(v) { return fmtNum(v, 2, ' s'); }, false, labelSerie1, labelSerie2);
    }
    if (c.id === 'distancia_breakout_m') {
      // Percurso subaquático pós-partida — mostrado logo após o breakout,
      // já que depende da distância de entrada e de breakout.
      const ds1 = m.partida.distancia_subaquatico_m, ts1 = m.partida.tempo_subaquatico_s, vs1 = m.partida.velocidade_subaquatico_ms;
      const ds2 = mPB ? mPB.partida.distancia_subaquatico_m : undefined;
      const ts2 = mPB ? mPB.partida.tempo_subaquatico_s : undefined;
      const vs2 = mPB ? mPB.partida.velocidade_subaquatico_ms : undefined;
      if (vs1 !== null && vs1 !== undefined) {
        html += renderRepRow('Distância subaquática', ds1, ds2, function(v) { return fmtNum(v, 2, ' m'); }, true, labelSerie1, labelSerie2);
        html += renderRepRow('Tempo subaquático', ts1, ts2, function(v) { return fmtNum(v, 2, ' s'); }, false, labelSerie1, labelSerie2);
        html += renderRepRow('Velocidade subaquática', vs1, vs2, function(v) { return fmtNum(v, 2, ' m/s'); }, true, labelSerie1, labelSerie2);
      }
    }
  });
  // Para 50m piscina 50m (Livres/Costas/Mariposa): ondulações pós-partida no card da Partida
  if (é50p50 && m.ondulacoes.length) {
    const ondP = m.ondulacoes.find(function(o) { return o.label === 'Pós-partida (0-15m)'; });
    const ondPPB = mPB && mPB.ondulacoes ? mPB.ondulacoes.find(function(o) { return o.label === 'Pós-partida (0-15m)'; }) : null;
    if (ondP) {
      html += renderRepRow('Movimentos ondulatórios pós-partida', ondP.valor, ondPPB ? ondPPB.valor : undefined, function(v) { return fmtNum(v, 0, ''); }, false, labelSerie1, labelSerie2);
    }
  }
  html += '</div>';

  if (m.seg50 && !é50p50) {
    const seg50PB = mPB ? mPB.seg50 : null;
    html += '<div class="rep-card"><div class="rep-card-title">Segmentos da prova (50m)</div><div class="rep-card-desc">Divisão em três fases</div>' + renderRepRowHeader(labelSerie1, seg50PB ? labelSerie2 : null);
    html += renderRepRow('Até aos 15m', m.seg50.ate15m, seg50PB ? seg50PB.ate15m : undefined, fmtTempo, false, labelSerie1, labelSerie2);
    html += renderRepRow('Nado (15m–45m)', m.seg50.nadoCentral, seg50PB ? seg50PB.nadoCentral : undefined, fmtTempo, false, labelSerie1, labelSerie2);
    html += renderRepRow('Chegada (últimos 5m)', m.seg50.chegada, seg50PB ? seg50PB.chegada : undefined, fmtTempo, false, labelSerie1, labelSerie2);
    html += '</div>';
  } else if (m.tempoChegada5m !== null && !é50p50) {
    html += '<div class="rep-card"><div class="rep-card-title">Chegada</div><div class="rep-card-desc">Tempo dos últimos 5m antes de tocar na parede</div>' + renderRepRowHeader(labelSerie1, mPB ? labelSerie2 : null);
    html += renderRepRow('Últimos 5m', m.tempoChegada5m, mPB ? mPB.tempoChegada5m : undefined, fmtTempo, false, labelSerie1, labelSerie2);
    html += '</div>';
  }

  if (m.mediaParcial50 !== null || m.mediaParcial100 !== null) {
    html += '<div class="rep-card"><div class="rep-card-title">Médias de parciais</div><div class="rep-card-desc">Referência para regularidade de ritmo</div>' + renderRepRowHeader(labelSerie1, mPB ? labelSerie2 : null);
    if (m.mediaParcial50 !== null) {
      html += renderRepRow('Média parcial 50m', m.mediaParcial50, mPB ? mPB.mediaParcial50 : undefined, fmtTempo, false, labelSerie1, labelSerie2);
    }
    if (m.mediaParcial100 !== null) {
      html += renderRepRow('Média parcial 100m', m.mediaParcial100, mPB ? mPB.mediaParcial100 : undefined, fmtTempo, false, labelSerie1, labelSerie2);
    }
    html += '</div>';
  }

  if (m.totalBracadas !== null && !éBilateral) {
    const tamStr = (an.tamanhoPiscina || 50) + 'm';
    html += '<div class="rep-card"><div class="rep-card-title">Braçadas</div><div class="rep-card-desc">Totais e média por segmento de ' + tamStr + '</div>' + renderRepRowHeader(labelSerie1, mPB ? labelSerie2 : null);
    html += renderRepRow('Total de braçadas na prova', m.totalBracadas, mPB ? mPB.totalBracadas : undefined, function(v) { return fmtNum(v, 1, ''); }, false, labelSerie1, labelSerie2);
    html += renderRepRow('Média por segmento (' + tamStr + ')', m.mediaBracadasPorSegmento, mPB ? mPB.mediaBracadasPorSegmento : undefined, function(v) { return fmtNum(v, 1, ''); }, false, labelSerie1, labelSerie2);
    html += '</div>';
  }

  return html;
}

function chartCard(id, title, desc) {
  return '<div class="rep-card rep-card-clickable" onclick="abrirGraficoEcraInteiro(\'' + id + '\')">' +
    '<div class="rep-card-title">' + title + '</div><div class="rep-card-desc">' + desc + '</div><canvas id="' + id + '"></canvas></div>';
}

// Abre o gráfico identificado por canvasId num overlay de ecrã inteiro,
// recriando-o com a mesma configuração (dados, cores, formatação) já usada
// no cartão original — é mais robusto do que mover o <canvas> existente,
// que já tem uma instância Chart.js viva ligada a ele.
function abrirGraficoEcraInteiro(canvasId) {
  const instanciaOriginal = chartInstances.find(function (c) { return c.canvas && c.canvas.id === canvasId; });
  if (!instanciaOriginal) return;
  const tituloEl = document.getElementById(canvasId).closest('.rep-card').querySelector('.rep-card-title');
  const titulo = tituloEl ? tituloEl.textContent : '';

  let root = document.getElementById('chartFullscreenRoot');
  if (!root) {
    root = document.createElement('div');
    root.id = 'chartFullscreenRoot';
    document.body.appendChild(root);
  }
  root.innerHTML =
    '<div class="chart-fullscreen-overlay">' +
      '<div class="chart-fullscreen-header"><div class="chart-fullscreen-title">' + escapeHtml(titulo) + '</div>' +
      '<button class="chart-fullscreen-close" onclick="fecharGraficoEcraInteiro()">✕</button></div>' +
      '<div class="chart-fullscreen-body"><canvas id="chartFullscreenCanvas"></canvas></div>' +
    '</div>';

  const elFull = document.getElementById('chartFullscreenCanvas');
  const configClonada = JSON.parse(JSON.stringify(instanciaOriginal.config.data));
  // as funções (formatters, callbacks) perdem-se no JSON — reaplicamos as
  // mesmas opções da instância original diretamente (sem passar por JSON).
  const chartFull = new Chart(elFull, {
    type: instanciaOriginal.config.type,
    data: configClonada,
    options: Object.assign({}, instanciaOriginal.config.options, { responsive: true, maintainAspectRatio: false }),
  });
  state.chartFullscreenInstance = chartFull;
}

function fecharGraficoEcraInteiro() {
  if (state.chartFullscreenInstance) {
    try { state.chartFullscreenInstance.destroy(); } catch (e) {}
    state.chartFullscreenInstance = null;
  }
  const root = document.getElementById('chartFullscreenRoot');
  if (root) root.innerHTML = '';
}

/* ---------- ECRÃ: relatório comparativo (2 análises, mesmo ou diferente nadador) ---------- */

function renderCompararRelatorio() {
  const sel = state.comparacao.selecionadas;
  if (sel.length !== 2) return '<div class="empty-state"><p>Seleção inválida.</p></div>';

  const item1 = { swimmer: getSwimmer(sel[0].swimmerId), analise: encontrarAnalise(sel[0].swimmerId, sel[0].analiseId) };
  const item2 = { swimmer: getSwimmer(sel[1].swimmerId), analise: encontrarAnalise(sel[1].swimmerId, sel[1].analiseId) };
  if (!item1.analise || !item2.analise) return '<div class="empty-state"><p>Análise não encontrada.</p></div>';

  const m1 = calcularMetricas(item1.analise.estilo, item1.analise.distancia, item1.analise.dadosBrutos, item1.analise.tamanhoPiscina);
  const m2 = calcularMetricas(item2.analise.estilo, item2.analise.distancia, item2.analise.dadosBrutos, item2.analise.tamanhoPiscina);
  const maisRapida = m1.tempoTotal <= m2.tempoTotal ? 1 : 2;

  const nome1 = item1.swimmer.nome, nome2 = item2.swimmer.nome;
  const mesmoNadador = item1.swimmer.id === item2.swimmer.id;
  const fmtLabelComparacao = function(nome, an) {
    let partes = [fmtData(an.dataProva || an.criadoEm)];
    if (an.localProva) partes.push(an.localProva);
    if (an.competicao) partes.push(an.competicao);
    return nome + ' · ' + partes.join(' · ');
  };
  const label1 = mesmoNadador ? fmtLabelComparacao(nome1, item1.analise) : nome1;
  const label2 = mesmoNadador ? fmtLabelComparacao(nome2, item2.analise) : nome2;
  const provaLabel = ESTILOS_LABEL(item1.analise.estilo) + ' ' + item1.analise.distancia + 'm · piscina ' + (item1.analise.tamanhoPiscina || 50) + 'm';

  let html = '<div class="rep-header">';
  html += '<div class="rep-prova-label" style="text-align:center;margin-bottom:12px">' + escapeHtml(provaLabel) + '</div>';
  html += '<div class="rep-vs-header">';
  html += '<div class="rep-vs-side"><div class="rep-vs-name">' + escapeHtml(label1) + '</div><div class="rep-vs-time' + (maisRapida===1?' is-winner':'') + '">' + fmtTempo(m1.tempoTotal) + '</div></div>';
  html += '<div class="rep-vs-sep">VS</div>';
  html += '<div class="rep-vs-side"><div class="rep-vs-name">' + escapeHtml(label2) + '</div><div class="rep-vs-time' + (maisRapida===2?' is-winner':'') + '">' + fmtTempo(m2.tempoTotal) + '</div></div>';
  html += '</div>';
  const diff = Math.abs(m1.tempoTotal - m2.tempoTotal);
  html += '<div class="rep-diff">Diferença: ' + fmtTempo(diff) + '</div>';
  html += '</div>';

  html += '<div id="chartsContainer">' + renderGraficos(item1.analise, m1, m2, label1, label2) + '</div>';

  html += '<div style="display:flex;gap:10px;margin-top:10px">' +
    '<button class="rep-btn rep-btn-ghost" style="margin-top:0" onclick="exportarRelatorio()">Imagem</button>' +
    '<button class="rep-btn rep-btn-ghost" style="margin-top:0" onclick="exportarRelatorioPDF()">PDF</button>' +
    '</div>';
  html += '<button class="rep-btn rep-btn-ghost" onclick="state.comparacao.selecionadas=[];nav(\'compararSelecao\')">Nova comparação</button>';

  return html;
}

function afterRenderCompararRelatorio() {
  const sel = state.comparacao.selecionadas;
  if (sel.length !== 2) return;

  const item1 = { swimmer: getSwimmer(sel[0].swimmerId), analise: encontrarAnalise(sel[0].swimmerId, sel[0].analiseId) };
  const item2 = { swimmer: getSwimmer(sel[1].swimmerId), analise: encontrarAnalise(sel[1].swimmerId, sel[1].analiseId) };
  if (!item1.analise || !item2.analise) return;

  const m = calcularMetricas(item1.analise.estilo, item1.analise.distancia, item1.analise.dadosBrutos, item1.analise.tamanhoPiscina);
  const mPB = calcularMetricas(item2.analise.estilo, item2.analise.distancia, item2.analise.dadosBrutos, item2.analise.tamanhoPiscina);

  const mesmoNadador = item1.swimmer.id === item2.swimmer.id;
  const labelSerie1 = mesmoNadador ? fmtData(item1.analise.dataProva || item1.analise.criadoEm) : item1.swimmer.nome;
  const labelSerie2 = mesmoNadador ? fmtData(item2.analise.dataProva || item2.analise.criadoEm) : item2.swimmer.nome;

  desenharGraficosComLabels(item1.analise, m, mPB, labelSerie1, labelSerie2);
}

function afterRenderRelatorio() {
  const sw = getSwimmer(state.swimmerId);
  const an = sw.analises.find(function (a) { return a.id === state.verAnaliseId; });
  if (!an) return;
  const m = calcularMetricas(an.estilo, an.distancia, an.dadosBrutos, an.tamanhoPiscina);
  const melhor = getMelhorAnalise(sw, an.estilo, an.distancia, an.id, an.tamanhoPiscina);
  const mPB = (state.compararPB && melhor) ? calcularMetricas(melhor.estilo, melhor.distancia, melhor.dadosBrutos, melhor.tamanhoPiscina) : null;
  const refProva = getReferenciaParaProva(an.estilo, an.distancia, an.tamanhoPiscina || 50);
  const mRef = (state.compararRef && refProva) ? calcularMetricas(refProva.estilo, refProva.distancia, refProva.dados, refProva.tamanhoPiscina) : null;
  const mComp = mRef || mPB;
  const labelComp = mRef ? refProva.titulo : 'Melhor registo';
  desenharGraficosComLabels(an, m, mComp, sw.nome, labelComp);
}

// Desenha todos os gráficos do relatório (cards já criados por renderGraficos)
// a partir de duas séries de métricas, com os nomes de legenda indicados.
// Reutilizada tanto pelo relatório normal (Atual vs Melhor registo) como
// pelo relatório comparativo (nadador/data vs nadador/data).
// Constrói a lista de labels que cobre ambas as séries, mantendo a ordem
// original. Usado para alinhar corretamente séries esparsas (ex: respirações
// onde apenas alguns segmentos foram preenchidos).
function unirLabels(serie1, serie2) {
  const vistos = {};
  const resultado = [];
  (serie1 || []).forEach(function(e) { if (!vistos[e.label]) { vistos[e.label] = true; resultado.push(e.label); } });
  (serie2 || []).forEach(function(e) { if (!vistos[e.label]) { vistos[e.label] = true; resultado.push(e.label); } });
  return resultado;
}

function desenharGraficosComLabels(an, m, mPB, labelSerie1, labelSerie2) {
  chartInstances.forEach(function (c) { c.destroy(); });
  chartInstances = [];
  const é50p50 = an.distancia === 50 && (an.tamanhoPiscina || 50) === 50;
  const é200p50 = an.distancia === 200 && (an.tamanhoPiscina || 50) === 50 && an.estilo !== 'ESTILOS';
  // O relatório usa sempre uma paleta fixa clara (azul da app + laranja do
  // Swimmin), independente do tema dark/light geral da aplicação — para que
  // o relatório funcione como um "cartão" pronto a exportar/partilhar.
  const colAccent = '#0096c7';   // azul principal (1ª série / análise única)
  const colGold = '#f4762a';     // laranja (2ª série / comparação ou PB)
  const colTxt2 = '#5b6b78';
  const colBorder = '#e3e7eb';
  Chart.defaults.color = colTxt2;
  Chart.defaults.font.size = 11;
  Chart.defaults.borderColor = colBorder;
  if (window.ChartDataLabels) { try { Chart.register(window.ChartDataLabels); } catch (e) {} }

  function mkLineBar(canvasId, labels, dataset, datasetPB, type, unidade, opts) {
    opts = opts || {};
    const formatador = opts.formatador || fmtEixo;
    const beginAtZero = opts.beginAtZero !== undefined ? opts.beginAtZero : false;
    // Por defeito mostramos sempre os valores em cima dos pontos/barras —
    // é a marca visual do estilo "cartão de Instagram" que queremos.
    const mostrarValores = opts.mostrarValores !== false;
    const el = document.getElementById(canvasId);
    if (!el) return;
    const datasets = [{
      label: labelSerie1, data: dataset,
      backgroundColor: type === 'bar' ? colAccent : 'rgba(0,150,199,0.10)',
      borderColor: colAccent, borderWidth: type === 'bar' ? 0 : 3,
      borderRadius: type === 'bar' ? { topLeft: 10, topRight: 10, bottomLeft: 0, bottomRight: 0 } : 0, borderSkipped: 'bottom',
      tension: 0.35, pointRadius: type === 'line' ? 4 : 0, pointBackgroundColor: colAccent,
      pointBorderColor: '#ffffff', pointBorderWidth: 2, fill: type === 'line',
      barPercentage: 0.62, categoryPercentage: 0.8,
    }];
    if (datasetPB) {
      datasets.push({
        label: labelSerie2, data: datasetPB,
        backgroundColor: type === 'bar' ? colGold : 'rgba(244,118,42,0.10)',
        borderColor: colGold, borderWidth: type === 'bar' ? 0 : 3,
        borderRadius: type === 'bar' ? { topLeft: 10, topRight: 10, bottomLeft: 0, bottomRight: 0 } : 0, borderSkipped: 'bottom',
        tension: 0.35, pointRadius: type === 'line' ? 4 : 0, pointBackgroundColor: colGold,
        pointBorderColor: '#ffffff', pointBorderWidth: 2, fill: type === 'line',
        barPercentage: 0.62, categoryPercentage: 0.8,
      });
    }
    const plugins = {
      legend: { display: !!datasetPB, position: 'bottom', labels: { boxWidth: 10, boxHeight: 10, padding: 14, font: { size: 11, weight: '700' }, color: '#14202b' } },
      tooltip: { callbacks: { label: function (ctx) {
        const v = ctx.parsed.y;
        return ctx.dataset.label + ': ' + formatador(v) + (unidade || '');
      } } },
    };
    if (mostrarValores && window.ChartDataLabels) {
      plugins.datalabels = {
        color: function (ctx) { return ctx.dataset.borderColor || colAccent; },
        anchor: 'end',
        align: type === 'line'
          ? function (ctx) {
              if (ctx.chart.data.datasets.length < 2) return 'top';
              var idx = ctx.dataIndex;
              var v0 = ctx.chart.data.datasets[0].data[idx];
              var v1 = ctx.chart.data.datasets[1] ? ctx.chart.data.datasets[1].data[idx] : null;
              if (v0 === null || v0 === undefined || v1 === null || v1 === undefined) {
                return ctx.datasetIndex === 0 ? 'top' : 'bottom';
              }
              // Calcular amplitude do eixo Y para determinar se os valores são próximos
              var axis = ctx.chart.scales.y;
              var amplitude = axis ? (axis.max - axis.min) : Math.abs(v0 - v1) * 10;
              var diff = Math.abs(v0 - v1);
              var percentagem = amplitude > 0 ? diff / amplitude : 1;
              if (percentagem < 0.08) {
                // Valores muito próximos — forçar separação: série 0 acima, série 1 abaixo
                return ctx.datasetIndex === 0 ? 'top' : 'bottom';
              }
              // Valores suficientemente separados — cada label segue o seu ponto
              return v0 >= v1
                ? (ctx.datasetIndex === 0 ? 'top' : 'bottom')
                : (ctx.datasetIndex === 0 ? 'bottom' : 'top');
            }
          : 'end',
        offset: type === 'bar' ? 4 : function(ctx) {
          if (ctx.chart.data.datasets.length < 2) return 3;
          var idx = ctx.dataIndex;
          var v0 = ctx.chart.data.datasets[0].data[idx];
          var v1 = ctx.chart.data.datasets[1] ? ctx.chart.data.datasets[1].data[idx] : null;
          if (v0 === null || v1 === null) return 3;
          var axis = ctx.chart.scales.y;
          var amplitude = axis ? (axis.max - axis.min) : 1;
          var diff = Math.abs(v0 - v1);
          // Quanto mais próximos, maior o offset para afastar os labels
          return diff / amplitude < 0.08 ? 6 : 3;
        },
        font: { size: 11, weight: '800' },
        formatter: function (v) { return v === null || v === undefined ? '' : formatador(v) + (unidade || ''); },
        clamp: true,
      };
    }
    el.style.height = '230px';
    el.style.display = 'block';
    const c = new Chart(el, {
      type: type, data: { labels: labels, datasets: datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        // Padding maior no topo para os números do datalabels nunca ficarem cortados.
        layout: { padding: { top: 28, bottom: 4, left: type === 'line' ? 16 : 4, right: type === 'line' ? 16 : 4 } },
        plugins: plugins,
        scales: {
          y: (function() {
            var yCfg = {
              beginAtZero: beginAtZero,

                callback: function (v) { return formatador(v) + (unidade || ''); }
              }
            };
            if (!beginAtZero) {
              yCfg.afterDataLimits = function(axis) {

                axis.min = axis.min - margem;
                axis.max = axis.max + margem;
              };
            }
            return yCfg;
          })(),

        },
      },
    });
    chartInstances.push(c);
  }

  const labelsTroço = m.porTroço.map(function (t) { return t.label; });
  if (!é50p50) mkLineBar('chart_vel', labelsTroço, m.porTroço.map(function(t){return t.vel?+t.vel.toFixed(2):null;}), mPB ? mPB.porTroço.map(function(t){return t.vel?+t.vel.toFixed(2):null;}) : null, 'line', ' m/s', { formatador: fmtEixo2 });
  mkLineBar('chart_freq', labelsTroço, m.porTroço.map(function(t){return t.freq?+t.freq.toFixed(1):null;}), mPB ? mPB.porTroço.map(function(t){return t.freq?+t.freq.toFixed(1):null;}) : null, 'line', ' c/min', { formatador: fmtEixo1 });
  mkLineBar('chart_dpc', labelsTroço, m.porTroço.map(function(t){return t.distPorCiclo?+t.distPorCiclo.toFixed(2):null;}), mPB ? mPB.porTroço.map(function(t){return t.distPorCiclo?+t.distPorCiclo.toFixed(2):null;}) : null, 'line', ' m', { formatador: fmtEixo2 });

  if (m.porViragem.length) {
    const labelsV = m.porViragem.map(function (v) { return v.emMetros + 'm'; });
    mkLineBar('chart_viragem', labelsV, m.porViragem.map(function(v){return v.tTotal?+v.tTotal.toFixed(2):null;}), mPB ? mPB.porViragem.map(function(v){return v.tTotal?+v.tTotal.toFixed(2):null;}) : null, 'bar', ' s', { formatador: fmtEixo1, beginAtZero: true });
    mkLineBar('chart_saida', labelsV, m.porViragem.map(function(v){return v.distSaida;}), mPB ? mPB.porViragem.map(function(v){return v.distSaida;}) : null, 'bar', ' m', { beginAtZero: true });
  }

  const labelsB50 = m.porBloco50.map(function (b) { return b.label; });
  mkLineBar('chart_ciclos50', labelsB50, m.porBloco50.map(function(b){return b.ciclos;}), mPB ? mPB.porBloco50.map(function(b){return b.ciclos;}) : null, 'bar', ' ciclos', { formatador: fmtEixoInt, beginAtZero: true });
  if (an.estilo !== 'MARIPOSA' && an.estilo !== 'BRUCOS') {

  }
  if (é200p50 && m.parciais25) {
    mkLineBar('chart_parc25', m.parciais25.map(function(p){return p.label;}), m.parciais25.map(function(p){return p.tempo;}), (mPB && mPB.parciais25) ? mPB.parciais25.map(function(p){return p.tempo;}) : null, 'line', ' s', {formatador:fmtEixo1});
  }
  if (m.ciclosPorSubTroço && é50p50) {
    const labelsSub = m.ciclosPorSubTroço.map(function(t) { return t.label; });
    const dadosSub = m.ciclosPorSubTroço.map(function(t) { return t.ciclos; });
    const dadosSubPB = (mPB && mPB.ciclosPorSubTroço) ? mPB.ciclosPorSubTroço.map(function(t) { return t.ciclos; }) : null;
    mkLineBar('chart_ciclos_sub', labelsSub, dadosSub, dadosSubPB, 'line', ' ciclos', { formatador: fmtEixoInt });

    const dadosFreq = m.ciclosPorSubTroço.map(function(t) { return t.freq; });
    const dadosFreqPB = (mPB && mPB.ciclosPorSubTroço) ? mPB.ciclosPorSubTroço.map(function(t) { return t.freq; }) : null;
    mkLineBar('chart_freq_sub', labelsSub, dadosFreq, dadosFreqPB, 'line', ' c/min', { formatador: fmtEixo1 });

    // Para 50m p50: só os primeiros 3 troços têm dist/ciclo (troços de 10m)
    // Para 200m p50: todos os 4 troços têm dist/ciclo (troços de 30m)
    const subDC = é50p50 ? m.ciclosPorSubTroço.slice(0, 3) : m.ciclosPorSubTroço;
    const labelsDC = subDC.map(function(t) { return t.label; });
    const dadosDC = subDC.map(function(t) { return t.distPorCiclo; });
    const dadosDCPB = (mPB && mPB.ciclosPorSubTroço) ? mPB.ciclosPorSubTroço.slice(0, subDC.length).map(function(t) { return t.distPorCiclo; }) : null;
    mkLineBar('chart_dist_ciclo_sub', labelsDC, dadosDC, dadosDCPB, 'line', ' m/ciclo', { formatador: fmtEixo2 });

    const dadosVel = subDC.map(function(t) { return t.velocidade; });
    const dadosVelPB = (mPB && mPB.ciclosPorSubTroço) ? mPB.ciclosPorSubTroço.slice(0, subDC.length).map(function(t) { return t.velocidade; }) : null;
    mkLineBar('chart_vel_sub', labelsDC, dadosVel, dadosVelPB, 'line', ' m/s', { formatador: fmtEixo2 });
  }

  if (m.segmentosCorrida) {
    const seg = m.segmentosCorrida;
    const segPB = mPB ? mPB.segmentosCorrida : null;
    const labSeg = ['Partida (0-15m)', 'Nado limpo (15-45m)', 'Chegada (45-50m)'];
    const dadosSeg = [seg.partida, seg.nadoLimpo, seg.chegada];
    const dadosSegPB = segPB ? [segPB.partida, segPB.nadoLimpo, segPB.chegada] : null;
    const elSeg = document.getElementById('chart_segmentos');
    if (elSeg) {
      const cSeg = new Chart(elSeg, {
        type: 'bar',
        data: {
          labels: labSeg,
          datasets: [
            { label: labelSerie1, data: dadosSeg, backgroundColor: 'rgba(0,150,199,0.75)', borderRadius: 4 },
          ].concat(dadosSegPB ? [{ label: labelSerie2, data: dadosSegPB, backgroundColor: 'rgba(0,150,199,0.25)', borderRadius: 4 }] : []),
        },
        options: {
          indexAxis: 'y',
          responsive: true, maintainAspectRatio: false,
          layout: { padding: { top: 10, right: 50, bottom: 4, left: 4 } },
          plugins: {
            legend: { display: !!dadosSegPB, labels: { color: '#5b6b78', font: { size: 11 } } },
            datalabels: { anchor: 'end', align: 'right', color: '#2E6DA4', font: { weight: 700, size: 11 }, formatter: function(v) { return v !== null ? fmtNum(v, 2, ' s') : ''; } },
          },
          scales: {
            x: { grid: { color: '#eef1f4' }, ticks: { color: '#93a1ac', callback: function(v) { return fmtNum(v, 1, ' s'); } } },
            y: { grid: { display: false }, ticks: { color: '#5b6b78', font: { size: 10, weight: 700 } } },
          },
        },
        plugins: [ChartDataLabels],
      });
      chartInstances.push(cSeg);
    }
  }

  if (m.ondulacoes.length) {
    // Alinhar pelos labels de ambas as séries (podem ter segmentos diferentes)
    const labelsOnd = unirLabels(m.ondulacoes, mPB ? mPB.ondulacoes : null).sort(function(a, b) {
      // Partida sempre primeiro, depois viragens por metros crescente
      if (a.startsWith('Pós-partida')) return -1;
      if (b.startsWith('Pós-partida')) return 1;
      var mA = parseInt(a.match(/\d+/)) || 0;
      var mB = parseInt(b.match(/\d+/)) || 0;
      return mA - mB;
    });
    mkLineBar('chart_ond', labelsOnd,
      labelsOnd.map(function(l){ const e = m.ondulacoes.find(function(o){return o.label===l;}); return e ? e.valor : null; }),
      mPB ? labelsOnd.map(function(l){ const e = mPB.ondulacoes.find(function(o){return o.label===l;}); return e ? e.valor : null; }) : null,
      'bar', ' ond.', { formatador: fmtEixoInt, beginAtZero: true });
  }

  if (m.respiracoes.length) {
    const labelsResp = unirLabels(m.respiracoes, mPB ? mPB.respiracoes : null);
    mkLineBar('chart_resp', labelsResp,
      labelsResp.map(function(l){ const e = m.respiracoes.find(function(r){return r.label===l;}); return e ? e.valor : null; }),
      mPB ? labelsResp.map(function(l){ const e = mPB.respiracoes.find(function(r){return r.label===l;}); return e ? e.valor : null; }) : null,
      'bar', ' resp.', { formatador: fmtEixoInt, beginAtZero: true });
  }

  // Subtítulo com tempo total
  const tempoTotalStr = m.tempoTotal ? ' · Total: ' + fmtTempo(m.tempoTotal) : '';
  const tempoTotalPBStr = (mPB && mPB.tempoTotal) ? ' · Total: ' + fmtTempo(mPB.tempoTotal) : '';

  // Parciais a cada 25m — só piscina 25m
  if (an.tamanhoPiscina === 25 && m.parciais25 && m.parciais25.some(function(p){return p.parcial !== null;})) {
    mkLineBar('chart_parc25p25',
      m.parciais25.map(function(p){return p.metros+'m';}),
      m.parciais25.map(function(p){return p.parcial?+p.parcial.toFixed(2):null;}),
      mPB && mPB.parciais25 ? mPB.parciais25.map(function(p){return p.parcial?+p.parcial.toFixed(2):null;}) : null,
      'line', '', { beginAtZero: false, formatador: fmtTempo });
  }

  mkLineBar('chart_parc50',
    m.parciais50.map(function(p){return p.metros+'m';}),
    m.parciais50.map(function(p){return p.parcial?+p.parcial.toFixed(2):null;}),

    'bar', '', { beginAtZero: true, formatador: fmtTempo });
  if (m.parciais100.length > 1) {

      'bar', '', { beginAtZero: true, formatador: fmtTempo });
  }
}


// Devolve um nome de ficheiro apropriado consoante o ecrã atual (relatório
// normal de uma análise, ou relatório comparativo de duas).
function nomeFicheiroRelatorio() {
  if (state.screen === 'compararRelatorio') {
    const sel = state.comparacao.selecionadas;
    if (sel.length === 2) {
      const a1 = encontrarAnalise(sel[0].swimmerId, sel[0].analiseId);
      if (a1) return 'comparacao_' + a1.estilo + a1.distancia;
    }
    return 'comparacao';
  }
  const sw = getSwimmer(state.swimmerId);
  const an = sw ? sw.analises.find(function (a) { return a.id === state.verAnaliseId; }) : null;
  if (sw && an) return 'relatorio_' + sw.nome.replace(/\s+/g,'_') + '_' + an.estilo + an.distancia + '_' + fmtData(an.dataProva || an.criadoEm).replace(/\//g,'-');
  return 'relatorio';
}

function exportarRelatorio() {
  toast('A gerar imagem em alta resolução...');
  const container = document.getElementById('app');
  // O relatório é sempre em fundo claro (independente do tema dark/light
  // geral da app), por isso a exportação tem de usar o mesmo fundo claro —
  // usar a cor escura aqui produzia uma imagem com fundo errado.
  html2canvas(container, { backgroundColor: '#f4f6f8', scale: 4 }).then(function (canvas) {
    const link = document.createElement('a');
    link.download = nomeFicheiroRelatorio() + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }).catch(function () { toast('Não foi possível exportar. Tenta novamente.'); });
}

// Exporta o relatório como PDF em páginas A4, capturando cada cartão
// individualmente (em alta resolução) e distribuindo-os pelas páginas sem
// nunca cortar um cartão a meio entre duas páginas.
function exportarRelatorioPDF() {
  toast('A gerar PDF, aguarda um momento...');

  const container = document.getElementById('app');
  // captura cada bloco visível de topo a baixo (cabeçalho + cada cartão de gráfico/dados)
  const todosOsBlocos = [];
  container.querySelectorAll(':scope > *').forEach(function (el) {
    if (el.id === 'chartsContainer') {
      Array.from(el.children).forEach(function (c) { todosOsBlocos.push(c); });
    } else if (el.classList.contains('rep-header') || el.classList.contains('rep-toggle')) {
      todosOsBlocos.push(el);
    }
  });

  if (!todosOsBlocos.length) { toast('Nada para exportar.'); return; }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: 'mm', format: 'a4' });
  const pageW = pdf.internal.pageSize.getWidth();
  const pageH = pdf.internal.pageSize.getHeight();
  const margin = 10;
  const usableW = pageW - margin * 2;
  const usableH = pageH - margin * 2;

  let cursorY = margin;
  let primeiraImagemDaPagina = true;

  function capturarEAdicionar(idx) {
    if (idx >= todosOsBlocos.length) {
      pdf.save(nomeFicheiroRelatorio() + '.pdf');
      toast('PDF gerado');
      return;
    }
    const el = todosOsBlocos[idx];
    html2canvas(el, { backgroundColor: '#f4f6f8', scale: 2 }).then(function (canvas) {
      const imgW = usableW;
      const imgH = (canvas.height / canvas.width) * imgW;

      if (!primeiraImagemDaPagina && (cursorY + imgH) > (margin + usableH)) {
        pdf.addPage();
        cursorY = margin;
        primeiraImagemDaPagina = true;
      }
      const imgHFinal = Math.min(imgH, usableH);
      const imgWFinal = imgHFinal === imgH ? imgW : imgW * (imgHFinal / imgH);

      // JPEG com qualidade 0.85 em vez de PNG: visualmente indistinguível
      // mas tipicamente 5-10x mais pequeno, reduzindo drasticamente o PDF.
      pdf.addImage(canvas.toDataURL('image/jpeg', 0.85), 'JPEG', margin, cursorY, imgWFinal, imgHFinal);
      cursorY += imgHFinal + 5;
      primeiraImagemDaPagina = false;
      capturarEAdicionar(idx + 1);
    }).catch(function () {
      capturarEAdicionar(idx + 1); // se um bloco falhar, continua com os restantes em vez de abortar tudo
    });
  }

  capturarEAdicionar(0);
}

/* ============================================================
   TEMA — claro/escuro, persistido em localStorage
   ============================================================ */

const THEME_KEY = 'swimlab_theme_v1';

function aplicarTema(modo) {
  const isLight = modo === 'light';
  document.documentElement.classList.toggle('light-mode', isLight);
  const moon = document.getElementById('themeIconMoon');
  const sun = document.getElementById('themeIconSun');
  if (moon && sun) {
    moon.style.display = isLight ? 'none' : 'block';
    sun.style.display = isLight ? 'block' : 'none';
  }
}

function toggleTema() {
  const atual = localStorage.getItem(THEME_KEY) === 'light' ? 'light' : 'dark';
  const novo = atual === 'light' ? 'dark' : 'light';
  localStorage.setItem(THEME_KEY, novo);
  aplicarTema(novo);
  // se houver gráficos visíveis (ecrã de relatório), recriá-los com as cores do novo tema
  if (state.screen === 'relatorio') afterRenderRelatorio();
}

function initTema() {
  const guardado = localStorage.getItem(THEME_KEY);
  aplicarTema(guardado === 'light' ? 'light' : 'dark');
}

/* ---------- INICIALIZAÇÃO ---------- */
// ---- FERRAMENTAS DE ANOTAÇÃO NO VÍDEO ----
var anotacaoTool = 'reta';
var anotacaoCor = '#ffffff';
var anotacaoEspessura = 2;
var _anotacaoDesenhando = false;
var _anotacaoInicio = null;
var _anotacaoSnapshot = null; // para preview da reta

function selTool(tool) {
  anotacaoTool = tool;
  var btnReta = document.getElementById('toolReta');
  var btnLapis = document.getElementById('toolLapis');
  if (!btnReta || !btnLapis) return;
  btnReta.style.background = tool === 'reta' ? 'var(--accent)' : 'var(--card)';
  btnReta.style.color = tool === 'reta' ? '#04141f' : 'var(--txt)';
  btnReta.style.borderColor = tool === 'reta' ? 'var(--accent)' : 'var(--border)';
  btnLapis.style.background = tool === 'lapis' ? 'var(--accent)' : 'var(--card)';
  btnLapis.style.color = tool === 'lapis' ? '#04141f' : 'var(--txt)';
  btnLapis.style.borderColor = tool === 'lapis' ? 'var(--accent)' : 'var(--border)';
  ligarCanvasListeners();
}

function selCor(cor) {
  anotacaoCor = cor;
  document.querySelectorAll('[id^="cor_"]').forEach(function(el) {
    el.style.border = '2px solid transparent';
  });
  var el = document.getElementById('cor_' + cor.slice(1));
  if (el) el.style.border = '3px solid var(--accent)';
}

function apagarAnotacoes() {
  var c = document.getElementById('anotacaoCanvas');
  if (!c) return;
  var ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);
}

function getCanvasPos(canvas, e) {
  var rect = canvas.getBoundingClientRect();
  var touch = e.touches ? e.touches[0] : e;
  return {
    x: (touch.clientX - rect.left) * (canvas.width / rect.width),
    y: (touch.clientY - rect.top) * (canvas.height / rect.height),
  };
}

function ligarCanvasListeners() {
  var canvas = document.getElementById('anotacaoCanvas');
  if (!canvas) return;
  var v = document.getElementById('videoPlayer');
  if (v) {
    // Sincronizar tamanho do canvas com o vídeo
    canvas.width = v.videoWidth || v.offsetWidth || 640;
    canvas.height = v.videoHeight || v.offsetHeight || 360;
  }
  canvas.style.pointerEvents = 'auto';
  canvas.style.cursor = anotacaoTool === 'lapis' ? 'crosshair' : 'crosshair';

  // Remover listeners antigos clonando
  var novo = canvas.cloneNode(true);
  canvas.parentNode.replaceChild(novo, canvas);
  canvas = novo;

  var ctx = canvas.getContext('2d');

  function start(e) {
    e.preventDefault();
    _anotacaoDesenhando = true;
    var pos = getCanvasPos(canvas, e);
    _anotacaoInicio = pos;
    if (anotacaoTool === 'lapis') {
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    } else {
      // Guardar snapshot para preview da reta
      _anotacaoSnapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
    }
  }

  function move(e) {
    if (!_anotacaoDesenhando) return;
    e.preventDefault();
    var pos = getCanvasPos(canvas, e);
    ctx.strokeStyle = anotacaoCor;
    ctx.lineWidth = anotacaoEspessura;
    ctx.lineCap = 'round';
    if (anotacaoTool === 'lapis') {
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    } else {
      // Preview da reta: restaurar snapshot e desenhar reta temporária
      if (_anotacaoSnapshot) ctx.putImageData(_anotacaoSnapshot, 0, 0);
      ctx.beginPath();
      ctx.moveTo(_anotacaoInicio.x, _anotacaoInicio.y);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    }
  }

  function end(e) {
    if (!_anotacaoDesenhando) return;
    _anotacaoDesenhando = false;
    _anotacaoSnapshot = null;
    ctx.beginPath();
  }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', end);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', end);
}

function mostrarToolbarAnotacao(mostrar) {
  var tb = document.getElementById('anotacaoToolbar');
  if (tb) {
    tb.style.display = mostrar ? 'flex' : 'none';
  }
  if (mostrar) {
    setTimeout(function() { ligarCanvasListeners(); selCor(anotacaoCor); selTool(anotacaoTool); }, 50);
  } else {
    apagarAnotacoes();
    var canvas = document.getElementById('anotacaoCanvas');
    if (canvas) canvas.style.pointerEvents = 'none';
  }
}

initTema();
nav('lista');
window._state = state;

</script>
