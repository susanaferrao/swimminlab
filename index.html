function guardarEdicaoAnalise(swimmerId, analiseId) {
  const db = loadDB();
  const sw = db.swimmers.find(function(s) { return s.id === swimmerId; });
  if (!sw) return;
  const an = sw.analises.find(function(a) { return a.id === analiseId; });
  if (!an) return;
  an.dataProva = document.getElementById('editDataProva').value || an.dataProva;
  an.localProva = document.getElementById('editLocalProva').value.trim() || null;
  an.competicao = document.getElementById('editCompeticao').value.trim() || null;
  an.tamanhoPiscina = window._piscinaEditada || an.tamanhoPiscina;
  an.estilo = document.getElementById('editEstilo').value || an.estilo;
  an.distancia = parseInt(document.getElementById('editDistancia').value) || an.distancia;
  saveDB(db);
  closeModal();
  nav('relatorio', { swimmerId: swimmerId, verAnaliseId: analiseId, compararPB: false });
}

/* ---------- ECRÃ: formulário sequencial ---------- */

function renderFormulario() {
  if (state.formStep === 'data') {
    return renderFormularioData();
  }

  const campos = gerarCamposInput(state.novaAnalise.estilo, state.novaAnalise.distancia, state.novaAnalise.tamanhoPiscina, state.incluirOndulacoes, state.incluirRespiracoes);
  const listaTempos = campos.tempos.filter(function(c) {
    // No modo "sem vídeo" mostrar todos os campos incluindo os autoCapturados
    if (state.editandoSemVideo) return !c.isHeader;
    // No formulário manual normal, campos autoCapturado não aparecem
    return !c.autoCapturado;
  });
  const lista = state.formStep === 'tempos' ? listaTempos : campos.ciclos;

  // Tabs de navegação — clicáveis em qualquer direção, com flush automático
  // dos valores visíveis antes de mudar de passo (evita perda de dados).
  const tabs = [
    { id: 'data', label: '1. Data e opções' },
    { id: 'tempos', label: '2. Tempos' },
    { id: 'ciclos', label: '3. Ciclos' },
  ];
  let html = '<div class="form-tabs">';
  tabs.forEach(function (tab) {
    const isActive = state.formStep === tab.id;
    html += '<button class="form-tab' + (isActive ? ' active' : '') + '" onclick="irParaPasso(\'' + tab.id + '\')">' + tab.label + '</button>';
  });
  html += '</div>';

  html += '<div class="step-title">' + (state.formStep === 'tempos' ? 'Tempos cronometrados' : 'Ciclos, ondulações e saídas') + '</div>';

  if (state.formStep === 'tempos') {
    html += '<div class="card" style="background:var(--bg3);border-style:dashed;margin-bottom:18px"><p style="font-size:13px;color:var(--txt2);line-height:1.5">Insere os tempos exatamente como aparecem no cronómetro de vídeo, sempre acumulados desde a partida (não é a duração de cada troço).</p></div>';
    html += '<button class="btn btn-ghost" style="margin-bottom:18px" onclick="abrirMarcarVideo()">Marcar tempos a partir de um vídeo</button>';
  }

  let currentGroup = null;
  let currentSubgrupo = null;
  lista.forEach(function (campo) {
    if (campo.isHeader) {
      currentGroup = campo.group;
      currentSubgrupo = null;
      html += '<div class="section-divider">' + escapeHtml(campo.group) + '</div>';
      return;
    }
    if (campo.subgrupo && campo.subgrupo !== currentSubgrupo) {
      currentSubgrupo = campo.subgrupo;
      html += '<div class="section-subdivider">' + escapeHtml(campo.subgrupo) + '</div>';
    } else if (!campo.subgrupo) {
      currentSubgrupo = null;
    }
    const val = state.formData[campo.id] !== undefined ? state.formData[campo.id] : '';
    const isTempo = campo.unidade === 's';
    const isBoolean = campo.tipo === 'boolean';
    const displayVal = isTempo ? fmtTempoInput(val) : val;
    const digitosIniciais = isTempo && val !== '' ? segundosParaDigitos(val) : '';

    if (isBoolean) {
      html += '<div class="input-row">' +
        '<div class="ir-label">' + escapeHtml(campo.label) + (campo.sub ? '<span class="ir-sub">' + escapeHtml(campo.sub) + '</span>' : '') + '</div>' +
        '<div class="bool-toggle">' +
        '<button type="button" class="bool-opt' + (val === 'sim' ? ' selected' : '') + '" onclick="onBooleanInput(\'' + campo.id + '\', \'sim\')">Sim</button>' +
        '<button type="button" class="bool-opt' + (val === 'nao' ? ' selected' : '') + '" onclick="onBooleanInput(\'' + campo.id + '\', \'nao\')">Não</button>' +
        '</div></div>';
      return;
    }

    html += '<div class="input-row">' +
      '<div class="ir-label">' + escapeHtml(campo.label) + (campo.sub ? '<span class="ir-sub">' + escapeHtml(campo.sub) + '</span>' : '') + '</div>' +
      (isTempo
        ? '<input type="text" inputmode="numeric" placeholder="0:00,00" value="' + displayVal + '" data-field="' + campo.id + '" data-digitos="' + digitosIniciais + '" data-raw-value="' + escapeHtml(displayVal) + '" oninput="onTempoInput(this)">'
        : '<input type="text" inputmode="decimal" value="' + val + '" data-field="' + campo.id + '" oninput="onFormInput(this)">') +
      '<div class="ir-unit">' + campo.unidade + '</div>' +
      '</div>';
  });

  // Campo de observações — aparece sempre, em tempos e ciclos
  const obsActual = state.formData['observacoes'] || '';
  html += '<div style="margin-top:18px">' +
    '<label style="font-size:12px;font-weight:600;color:var(--txt3);display:block;margin-bottom:6px">Observações</label>' +
    '<textarea id="obsInput" rows="4" style="width:100%;box-sizing:border-box;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--txt);font-size:14px;resize:vertical;font-family:inherit" placeholder="Notas do treinador..." oninput="state.formData[\'observacoes\']=this.value">' + escapeHtml(obsActual) + '</textarea>' +
    '</div>';

  html += '<div class="btn-row" style="margin-top:18px">';
  if (state.formStep === 'tempos') {
    html += '<button class="btn btn-primary" onclick="avancarParaCiclos()">Continuar para ciclos →</button>';
  } else {
    html += '<button class="btn btn-primary" onclick="guardarAnalise()">Concluir e ver relatório</button>';
  }
  html += '</div>';

  return html;
}

function renderFormularioData() {
  const tabs = [
    { id: 'data', label: '1. Data e opções' },
    { id: 'tempos', label: '2. Tempos' },
    { id: 'ciclos', label: '3. Ciclos' },
  ];
  let html = '<div class="form-tabs">';
  tabs.forEach(function (tab) {
    const isActive = tab.id === 'data';
    html += '<button class="form-tab' + (isActive ? ' active' : '') + '" onclick="irParaPasso(\'' + tab.id + '\')">' + tab.label + '</button>';
  });
  html += '</div>';

  html += '<div class="step-title">Data da prova</div>';
  html += '<div class="field"><label>Data da prova</label><input type="date" id="dataProvaInput" value="' + state.dataProva + '" oninput="onDataProvaInput(this)"></div>';
  html += '<div class="field" style="margin-top:10px"><label>Local da prova</label><input type="text" placeholder="ex: Piscina Municipal de Lisboa" value="' + escapeHtml(state.localProva || '') + '" oninput="onLocalProvaInput(this)" maxlength="100"></div>';

  const estilo = state.novaAnalise ? state.novaAnalise.estilo : null;
  const éBrucos = estilo === 'BRUCOS';
  const éCostasOuBrucos = estilo === 'COSTAS' || estilo === 'BRUCOS';

  // Forçar estado correto para estilos onde estas opções não se aplicam
  if (éBrucos) state.incluirOndulacoes = false;
  if (éCostasOuBrucos) state.incluirRespiracoes = false;

  if (!éBrucos) {
    html += '<div class="compare-toggle" style="margin-top:18px"><div><div class="ct-label">Incluir ondulações</div>' +
      '<div class="ct-sub">Conta movimentos ondulatórios pós-partida e pós-viragem</div></div>' +
      '<label class="switch"><input type="checkbox" ' + (state.incluirOndulacoes ? 'checked' : '') + ' onchange="toggleIncluirOndulacoes(this.checked)"><span class="slider"></span></label></div>';
  }

  if (!éCostasOuBrucos) {
    html += '<div class="compare-toggle"><div><div class="ct-label">Incluir respirações</div>' +
      '<div class="ct-sub">Conta respirações por troço e se respirou perto da chegada</div></div>' +
      '<label class="switch"><input type="checkbox" ' + (state.incluirRespiracoes ? 'checked' : '') + ' onchange="toggleIncluirRespiracoes(this.checked)"><span class="slider"></span></label></div>';
  }

  html += '<button class="btn btn-primary" style="margin-top:8px" onclick="avancarParaTempos()">Continuar para tempos →</button>';
  return html;
}

function toggleIncluirOndulacoes(checked) {
  state.incluirOndulacoes = checked;
}
function toggleIncluirRespiracoes(checked) {
  state.incluirRespiracoes = checked;
}

function onDataProvaInput(input) {
  state.dataProva = input.value;
}

function onLocalProvaInput(input) {
  state.localProva = input.value;
}

function avancarParaTempos() {
  if (!state.dataProva) { toast('Indica a data da prova'); return; }
  flushInputsVisiveis();
  state.formStep = 'tempos';
  render();
}

function onFormInput(input) {
  const field = input.dataset.field;
  state.formData[field] = input.value;
}

function onBooleanInput(fieldId, valor) {
  // Fazer flush de todos os inputs de texto visíveis antes de atualizar o
  // estado — evita que valores ainda por guardar desapareçam quando o
  // render() reconstrói o formulário.
  flushInputsVisiveis();
  state.formData[fieldId] = valor;
  if (state.screen === 'marcarVideo') {
    renderVideoMarkSection();
  } else {
    render();
  }
}

// Lê todos os inputs de texto/número visíveis no DOM e garante que os seus
// valores estão guardados em state.formData, mesmo que o utilizador não
// tenha saído do campo (o evento 'oninput' pode não ter disparado ainda).
function flushInputsVisiveis() {
  document.querySelectorAll('input[data-field]').forEach(function (el) {
    const field = el.dataset.field;
    if (!field) return;
    if (el.dataset.rawValue !== undefined) {
      // campo de tempo: usar o rawValue que já está processado
      if (el.dataset.rawValue !== '' && state.formData[field] === undefined) {
        state.formData[field] = el.dataset.rawValue;
      }
    } else {
      if (el.value !== '' && state.formData[field] === undefined) {
        state.formData[field] = el.value;
      }
    }
  });
}

// Campo de tempo "estilo cronómetro": o utilizador digita só dígitos em
// sequência (sem pontuação), e o campo formata-se sozinho em m:ss,cc.
// Lido da direita: últimos 2 dígitos = centésimos, 2 seguintes = segundos,
// o que sobra à esquerda = minutos. O valor guardado em state.formData
// é sempre em segundos decimais (ex: "64.53"), para os cálculos não mudarem.
function onTempoInput(input) {
  const field = input.dataset.field;
  const valorAnterior = input.dataset.rawValue || '';
  const valorAtual = input.value;
  const digitosAntigos = input.dataset.digitos || '';

  let digitos;
  if (valorAtual.length > valorAnterior.length) {
    // utilizador escreveu — o(s) caráter(es) novo(s) é o que foi acrescentado ao fim
    const acrescentado = valorAtual.slice(valorAnterior.length).replace(/\D/g, '');
    digitos = digitosAntigos + acrescentado;
  } else if (valorAtual.length < valorAnterior.length) {
    // utilizador apagou (backspace) — remove o último dígito
    digitos = digitosAntigos.slice(0, -1);
  } else {
    // mesmo comprimento (ex: selecionou tudo e escreveu por cima) — reconstrói do zero
    digitos = valorAtual.replace(/\D/g, '');
  }
  digitos = digitos.slice(-6); // limite razoável: até 99:99,99

  if (!digitos) {
    input.value = '';
    input.dataset.digitos = '';
    input.dataset.rawValue = '';
    delete state.formData[field];
    return;
  }

  const segundosDecimais = digitosParaSegundos(digitos);
  state.formData[field] = String(segundosDecimais);
  const formatado = fmtTempoInput(segundosDecimais, digitos);
  input.value = formatado;
  input.dataset.digitos = digitos;
  input.dataset.rawValue = formatado;
}

// Converte a string de dígitos (lida da direita: cc, ss, mm...) em segundos decimais.
function digitosParaSegundos(digitos) {
  digitos = digitos.replace(/\D/g, '');
  if (!digitos) return 0;
  const cc = digitos.slice(-2).padStart(2, '0');
  const resto = digitos.slice(0, -2);
  const ss = resto.slice(-2).padStart(2, '0');
  const mm = resto.slice(0, -2) || '0';
  return parseInt(mm, 10) * 60 + parseInt(ss, 10) + parseInt(cc, 10) / 100;
}

// Formata segundos decimais (ou a string de dígitos em digitação) para m:ss,cc.
function fmtTempoInput(valor, digitosEmCurso) {
  if (digitosEmCurso !== undefined) {
    const cc = digitosEmCurso.slice(-2).padStart(2, '0');
    const resto = digitosEmCurso.slice(0, -2);
    if (!resto) return '0:00,' + cc; // mostra zeros enquanto só há centésimos
    const ss = resto.slice(-2).padStart(2, '0');
    const mm = resto.slice(0, -2);
    return (mm || '0') + ':' + ss + ',' + cc;
  }
  if (valor === '' || valor === null || valor === undefined) return '';
  const s = parseFloat(valor);
  if (isNaN(s)) return '';
  const mm = Math.floor(s / 60);
  const ss = Math.floor(s % 60);
  const cc = Math.round((s - Math.floor(s)) * 100);
  return mm + ':' + String(ss).padStart(2, '0') + ',' + String(cc).padStart(2, '0');
}

// Converte segundos decimais de volta para a string de dígitos equivalente
// (inverso de digitosParaSegundos), usado para inicializar data-digitos
// quando o campo já tem um valor (ex: ao editar uma análise existente).
function segundosParaDigitos(valorSegundos) {
  const s = parseFloat(valorSegundos);
  if (isNaN(s)) return '';
  const mm = Math.floor(s / 60);
  const ss = Math.floor(s % 60);
  const cc = Math.round((s - Math.floor(s)) * 100);
  return String(mm) + String(ss).padStart(2, '0') + String(cc).padStart(2, '0');
}

function avancarParaCiclos() {
  flushInputsVisiveis();
  state.formStep = 'ciclos';
  render();
}

function irParaPasso(passo) {
  if (passo === state.formStep) return; // já estamos aqui, nada a fazer
  flushInputsVisiveis();
  if (passo === 'data' && !state.dataProva) { toast('Indica a data da prova'); return; }
  state.formStep = passo;
  render();
}

function guardarAnalise() {
  const estilo = state.novaAnalise.estilo, distancia = state.novaAnalise.distancia, tamanhoPiscina = state.novaAnalise.tamanhoPiscina;

  // Em piscina 50m o último troço de nado limpo termina nos -5m da chegada
  // (mesmo instante que seg_chegada). Copiar automaticamente para que os
  // cálculos funcionem sem pedir o dado duas vezes ao utilizador.
  if (tamanhoPiscina === 50 && !state.formData['seg_chegada']) {
    const campos = gerarCamposInput(estilo, distancia, tamanhoPiscina, false, false);
    // Usar só os troços gerados pelo loop (tt_p1, tt_p2, etc.) não os intermédios (tt_25m, etc.)
    const troços = campos.tempos.filter(function(c) { return !c.isHeader && c.id && /^tt_p\d+$/.test(c.id); });
    const ultimoTroco = troços[troços.length - 1];
    if (ultimoTroco && state.formData[ultimoTroco.id]) {
      state.formData['seg_chegada'] = state.formData[ultimoTroco.id];
    }
  }

  // Para análises de 200m Estilos: remover IDs antigos (tt_p1, tt_p2, tt_p3, tt_p4)
  // que podem coexistir com os novos (tt_45m, tt_95m, etc.) após regravar
  if (distancia === 200 && tamanhoPiscina === 50 && estilo === 'ESTILOS') {
    ['tt_p1','tt_p2','tt_p3','tt_p4'].forEach(function(id) { delete state.formData[id]; });
  }

  const metrics = calcularMetricas(estilo, distancia, state.formData, tamanhoPiscina);

  const campos = gerarCamposInput(estilo, distancia, tamanhoPiscina, state.incluirOndulacoes, state.incluirRespiracoes);
  const camposBooleanPorPreencher = campos.ciclos.filter(function (c) {
    return c.tipo === 'boolean' && state.formData[c.id] === undefined;
  });

  if (camposBooleanPorPreencher.length) {
    toast('Por preencher: ' + camposBooleanPorPreencher[0].label);
    return;
  }

  if (!metrics.tempoTotal) {
    showConfirm('Tempo total em falta', 'Não inseriste o tempo total da prova. Continuar mesmo assim?', function () {
      finalizarGuardarAnalise(estilo, distancia, metrics);
    });
    return;
  }
  finalizarGuardarAnalise(estilo, distancia, metrics);
}

function finalizarGuardarAnalise(estilo, distancia, metrics) {
  const obs = state.formData['observacoes'] || null;
  const dadosBrutos = Object.assign({}, state.formData);
  delete dadosBrutos['observacoes']; // guardar separado, não nos dadosBrutos
  const dados = {
    estilo: estilo, distancia: distancia,
    tamanhoPiscina: state.novaAnalise.tamanhoPiscina,
    dadosBrutos: dadosBrutos,
    tempoTotal: metrics.tempoTotal,
    dataProva: state.dataProva,
    localProva: state.localProva || null,
    observacoes: obs,
  };
  let analise;
  if (state.editandoAnaliseId) {
    analise = updateAnalise(state.swimmerId, state.editandoAnaliseId, dados);
    toast('Análise atualizada');
  } else {
    analise = addAnalise(state.swimmerId, dados);
    toast('Análise guardada');
  }
  state.editandoAnaliseId = null; state.editandoSemVideo = false;
  state.formDataProva = null;
  nav('relatorio', { swimmerId: state.swimmerId, verAnaliseId: analise.id, compararPB: false });
}

/* ---------- ECRÃ: marcar tempos a partir de vídeo ---------- */

function abrirMarcarVideo() {
  state.video.objectUrl = null;
  state.video.tempoPartidaAbsoluto = null;
  state.video.indiceMarcacaoAtual = 0;
  nav('marcarVideo');
}

function fecharVideo() {
  if (state.video.objectUrl) {
    try { URL.revokeObjectURL(state.video.objectUrl); } catch (e) {}
  }
  state.video.objectUrl = null;
  state.video.tempoPartidaAbsoluto = null;
  state.video.indiceMarcacaoAtual = 0;
  state.video.modo = 'tempos';
}

function onVideoFileSelected(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  state.video.objectUrl = URL.createObjectURL(file);
  state.video.tempoPartidaAbsoluto = null;
  state.video.indiceMarcacaoAtual = 0;
  render();
  setTimeout(function () { ligarListenersVideo(); renderVideoMarkSection(); }, 50);
}

// Lista sequencial (achatada, sem cabeçalhos) dos campos de tempo a marcar,
// na mesma ordem cronológica usada no formulário manual.
function listaPontosParaMarcar() {
  const campos = gerarCamposInput(state.novaAnalise.estilo, state.novaAnalise.distancia, state.novaAnalise.tamanhoPiscina, state.incluirOndulacoes, state.incluirRespiracoes);
  return campos.tempos.filter(function (c) {
    if (c.isHeader) return false;
    // Campos de tempo autoCapturado não aparecem — são preenchidos
    // automaticamente quando se mede a distância correspondente.
    if (c.autoCapturado && c.unidade === 's') return false;
    // Em piscina 50m, seg_chegada coincide com o último troço — não mostrar.
    // O valor é copiado automaticamente ao guardar.
    if (c.id === 'seg_chegada' && state.novaAnalise.tamanhoPiscina === 50) return false;
    return true;
  });
}

function renderMarcarVideo() {
  let html = '';

  if (!state.video.objectUrl) {
    html += '<div class="video-upload-zone" onclick="document.getElementById(\'videoFileInput\').click()">';
    html += '<div style="font-size:15px;font-weight:600;margin-bottom:6px">Escolher vídeo</div>';
    html += '<div style="font-size:13px">Toca para selecionar o vídeo guardado no dispositivo</div>';
    html += '</div>';
    html += '<input type="file" id="videoFileInput" accept="video/*" style="display:none" onchange="onVideoFileSelected(this)">';
    return html;
  }

  // Vídeo
  html += '<div class="video-player-wrap" id="videoPlayerWrap" style="position:relative">' +
    '<video id="videoPlayer" src="' + state.video.objectUrl + '" playsinline></video>' +
    '<canvas id="anotacaoCanvas" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5"></canvas>' +
    '<div class="video-clock-overlay" id="videoClockOverlay">--:--</div>' +
    '<button class="video-zoom-btn" onclick="toggleZoomVideo()" id="videoZoomBtn">' + iconeZoomSvg(false) + '</button>' +
    '</div>';

  html += '<div class="video-zoom-controls" id="videoZoomControls" style="display:none">' +
    '<button onclick="ajustarZoomVideo(-0.5)">−</button>' +
    '<span id="zoomLevelLabel">100%</span>' +
    '<button onclick="ajustarZoomVideo(0.5)">+</button>' +
    '<button onclick="resetZoomVideo()" class="vz-reset">Repor</button>' +
    '</div>';

  html += '<input type="range" class="video-scrubber" id="videoScrubber" min="0" max="100" step="0.01" value="0" oninput="onScrubberInput(this)">';

  html += '<div class="video-controls">' +
    '<button class="vc-frame" onclick="videoFrameStep(-1)">⏮</button>' +
    '<button onclick="videoPlayPause()" id="videoPlayBtn">▶ Play</button>' +
    '<button class="vc-frame" onclick="videoFrameStep(1)">⏭</button>' +
    '</div>';
  html += '</div>';

  html += '<div id="videoMarkSection"></div>';

  return html;
}

// Renderiza só a secção abaixo do player (botão de marcar partida, ou lista
// de pontos) — chamada via innerHTML pontual para nunca recriar o <video>,
// o que destruiria a posição de reprodução atual.
function renderVideoMarkSection() {
  let html = '';
  if (state.video.tempoPartidaAbsoluto === null) {
    html += '<div class="video-step-label">Avança até ao frame exato do sinal de partida</div>';
    html += '<div id="waveformArea"></div>';
    html += '<button class="btn btn-primary" onclick="marcarPartidaVideo()">Marcar este frame como a Partida (t = 0)</button>';
  } else if (state.video.modo === 'ciclos') {
    html += renderVideoModoCiclos();
  } else {
    const pontos = listaPontosParaMarcar();
    html += '<div class="video-step-label">Marca cada ponto pela ordem, avançando o vídeo</div>';
    html += '<div class="video-mark-list">';
    pontos.forEach(function (p, idx) {
      const éDistancia = p.unidade === 'm';
      const marcado = state.formData[p.id] !== undefined;
      const isCurrent = idx === state.video.indiceMarcacaoAtual;
      const valorMostrado = marcado ? (éDistancia ? fmtNum(parseFloat(state.formData[p.id]), 2, ' m') : fmtTempoInput(state.formData[p.id])) : '';
      html += '<div class="video-mark-item' + (isCurrent ? ' is-current' : '') + (marcado ? ' is-marked' : '') + '">' +
        '<div class="vm-label">' + escapeHtml(p.label) + (p.sub ? '<span class="vm-sub">' + escapeHtml(p.sub) + '</span>' : '') + '</div>' +
        '<div class="vm-value">' + valorMostrado + '</div>' +
        '<div class="vm-btns">';
      if (éDistancia) {
        html += '<button class="vm-btn" onclick="abrirCalibracaoDistancia(\'' + p.id + '\')">' + (marcado ? 'Refazer' : 'Medir') + '</button>';
      } else {
        html += '<button class="vm-btn" onclick="marcarPontoVideo(\'' + p.id + '\')">' + (marcado ? 'Refazer' : 'Marcar') + '</button>';
      }
      html += '<button class="vm-btn-manual" onclick="marcarPontoManualmente(\'' + p.id + '\')">Manual</button>';
      html += '</div></div>';
    });
    html += '</div>';
    html += '<button class="btn btn-primary" style="margin-top:14px" onclick="avancarParaCiclosNoVideo()">Continuar para ciclos →</button>';
  }
  // Observações — aparece sempre após a partida estar definida
  if (state.video.tempoPartidaAbsoluto !== null) {
    const obsActual = state.formData['observacoes'] || '';
    html += '<div style="margin-top:18px">' +
      '<label style="font-size:12px;font-weight:600;color:var(--txt3);display:block;margin-bottom:6px">Observações</label>' +
      '<textarea rows="3" style="width:100%;box-sizing:border-box;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--txt);font-size:14px;resize:vertical;font-family:inherit" placeholder="Notas do treinador..." oninput="state.formData[\'observacoes\']=this.value">' + escapeHtml(obsActual) + '</textarea>' +
      '</div>';
  }

  const el = document.getElementById('videoMarkSection');
  if (!el) return;

  // Preserva a posição de scroll do documento e da lista interna: atualizar
  // o innerHTML recria todos os botões, e alguns browsers tentam "trazer à
  // vista" o novo elemento que substitui o que tinha foco — isso faz a
  // página saltar para cima mesmo sem nenhum código nosso pedir scroll.
  const scrollDocAntes = window.scrollY;
  const listaAntiga = el.querySelector('.video-mark-list');
  const scrollListaAntes = listaAntiga ? listaAntiga.scrollTop : 0;
  // Preservar observações antes de re-renderizar
  const obsAnterior = el.querySelector('textarea');
  if (obsAnterior) state.formData['observacoes'] = obsAnterior.value;

  el.innerHTML = html;

  const listaNova = el.querySelector('.video-mark-list');
  if (listaNova) listaNova.scrollTop = scrollListaAntes;
  window.scrollTo(0, scrollDocAntes);
  atualizarEstadoBotoesMarcar();

  // Mostrar waveform se estivermos no passo de marcação de partida
  if (state.video.tempoPartidaAbsoluto === null) {
    renderWaveformArea();
  }
}

function getVideoEl() { return document.getElementById('videoPlayer'); }

function videoPlayPause() {
  const v = getVideoEl();
  if (!v) return;
  if (v.paused) {
    v.play();
    document.getElementById('videoPlayBtn').textContent = '⏸ Pause';
    mostrarToolbarAnotacao(false);
  } else {
    v.pause();
    document.getElementById('videoPlayBtn').textContent = '▶ Play';
    mostrarToolbarAnotacao(true);
  }
}

// Avança/recua um frame. Usa requestVideoFrameCallback quando disponível
// (mais preciso, segue o frame real do vídeo); caso contrário usa um
// incremento fixo de 1/30s como aproximação razoável.
//
// IMPORTANTE: definir v.currentTime é assíncrono — o browser só atualiza
// o valor real depois do evento 'seeked' disparar. Em Safari/iPad esse
// atraso é mais percetível do que noutros browsers, e se o utilizador
// tocar em "Marcar" antes do seek terminar, v.currentTime ainda devolve
// o valor ANTIGO — dando a sensação de que é preciso tocar duas vezes.
// Por isso marcamos o vídeo como "a mover" e só o desmarcamos quando o
// 'seeked' confirma que o novo frame está mesmo disponível.
function videoFrameStep(direcao) {
  const v = getVideoEl();
  if (!v) return;
  v.pause();
  document.getElementById('videoPlayBtn').textContent = '▶ Play';
  mostrarToolbarAnotacao(true);
  const incremento = (typeof v.getVideoPlaybackQuality === 'function') ? (1 / 60) : (1 / 30);
  marcarVideoComoEstabilizando(v);
  v.currentTime = Math.max(0, v.currentTime + direcao * incremento);
  atualizarRelogioVideo();
}

// Liga (uma única vez) o listener que sabe quando o vídeo terminou de
// "assentar" num novo frame após um seek, e usa isso para desbloquear os
// botões de marcação assim que currentTime estiver realmente fiável.
function marcarVideoComoEstabilizando(v) {
  state.video.estabilizando = true;
  atualizarEstadoBotoesMarcar();
  if (!v.dataset.seekedListenerAtivo) {
    v.dataset.seekedListenerAtivo = '1';
    v.addEventListener('seeked', function () {
      state.video.estabilizando = false;
      atualizarRelogioVideo();
      atualizarEstadoBotoesMarcar();
    });
  }
}

// Desativa visualmente os botões de marcação enquanto o vídeo ainda está
// a processar um seek, para impedir capturar um currentTime desatualizado.
function atualizarEstadoBotoesMarcar() {
  const desativar = !!state.video.estabilizando;
  document.querySelectorAll('.vm-btn, .vm-btn-manual').forEach(function (btn) {
    btn.disabled = desativar;
    btn.style.opacity = desativar ? '0.5' : '';
  });
}

function onScrubberInput(input) {
  const v = getVideoEl();
  if (!v) return;
  marcarVideoComoEstabilizando(v);
  v.currentTime = (parseFloat(input.value) / 100) * (v.duration || 0);
  atualizarRelogioVideo();
}

function atualizarRelogioVideo() {
  const v = getVideoEl();
  const overlay = document.getElementById('videoClockOverlay');
  const scrubber = document.getElementById('videoScrubber');
  if (!v || !overlay) return;
  if (scrubber && v.duration) scrubber.value = (v.currentTime / v.duration) * 100;
  if (state.video.tempoPartidaAbsoluto === null) {
    overlay.textContent = fmtTempoInput(v.currentTime) + ' (vídeo)';
  } else {
    const cronometro = v.currentTime - state.video.tempoPartidaAbsoluto;
    overlay.textContent = fmtTempoInput(Math.max(0, cronometro));
  }
}

function marcarPartidaVideo() {
  const v = getVideoEl();
  if (!v) return;
  state.video.tempoPartidaAbsoluto = v.currentTime;
  toast('Partida marcada — cronómetro a 0:00,00');
  renderVideoMarkSection();
  atualizarRelogioVideo();
  removerFocoAtivo();
}

function marcarPontoVideo(pontoId) {
  const v = getVideoEl();
  if (!v || state.video.tempoPartidaAbsoluto === null) return;
  const pontos = listaPontosParaMarcar();
  const idx = pontos.findIndex(function(p) { return p.id === pontoId; });
  if (idx === -1) return;
  const ponto = pontos[idx];
  const cronometro = Math.max(0, v.currentTime - state.video.tempoPartidaAbsoluto);
  state.formData[ponto.id] = String(Math.round(cronometro * 100) / 100);
  state.video.indiceMarcacaoAtual = Math.min(idx + 1, pontos.length - 1);
  toast(ponto.label + ': ' + fmtTempoInput(cronometro));
  renderVideoMarkSection();
  removerFocoAtivo();
}

// Permite inserir manualmente o valor de um ponto, mesmo a meio da análise
// por vídeo — útil quando o vídeo não mostra claramente esse instante/zona.
function marcarPontoManualmente(pontoId) {
  const pontos = listaPontosParaMarcar();
  const idx = pontos.findIndex(function(p) { return p.id === pontoId; });
  if (idx === -1) return;
  const ponto = pontos[idx];
  const éDistancia = ponto.unidade === 'm';
  const valorAtual = state.formData[ponto.id];

  if (éDistancia) {
    showPrompt('Inserir manualmente', ponto.label, 'metros', function (valor) {
      const v = parseFloat(valor.replace(',', '.'));
      if (isNaN(v)) { toast('Valor inválido'); return; }
      state.formData[ponto.id] = String(v);
      state.video.indiceMarcacaoAtual = Math.min(idx + 1, pontos.length - 1);
      renderVideoMarkSection();
    });
  } else {
    showPromptTempo('Inserir manualmente', ponto.label, valorAtual, function (segundos) {
      state.formData[ponto.id] = String(segundos);
      state.video.indiceMarcacaoAtual = Math.min(idx + 1, pontos.length - 1);
      renderVideoMarkSection();
    });
  }
}

// Remove o foco do elemento ativo (normalmente um botão acabado de clicar)
// sem deixar o browser tentar "trazer à vista" esse elemento — isso é o que
// provoca o documento principal a saltar para cima durante a marcação de
// vídeo, mesmo quando o elemento já estava visível dentro da lista interna.
function removerFocoAtivo() {
  if (document.activeElement && document.activeElement !== document.body) {
    try { document.activeElement.blur(); } catch (e) {}
  }
}

// Avança do modo "tempos" (marcar por frame) para o modo "ciclos" dentro do
// MESMO ecrã de vídeo, sem fechar o vídeo — porque contar braçadas/ondulações/
// respirações exige continuar a ver o vídeo, só que aqui são números inseridos
// manualmente (não há "marcar o frame exato" para uma contagem).
function avancarParaCiclosNoVideo() {
  state.video.modo = 'ciclos';
  renderVideoMarkSection();
}

function renderVideoModoCiclos() {
  const campos = gerarCamposInput(state.novaAnalise.estilo, state.novaAnalise.distancia, state.novaAnalise.tamanhoPiscina, state.incluirOndulacoes, state.incluirRespiracoes);
  let html = '<div class="video-step-label">Conta enquanto vês o vídeo e preenche os números</div>';
  html += '<div class="video-mark-list video-mark-list-ciclos">';
  let currentSubgrupo = null;
  campos.ciclos.forEach(function (campo) {
    if (campo.isHeader) { currentSubgrupo = null; return; } // os cabeçalhos de grupo não fazem falta aqui, só há 1 grupo
    if (campo.subgrupo && campo.subgrupo !== currentSubgrupo) {
      currentSubgrupo = campo.subgrupo;
      html += '<div class="video-ciclos-subdivider">' + escapeHtml(campo.subgrupo) + '</div>';
    } else if (!campo.subgrupo) {
      currentSubgrupo = null;
    }
    const val = state.formData[campo.id] !== undefined ? state.formData[campo.id] : '';
    if (campo.tipo === 'boolean') {
      html += '<div class="video-mark-item">' +
        '<div class="vm-label">' + escapeHtml(campo.label) + '</div>' +
        '<div class="bool-toggle">' +
        '<button type="button" class="bool-opt' + (val === 'sim' ? ' selected' : '') + '" onclick="onBooleanInput(\'' + campo.id + '\', \'sim\')">Sim</button>' +
        '<button type="button" class="bool-opt' + (val === 'nao' ? ' selected' : '') + '" onclick="onBooleanInput(\'' + campo.id + '\', \'nao\')">Não</button>' +
        '</div></div>';
    } else {
      html += '<div class="video-mark-item">' +
        '<div class="vm-label">' + escapeHtml(campo.label) + (campo.sub ? '<span class="vm-sub">' + escapeHtml(campo.sub) + '</span>' : '') + '</div>' +
        '<input type="text" inputmode="decimal" class="video-ciclos-input" value="' + val + '" data-field="' + campo.id + '" oninput="onFormInput(this)">' +
        '<div class="ir-unit">' + campo.unidade + '</div>' +
        '</div>';
    }
  });
  html += '</div>';
  html += '<div class="btn-row" style="margin-top:14px">';
  html += '<button class="btn btn-ghost" onclick="voltarParaTemposNoVideo()">← Voltar aos tempos</button>';
  html += '<button class="btn btn-primary" onclick="concluirMarcacaoVideo()">Concluir análise</button>';
  html += '</div>';
  return html;
}

function voltarParaTemposNoVideo() {
  state.video.modo = 'tempos';
  renderVideoMarkSection();
}

function concluirMarcacaoVideo() {
  fecharVideo();
  guardarAnalise();
}

// Liga os listeners do <video> (timeupdate para atualizar o relógio em
// tempo real durante reprodução normal, não só nos passos manuais).
function ligarListenersVideo() {
  const v = getVideoEl();
  if (!v || v.dataset.listenersAtivos) return;
  v.dataset.listenersAtivos = '1';
  v.addEventListener('timeupdate', atualizarRelogioVideo);
  v.addEventListener('loadedmetadata', atualizarRelogioVideo);
  ligarGestosZoomVideo(v);
}

/* ============================================================
   ZOOM / PAN no vídeo principal — pinch com 2 dedos, arrasto com 1
   dedo quando ampliado, e botões +/− para quem usa rato.
   ============================================================ */

const ZOOM_MIN = 1, ZOOM_MAX = 4;

function aplicarTransformZoomVideo() {
  const v = getVideoEl();
  if (!v) return;
  const z = state.video.zoom;
  v.style.transform = 'scale(' + z + ') translate(' + state.video.panX + 'px, ' + state.video.panY + 'px)';
  const wrap = document.getElementById('videoPlayerWrap');
  if (wrap) wrap.classList.toggle('is-zoomed', z > 1);
  const label = document.getElementById('zoomLevelLabel');
  if (label) label.textContent = Math.round(z * 100) + '%';
  const btn = document.getElementById('videoZoomBtn');
  if (btn) btn.innerHTML = iconeZoomSvg(z > 1);
  const controls = document.getElementById('videoZoomControls');
  if (controls) controls.style.display = z > 1 ? 'flex' : 'none';
}

function iconeZoomSvg(ativo) {
  return ativo
    ? '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35M8 11h6"/></svg>'
    : '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35M11 8v6M8 11h6"/></svg>';
}

function toggleZoomVideo() {
  if (state.video.zoom > 1) {
    resetZoomVideo();
  } else {
    state.video.zoom = 2;
    state.video.panX = 0; state.video.panY = 0;
    aplicarTransformZoomVideo();
  }
}
function ajustarZoomVideo(delta) {
  state.video.zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, state.video.zoom + delta));
  if (state.video.zoom === ZOOM_MIN) { state.video.panX = 0; state.video.panY = 0; }
  aplicarTransformZoomVideo();
}
function resetZoomVideo() {
  state.video.zoom = 1; state.video.panX = 0; state.video.panY = 0;
  aplicarTransformZoomVideo();
}

function ligarGestosZoomVideo(v) {
  let pinchDistInicial = null, zoomInicial = 1;
  let arrastoAtivo = false, arrastoInicioX = 0, arrastoInicioY = 0, panInicioX = 0, panInicioY = 0;

  function distanciaToques(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  v.addEventListener('touchstart', function (evt) {
    if (evt.touches.length === 2) {
      pinchDistInicial = distanciaToques(evt.touches);
      zoomInicial = state.video.zoom;
      arrastoAtivo = false;
    } else if (evt.touches.length === 1 && state.video.zoom > 1) {
      arrastoAtivo = true;
      arrastoInicioX = evt.touches[0].clientX;
      arrastoInicioY = evt.touches[0].clientY;
      panInicioX = state.video.panX;
      panInicioY = state.video.panY;
    }
  }, { passive: true });

  v.addEventListener('touchmove', function (evt) {
    if (evt.touches.length === 2 && pinchDistInicial) {
      const distAtual = distanciaToques(evt.touches);
      const fator = distAtual / pinchDistInicial;
      state.video.zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoomInicial * fator));
      if (state.video.zoom === ZOOM_MIN) { state.video.panX = 0; state.video.panY = 0; }
      aplicarTransformZoomVideo();
      evt.preventDefault();
    } else if (arrastoAtivo && evt.touches.length === 1) {
      const dx = (evt.touches[0].clientX - arrastoInicioX) / state.video.zoom;
      const dy = (evt.touches[0].clientY - arrastoInicioY) / state.video.zoom;
      state.video.panX = panInicioX + dx;
      state.video.panY = panInicioY + dy;
      aplicarTransformZoomVideo();
      evt.preventDefault();
    }
  }, { passive: false });

  v.addEventListener('touchend', function (evt) {
    if (evt.touches.length < 2) pinchDistInicial = null;
    if (evt.touches.length === 0) arrastoAtivo = false;
  }, { passive: true });

  // duplo clique/tap para alternar zoom rapidamente (rato/desktop)
  v.addEventListener('dblclick', function () { toggleZoomVideo(); });
}

/* ============================================================
   CALIBRAÇÃO DE DISTÂNCIA — overlay sobre o vídeo
   Mecânica: o utilizador marca 2 pares de pontos (cada par numa
   marca de metro conhecida da corda, um ponto na corda esquerda
   e outro na direita). Os pontos médios desses pares definem os
   extremos de uma linha vermelha perpendicular (a "linha central
   da pista" entre essas duas marcas). O utilizador desliza uma
   bolinha ao longo dessa linha até à posição do nadador; a app
   interpola linearmente entre os dois valores de metro conhecidos.
   Coordenadas guardadas em fração (0–1) do frame do vídeo, para
   serem independentes do tamanho de ecrã.
   ============================================================ */

function abrirCalibracaoDistancia(campoId) {
  const v = getVideoEl();
  if (!v) return;
  v.pause();
  state.calibDistancia = {
    ativo: true, campoDestino: campoId, passo: 'zoom',
    linha1: { metros: null, esq: null, dir: null },
    linha2: { metros: null, esq: null, dir: null },
    t: 0.5,
    zoom: 1, panX: 0, panY: 0,
  };
  renderCalibracaoOverlay();
}

function fecharCalibracaoDistancia() {
  state.calibDistancia.ativo = false;
  const cv = document.getElementById('calibVideo');
  if (cv) { try { cv.pause(); } catch (e) {} }
  const root = document.getElementById('calibRoot');
  if (root) root.remove();
}

function renderCalibracaoOverlay() {
  let root = document.getElementById('calibRoot');
  const jaExiste = !!root;

  if (!jaExiste) {
    root = document.createElement('div');
    root.id = 'calibRoot';
    document.body.appendChild(root);
    const videoOriginal = getVideoEl();
    const srcAtual = videoOriginal ? videoOriginal.currentSrc || videoOriginal.src : '';
    const tempoAtual = videoOriginal ? videoOriginal.currentTime : 0;

    root.innerHTML = '<div class="calib-overlay">' +
      '<div class="calib-header"><div class="ch-title">Medir distância</div><button class="ch-close" onclick="fecharCalibracaoDistancia()">✕</button></div>' +
      '<div class="calib-frame-wrap" id="calibFrameWrap">' +
        '<video id="calibVideo" src="' + srcAtual + '" playsinline muted></video>' +
        '<svg id="calibSvg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>' +
      '</div>' +
      '<div class="calib-footer" id="calibFooter"></div>' +
      '</div>';

    const cv = document.getElementById('calibVideo');
    if (cv) {
      cv.addEventListener('loadedmetadata', function () { cv.currentTime = tempoAtual; desenharCalibracaoSvg(); }, { once: true });
    }
    ligarInteracaoSvg();
  }

  renderCalibFooter();
  desenharCalibracaoSvg();
  aplicarTransformZoomCalib();
}

// Atualiza só o conteúdo do footer (instruções, input de metro, resultado),
// sem nunca tocar no <video> nem no <svg> do player — evita que o vídeo
// recarregue/redimensione e "salte" entre passos da calibração.
function renderCalibFooter() {
  const footer = document.getElementById('calibFooter');
  if (!footer) return;
  const c = state.calibDistancia;
  const instrucoes = {
    zoom: 'Amplia a imagem se precisares de ver melhor as marcas da corda. O zoom fica fixo depois de continuares.',
    linha1_metro: 'Indica a que metro corresponde a 1ª marca de referência que vais usar (ex: 20)',
    linha1_esq: 'Marca essa marca (' + c.linha1.metros + 'm) na corda ESQUERDA',
    linha1_dir: 'Agora marca a MESMA marca (' + c.linha1.metros + 'm) na corda DIREITA',
    linha2_metro: 'Indica a que metro corresponde a 2ª marca de referência (diferente da 1ª, ex: 25)',
    linha2_esq: 'Marca essa marca (' + c.linha2.metros + 'm) na corda ESQUERDA',
    linha2_dir: 'Agora marca a MESMA marca (' + c.linha2.metros + 'm) na corda DIREITA',
    ajustar: 'Arrasta o ponto vermelho até à posição do nadador',
  };

  let html = '';
  if (c.passo === 'zoom') {
    html += '<div class="calib-instruction">' + instrucoes.zoom + '</div>';
    html += '<div class="video-zoom-controls" style="display:flex;margin-bottom:10px">' +
      '<button onclick="ajustarZoomCalib(-0.5)">−</button>' +
      '<span id="calibZoomLevelLabel">' + Math.round(c.zoom * 100) + '%</span>' +
      '<button onclick="ajustarZoomCalib(0.5)">+</button>' +
      '<button onclick="resetZoomCalib()" class="vz-reset">Repor</button>' +
      '</div>';
    html += '<button class="btn btn-primary" onclick="confirmarZoomCalib()">Continuar para marcação →</button>';
  } else if (c.passo === 'linha1_metro' || c.passo === 'linha2_metro') {
    html += '<div class="calib-instruction">' + instrucoes[c.passo] + '</div>';
    const qual = c.passo === 'linha1_metro' ? 1 : 2;
    const valorAtual = qual === 1 ? c.linha1.metros : c.linha2.metros;
    html += '<div class="calib-metro-row">' +
      '<input type="text" inputmode="decimal" id="calibMetroInput" placeholder="metros" value="' + (valorAtual !== null ? valorAtual : '') + '" oninput="onCalibMetroInput(this, ' + qual + ')">' +
      '<button class="btn btn-primary" onclick="confirmarMetroCalib()">Marcar</button>' +
      '</div>';
  } else if (c.passo !== 'ajustar') {
    html += '<div class="calib-instruction">' + instrucoes[c.passo] + '</div>';
    html += '<div class="calib-instruction-sub">Toca no vídeo para marcar o ponto.</div>';
  } else {
    html += '<div class="calib-instruction">' + instrucoes.ajustar + '</div>';
    html += '<div class="calib-result" id="calibResultado">—</div>';
    html += '<button class="btn btn-primary" onclick="confirmarCalibracaoDistancia()">Usar esta posição</button>';
  }
  footer.innerHTML = html;

  const metroInput = document.getElementById('calibMetroInput');
  if (metroInput) {
    setTimeout(function () { metroInput.focus(); }, 100);
    metroInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') confirmarMetroCalib(); });
  }
}

// Zoom é ajustável SÓ no passo inicial 'zoom' — depois de avançar para a
// marcação dos pontos, fica fixo até essa medição terminar (ou ser fechada),
// para os cliques continuarem coerentes com onde o utilizador via a imagem.
function ajustarZoomCalib(delta) {
  const c = state.calibDistancia;
  c.zoom = Math.max(1, Math.min(4, c.zoom + delta));
  if (c.zoom === 1) { c.panX = 0; c.panY = 0; }
  aplicarTransformZoomCalib();
  const label = document.getElementById('calibZoomLevelLabel');
  if (label) label.textContent = Math.round(c.zoom * 100) + '%';
}
function resetZoomCalib() {
  const c = state.calibDistancia;
  c.zoom = 1; c.panX = 0; c.panY = 0;
  aplicarTransformZoomCalib();
  const label = document.getElementById('calibZoomLevelLabel');
  if (label) label.textContent = '100%';
}
function aplicarTransformZoomCalib() {
  const c = state.calibDistancia;
  const wrap = document.getElementById('calibFrameWrap');
  if (!wrap) return;
  const transform = 'scale(' + c.zoom + ') translate(' + c.panX + 'px, ' + c.panY + 'px)';
  const cv = document.getElementById('calibVideo');
  const svg = document.getElementById('calibSvg');
  if (cv) cv.style.transform = transform;
  if (svg) svg.style.transform = transform;
}
function confirmarZoomCalib() {
  state.calibDistancia.passo = 'linha1_metro';
  renderCalibFooter();
}

function onCalibMetroInput(input, qual) {
  const v = parseFloat(input.value);
  if (qual === 1) state.calibDistancia.linha1.metros = isNaN(v) ? null : v;
  else state.calibDistancia.linha2.metros = isNaN(v) ? null : v;
}

function confirmarMetroCalib() {
  const c = state.calibDistancia;
  if (c.passo === 'linha1_metro') {
    if (c.linha1.metros === null) { toast('Indica o metro desta marca'); return; }
    c.passo = 'linha1_esq';
  } else if (c.passo === 'linha2_metro') {
    if (c.linha2.metros === null) { toast('Indica o metro desta marca'); return; }
    if (c.linha2.metros === c.linha1.metros) { toast('Tem de ser um metro diferente do 1º'); return; }
    c.passo = 'linha2_esq';
  }
  renderCalibracaoOverlay();
}

// Converte um clique/touch em coordenadas SVG (0-100) em fração relativa do frame (0-1).
function eventoParaFracao(evt) {
  const svg = document.getElementById('calibSvg');
  const rect = svg.getBoundingClientRect();
  const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
  const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
  return {
    x: Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)),
    y: Math.max(0, Math.min(1, (clientY - rect.top) / rect.height)),
  };
}

function ligarInteracaoSvg() {
  const svg = document.getElementById('calibSvg');
  if (!svg) return;

  // ---- Pinch-to-zoom e pan (SÓ durante o passo 'zoom') ----
  // Depois de confirmarZoomCalib(), o passo muda e estes gestos ficam
  // silenciosos (retornam imediatamente sem fazer nada).
  let pinchDistInicial = null, zoomInicialCalib = 1;
  let panAtivo = false, panInicioX = 0, panInicioY = 0, panInicioStateX = 0, panInicioStateY = 0;

  function distToques(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  svg.addEventListener('touchstart', function (evt) {
    if (state.calibDistancia.passo !== 'zoom') return;
    if (evt.touches.length === 2) {
      pinchDistInicial = distToques(evt.touches);
      zoomInicialCalib = state.calibDistancia.zoom;
      panAtivo = false;
    } else if (evt.touches.length === 1 && state.calibDistancia.zoom > 1) {
      panAtivo = true;
      panInicioX = evt.touches[0].clientX;
      panInicioY = evt.touches[0].clientY;
      panInicioStateX = state.calibDistancia.panX;
      panInicioStateY = state.calibDistancia.panY;
    }
  }, { passive: true });

  svg.addEventListener('touchmove', function (evt) {
    if (state.calibDistancia.passo !== 'zoom') return;
    const c = state.calibDistancia;
    if (evt.touches.length === 2 && pinchDistInicial) {
      const fator = distToques(evt.touches) / pinchDistInicial;
      c.zoom = Math.max(1, Math.min(4, zoomInicialCalib * fator));
      if (c.zoom === 1) { c.panX = 0; c.panY = 0; }
      aplicarTransformZoomCalib();
      const label = document.getElementById('calibZoomLevelLabel');
      if (label) label.textContent = Math.round(c.zoom * 100) + '%';
      evt.preventDefault();
    } else if (panAtivo && evt.touches.length === 1) {
      const dx = (evt.touches[0].clientX - panInicioX) / c.zoom;
      const dy = (evt.touches[0].clientY - panInicioY) / c.zoom;
      c.panX = panInicioStateX + dx;
      c.panY = panInicioStateY + dy;
      aplicarTransformZoomCalib();
      evt.preventDefault();
    }
  }, { passive: false });

  svg.addEventListener('touchend', function (evt) {
    if (evt.touches.length < 2) pinchDistInicial = null;
    if (evt.touches.length === 0) panAtivo = false;
  }, { passive: true });

  // ---- Clique para marcar pontos (todos os passos excepto 'zoom' e 'ajustar') ----
  svg.onclick = function (evt) {
    const c = state.calibDistancia;
    if (c.passo === 'zoom') return; // durante o zoom não marca pontos
    const p = eventoParaFracao(evt);
    if (c.passo === 'linha1_esq') { c.linha1.esq = p; c.passo = 'linha1_dir'; }
    else if (c.passo === 'linha1_dir') { c.linha1.dir = p; c.passo = 'linha2_metro'; }
    else if (c.passo === 'linha2_esq') { c.linha2.esq = p; c.passo = 'linha2_dir'; }
    else if (c.passo === 'linha2_dir') { c.linha2.dir = p; c.passo = 'ajustar'; c.t = 0.5; }
    else return;
    renderCalibracaoOverlay();
  };

  // ---- Arrasto da bolinha vermelha (passo 'ajustar') ----
  let arrastando = false;
  svg.onpointerdown = function (evt) {
    if (state.calibDistancia.passo !== 'ajustar') return;
    const target = evt.target;
    if (target && target.id === 'calibSwimmerDot') {
      arrastando = true;
      try { svg.setPointerCapture(evt.pointerId); } catch (e) {}
      evt.preventDefault();
    }
  };
  svg.onpointermove = function (evt) {
    if (!arrastando) return;
    const p = eventoParaFracao(evt);
    state.calibDistancia.t = projetarTSobreLinha(p);
    desenharCalibracaoSvg();
    evt.preventDefault();
  };
  svg.onpointerup = function (evt) {
    arrastando = false;
    try { svg.releasePointerCapture(evt.pointerId); } catch (e) {}
  };
  svg.onpointercancel = function () { arrastando = false; };
}

// Dados os pontos médios das 2 linhas (extremos da linha vermelha) e um
// ponto P qualquer, devolve o parâmetro t (0–1) da projeção de P sobre essa
// linha — ou seja, "o quanto P está entre o centro1 e o centro2".
function projetarTSobreLinha(p) {
  const c = state.calibDistancia;
  const c1 = pontoMedioCalib(c.linha1.esq, c.linha1.dir);
  const c2 = pontoMedioCalib(c.linha2.esq, c.linha2.dir);
  const dx = c2.x - c1.x, dy = c2.y - c1.y;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return 0.5;
  const t = ((p.x - c1.x) * dx + (p.y - c1.y) * dy) / len2;
  // Permite estender até 50% da distância calibrada para cada lado (t entre
  // -0.5 e 1.5), para cobrir casos em que o nadador já saiu do intervalo
  // visível das duas marcas de referência usadas na calibração.
  return Math.max(-0.5, Math.min(1.5, t));
}
function pontoMedioCalib(a, b) {
  if (!a || !b) return { x: 0.5, y: 0.5 };
  return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
}

function desenharCalibracaoSvg() {
  const svg = document.getElementById('calibSvg');
  if (!svg) return;
  const c = state.calibDistancia;

  // O viewBox é 0–100 quadrado mas o frame real do vídeo normalmente não é
  // quadrado (ex: 16:9), e preserveAspectRatio="none" estica o conteúdo para
  // encher o rectângulo real. Isso faz com que um <circle> (raio igual em X
  // e Y no viewBox) apareça ESTICADO/elíptico no ecrã. Para desenhar pontos
  // visualmente redondos e finos, calculamos o raio em X e em Y separadamente,
  // compensando a proporção real largura/altura do elemento SVG no ecrã.
  const rect = svg.getBoundingClientRect();
  const proporcao = (rect.width > 0 && rect.height > 0) ? (rect.height / rect.width) : 1;
  // raio base pequeno (em % da largura do frame) — pedido explícito: muito mais fino
  const rPontoX = 0.7, rPontoY = rPontoX * proporcao;
  const rBolaX = 0.55, rBolaY = rBolaX * proporcao;
  const espessuraLinha = 0.35; // espessura das linhas, em % da largura do frame

  function elipsePonto(p, rx, ry, classe) {
    return '<ellipse class="' + classe + '" cx="' + (p.x*100) + '" cy="' + (p.y*100) + '" rx="' + rx + '" ry="' + ry + '"/>';
  }

  let elementos = '';
  // linha 1 (amarela)
  if (c.linha1.esq && c.linha1.dir) {
    elementos += '<line class="calib-line-yellow" style="stroke-width:' + espessuraLinha + '" x1="' + (c.linha1.esq.x*100) + '" y1="' + (c.linha1.esq.y*100) + '" x2="' + (c.linha1.dir.x*100) + '" y2="' + (c.linha1.dir.y*100) + '"/>';
  }
  if (c.linha1.esq) elementos += elipsePonto(c.linha1.esq, rPontoX, rPontoY, 'calib-point');
  if (c.linha1.dir) elementos += elipsePonto(c.linha1.dir, rPontoX, rPontoY, 'calib-point');
  // linha 2 (amarela)
  if (c.linha2.esq && c.linha2.dir) {
    elementos += '<line class="calib-line-yellow" style="stroke-width:' + espessuraLinha + '" x1="' + (c.linha2.esq.x*100) + '" y1="' + (c.linha2.esq.y*100) + '" x2="' + (c.linha2.dir.x*100) + '" y2="' + (c.linha2.dir.y*100) + '"/>';
  }
  if (c.linha2.esq) elementos += elipsePonto(c.linha2.esq, rPontoX, rPontoY, 'calib-point');
  if (c.linha2.dir) elementos += elipsePonto(c.linha2.dir, rPontoX, rPontoY, 'calib-point');

  // linha vermelha central + bolinha
  if (c.linha1.esq && c.linha1.dir && c.linha2.esq && c.linha2.dir) {
    const c1 = pontoMedioCalib(c.linha1.esq, c.linha1.dir);
    const c2 = pontoMedioCalib(c.linha2.esq, c.linha2.dir);
    const dx = c2.x - c1.x, dy = c2.y - c1.y;
    // ponto a t qualquer, ao longo da reta que liga c1 (t=0) a c2 (t=1)
    function pontoEmT(t) { return { x: c1.x + dx * t, y: c1.y + dy * t }; }
    const extA = pontoEmT(-0.5), extB = pontoEmT(1.5);

    // extensão (zona extrapolada, fora do intervalo calibrado) — mais ténue
    elementos += '<line class="calib-line-red calib-line-red-ext" style="stroke-width:' + espessuraLinha + '" x1="' + (extA.x*100) + '" y1="' + (extA.y*100) + '" x2="' + (extB.x*100) + '" y2="' + (extB.y*100) + '"/>';
    // segmento principal (entre as duas marcas calibradas) — bem visível, por cima
    elementos += '<line class="calib-line-red" style="stroke-width:' + espessuraLinha + '" x1="' + (c1.x*100) + '" y1="' + (c1.y*100) + '" x2="' + (c2.x*100) + '" y2="' + (c2.y*100) + '"/>';

    if (c.passo === 'ajustar') {
      const p = pontoEmT(c.t);
      elementos += '<ellipse id="calibSwimmerDot" class="calib-swimmer-dot" cx="' + (p.x*100) + '" cy="' + (p.y*100) + '" rx="' + rBolaX + '" ry="' + rBolaY + '"/>';
      const metros = c.linha1.metros + c.t * (c.linha2.metros - c.linha1.metros);
      const resEl = document.getElementById('calibResultado');
      if (resEl) resEl.textContent = fmtNum(metros, 2, ' m');
    }
  }
  svg.innerHTML = elementos;
}

function confirmarCalibracaoDistancia() {
  const c = state.calibDistancia;
  if (c.linha1.metros === null || c.linha2.metros === null) return;
  const metros = c.linha1.metros + c.t * (c.linha2.metros - c.linha1.metros);
  state.formData[c.campoDestino] = String(Math.round(metros * 100) / 100);

  // Capturar automaticamente o tempo do cronómetro neste frame — o vídeo
  // está parado no frame exato do breakout, por isso currentTime já tem o
  // tempo correto. Basta converter para tempo relativo à partida (como os
  // outros campos de tempo da app) e guardar no campo correspondente.
  const v = getVideoEl();
  if (v && state.video.tempoPartidaAbsoluto !== null) {
    const campoTempo = campoDeTempoPorCampoDistancia(c.campoDestino);
    if (campoTempo) {
      const cronometro = Math.max(0, v.currentTime - state.video.tempoPartidaAbsoluto);
      state.formData[campoTempo] = String(Math.round(cronometro * 100) / 100);
      toast('Distância marcada: ' + fmtNum(metros, 2, ' m') + ' · Tempo auto: ' + fmtTempoInput(cronometro));
    } else {
      toast('Distância marcada: ' + fmtNum(metros, 2, ' m'));
    }
  } else {
    toast('Distância marcada: ' + fmtNum(metros, 2, ' m'));
  }

  fecharCalibracaoDistancia();
  renderVideoMarkSection();
}

// Mapeia o campo de distância para o campo de tempo correspondente.
// Quando o utilizador confirma a posição do breakout, o tempo é capturado
// automaticamente a partir do cronómetro do vídeo nesse frame.
function campoDeTempoPorCampoDistancia(campoDistancia) {
  // Breakout pós-partida
  if (campoDistancia === 'distancia_breakout_m') return 'tempo_breakout_s';
  // Entrada das mãos na água (partida de bloco e costas)
  if (campoDistancia === 'distancia_entrada_m') return 'tempo_entrada_maos_s';
  if (campoDistancia === 'distancia_entrada_maos_m') return 'tempo_entrada_maos_s';
  // Breakout pós-viragem: saida_dist_50 → tb_saida_50, etc.
  const matchViragem = campoDistancia.match(/^saida_dist_(\d+)$/);
  if (matchViragem) return 'tb_saida_' + matchViragem[1];
  return null;
}

// Formata um valor numérico para eixos/tooltips de gráficos: no máximo 2 casas
// decimais, sem zeros à direita desnecessários (22 fica "22", não "22.00").
function fmtEixo(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  const r = Math.round(v * 100) / 100;
  return (r % 1 === 0) ? String(r) : r.toFixed(2);
}
// Variante com no máximo 1 casa decimal, para eixos de velocidade, frequência,
// distância/ciclo e tempo de viragem.
function fmtEixo1(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  const r = Math.round(v * 10) / 10;
  return (r % 1 === 0) ? String(r) : r.toFixed(1);
}
function fmtEixo2(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return (Math.round(v * 100) / 100).toFixed(2);
}
// Variante estritamente inteira, para eixos de ciclos e ondulações (contagens).
function fmtEixoInt(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return String(Math.round(v));
}

// O ficheiro exportado é um JSON com todos os dados em bruto (dadosBrutos),
// mais os metadados da análise (nadador, prova, data, local). Quem recebe
// pode importar directamente para o seu SwimMin Lab, para um nadador à escolha.

function exportarDadosAnalise(swimmerId, analiseId) {
  const sw = getSwimmer(swimmerId);
  const an = sw ? sw.analises.find(function(a) { return a.id === analiseId; }) : null;
  if (!an) { toast('Análise não encontrada'); return; }

  const pacote = {
    _swimlab: true,           // marca de identificação do ficheiro
    _versao: '1',
    nadador: {
      nome: sw.nome,
      sexo: sw.sexo || null,
      dataNascimento: sw.dataNascimento || null,
    },
    analise: {
      estilo: an.estilo,
      distancia: an.distancia,
      tamanhoPiscina: an.tamanhoPiscina || 50,
      dataProva: an.dataProva || null,
      localProva: an.localProva || null,
      dadosBrutos: an.dadosBrutos,
    },
  };

  const json = JSON.stringify(pacote, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  const nomeNadador = sw.nome.replace(/\s+/g, '_');
  const nomeProva = an.estilo + an.distancia + 'm_P' + (an.tamanhoPiscina || 50);
  const data = (an.dataProva || '').replace(/-/g, '');
  link.download = 'swimlab_' + nomeNadador + '_' + nomeProva + (data ? '_' + data : '') + '.json';
  link.href = url;
  link.click();
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  toast('Dados exportados — partilha o ficheiro .json');
}

function importarDadosAnalise(swimmerId) {
  let input = document.getElementById('_importInput');
  if (!input) {
    input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,application/json';
    input.id = '_importInput';
    input.style.cssText = 'position:fixed;top:-100px;left:-100px;opacity:0;';
    document.body.appendChild(input);
  }
  input.value = '';
  input.onchange = function() {
    const file = input.files && input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      let pacote;
      try {
        pacote = JSON.parse(e.target.result);
      } catch (err) {
        toast('Ficheiro inválido — não é um JSON válido'); return;
      }
      if (!pacote._swimlab || !pacote.analise) {
        toast('Ficheiro inválido — não é um ficheiro SwimMin Lab'); return;
      }
      const a = pacote.analise;
      const metrics = calcularMetricas(a.estilo, a.distancia, a.dadosBrutos, a.tamanhoPiscina);
      const analise = addAnalise(swimmerId, {
        estilo: a.estilo,
        distancia: a.distancia,
        tamanhoPiscina: a.tamanhoPiscina || 50,
        dadosBrutos: a.dadosBrutos,
        tempoTotal: metrics.tempoTotal,
        dataProva: a.dataProva || null,
        localProva: a.localProva || null,
      });
      toast('Análise importada com sucesso');
      nav('relatorio', { swimmerId: swimmerId, verAnaliseId: analise.id, compararPB: false });
    };
    reader.readAsText(file);
  };
  input.click();
}
