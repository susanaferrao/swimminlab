    '</div>' +
    '<div><div class="card-title" style="margin-bottom:4px">Perfil</div>' +
    (infoLinha.length ? '<div style="font-size:13px;color:var(--txt2)">' + infoLinha.join(' · ') + '</div>' : '<div style="font-size:13px;color:var(--txt3)">Sexo e data de nascimento não definidos</div>') +
    '</div>' +
    '</div>' +
    '<button class="btn btn-ghost btn-sm" onclick="abrirEditarNadador(\'' + sw.id + '\')">Editar</button>' +
    '</div></div>';

  html += '<div class="card"><div class="card-title">Ações</div><div class="btn-row">' +
    '<button class="btn btn-primary" onclick="nav(\'novaAnalise\',{swimmerId:\'' + sw.id + '\'})">+ Nova análise</button>' +
    '<button class="btn btn-ghost btn-sm" onclick="importarDadosAnalise(\'' + sw.id + '\')" style="flex:0 0 auto">Importar dados</button>' +
    '<button class="btn btn-ghost btn-sm" onclick="apagarNadador(\'' + sw.id + '\')" style="flex:0 0 auto">Apagar perfil</button>' +
    '</div></div>';

  // Equipas
  const todasEquipas = getEquipas();
  if (todasEquipas.length) {
    const equipasDoNadador = sw.equipas || [];
    html += '<div class="card"><div class="card-title">Equipas</div>';
    todasEquipas.forEach(function(e) {
      const membro = equipasDoNadador.indexOf(e.id) !== -1;
      html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">' +
        '<div class="swimmer-avatar" style="width:32px;height:32px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);font-size:12px;flex-shrink:0">' +
        escapeHtml((e.nome[0]||'').toUpperCase()) +
        '</div>' +
        '<div style="flex:1;font-size:14px;font-weight:600">' + escapeHtml(e.nome) + (e.escalao ? ' <span style="font-size:11px;color:var(--txt3)">' + escapeHtml(e.escalao) + '</span>' : '') + '</div>' +
        '<button class="btn btn-ghost btn-sm" onclick="toggleEquipaNadador(\'' + sw.id + '\',\'' + e.id + '\')" style="' + (membro ? 'color:var(--accent)' : '') + '">' + (membro ? 'Remover' : 'Adicionar') + '</button>' +
        '</div>';
    });
    html += '</div>';
  }

  if (!sw.analises.length) {
    html += '<div class="empty-state"><p>Ainda não há análises registadas.<br>Cria a primeira para começar a construir o histórico deste nadador.</p></div>';
    return html;
  }

  // agrupar por estilo+distancia+tamanhoPiscina (provas em piscinas diferentes não se comparam)
  const grupos = {};
  sw.analises.forEach(function (a) {
    const tp = a.tamanhoPiscina || 50;
    const k = a.estilo + '_' + a.distancia + '_' + tp;
    if (!grupos[k]) grupos[k] = { estilo: a.estilo, distancia: a.distancia, tamanhoPiscina: tp, lista: [] };
    grupos[k].lista.push(a);
  });

  const ORDEM_ESTILOS_HIST = ["LIVRES","COSTAS","BRUCOS","MARIPOSA","ESTILOS"];
  Object.keys(grupos).sort(function(a,b) {
    var ga=grupos[a],gb=grupos[b];
    var oa=ORDEM_ESTILOS_HIST.indexOf(ga.estilo),ob=ORDEM_ESTILOS_HIST.indexOf(gb.estilo);
    if(oa!==ob) return oa-ob;
    if(ga.distancia!==gb.distancia) return ga.distancia-gb.distancia;
    return ga.tamanhoPiscina-gb.tamanhoPiscina;
  }).forEach(function (k) {
    const g = grupos[k];
    g.lista.sort(function (a, b) { return new Date(b.dataProva || b.criadoEm) - new Date(a.dataProva || a.criadoEm); });
    const melhorId = g.lista.reduce(function (best, a) { return (!best || a.tempoTotal < best.tempoTotal) ? a : best; }, null).id;

    html += '<div class="card"><div class="card-title">' + ESTILOS_LABEL(g.estilo) + ' ' + g.distancia + 'm <span style="color:var(--txt3);font-weight:500">· piscina ' + g.tamanhoPiscina + 'm</span></div>';
    g.lista.forEach(function (a) {
      const isPB = a.id === melhorId && g.lista.length > 1;
      html += '<div class="history-row">' +
        '<div class="history-item' + (isPB ? ' is-pb' : '') + '" onclick="nav(\'relatorio\',{swimmerId:\'' + sw.id + '\',verAnaliseId:\'' + a.id + '\',compararPB:false})">' +
        '<div><div class="hi-date">' + fmtData(a.dataProva || a.criadoEm) + (a.localProva ? ' · ' + escapeHtml(a.localProva) : '') + (a.competicao ? ' · ' + escapeHtml(a.competicao) : '') + (isPB ? '<span class="hi-pb-tag"> · melhor registo</span>' : '') + '</div>' +
        '<div class="hi-time">' + fmtTempo(a.tempoTotal) + '</div></div>' +
        '<div class="chevron">›</div></div>';


      html += '<button class="hi-delete-btn" onclick="apagarAnaliseDoHistorico(\'' + sw.id + '\',\'' + a.id + '\')" aria-label="Apagar análise">' +
        '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/></svg>' +
        '</button>' +
        '</div>';
    });
    html += '</div>';
  });

  return html;
}

// ---- FOTO DO NADADOR ----
// Upload + crop circular interativo (sem bibliotecas externas, usa Canvas API).
// A foto é guardada como base64 JPEG no perfil do nadador (campo `foto`).

let _cropState = null; // estado interno do crop

function abrirUploadFoto(swimmerId) {
  // No Safari/iOS o input[type=file] tem de estar inserido no DOM antes
  // de ser clicado — criá-lo apenas em memória e chamar .click() é bloqueado.
  let input = document.getElementById('_fotoUploadInput');
  if (!input) {
    input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.id = '_fotoUploadInput';
    input.style.cssText = 'position:fixed;top:-100px;left:-100px;opacity:0;';
    document.body.appendChild(input);
  }
  // Remover listener anterior e adicionar novo
  input.onchange = null;
  input.value = '';
  input.onchange = function () {
    const file = input.files && input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (e) {
      mostrarCropFoto(e.target.result, swimmerId);
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function mostrarCropFoto(dataUrl, swimmerId) {
  const img = new Image();
  img.onload = function () {
    // Canvas de trabalho: max 400px de largura para não ser lento no iPad
    const escala = Math.min(1, 380 / img.width, 500 / img.height);
    const W = Math.round(img.width * escala);
    const H = Math.round(img.height * escala);
    const r = Math.round(Math.min(W, H) * 0.4); // raio inicial: 40% do menor lado
    _cropState = {
      img: img, swimmerId: swimmerId,
      W: W, H: H, escala: escala,
      cx: Math.round(W / 2), cy: Math.round(H / 2), r: r,
      drag: false, dragType: null, dragStartX: 0, dragStartY: 0,
      dragStartCx: 0, dragStartCy: 0, dragStartR: 0,
    };

    const root = document.getElementById('modalRoot');
    root.innerHTML =
      '<div class="photo-crop-overlay" id="cropOverlay">' +
        '<div class="photo-crop-title">Ajusta a área que queres mostrar</div>' +
        '<div class="photo-crop-desc">Arrasta para mover · Arrasta a borda para redimensionar · A foto aparece rectangular no relatório</div>' +
        '<canvas id="cropCanvas" class="photo-crop-canvas" width="' + W + '" height="' + H + '"></canvas>' +
        '<div class="photo-crop-btns">' +
          '<button class="photo-crop-btn photo-crop-btn-cancel" onclick="cancelarCropFoto()">Cancelar</button>' +
          '<button class="photo-crop-btn photo-crop-btn-confirm" onclick="confirmarCropFoto()">Usar esta zona</button>' +
        '</div>' +
      '</div>';

    const canvas = document.getElementById('cropCanvas');
    desenharCrop(canvas);
    ligarEventosCrop(canvas);
  };
  img.src = dataUrl;
}

function desenharCrop(canvas) {
  if (!canvas || !_cropState) return;
  const { img, W, H, cx, cy, r } = _cropState;
  const ctx = canvas.getContext('2d');
  // Imagem de fundo escurecida
  ctx.drawImage(img, 0, 0, W, H);
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);
  // Recorte circular nítido
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.clip();
  ctx.drawImage(img, 0, 0, W, H);
  ctx.restore();
  // Borda do círculo
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Alça de redimensionamento (pequeno círculo na borda direita)
  ctx.beginPath();
  ctx.arc(cx + r, cy, 8, 0, Math.PI * 2);
  ctx.fillStyle = 'white';
  ctx.fill();
}

function ligarEventosCrop(canvas) {
  function ponto(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - rect.left) * scaleX, y: (src.clientY - rect.top) * scaleY };
  }
  function inicio(e) {
    e.preventDefault();
    const p = ponto(e);
    const c = _cropState;
    const distBorda = Math.sqrt((p.x - (c.cx + c.r)) ** 2 + (p.y - c.cy) ** 2);
    const distCentro = Math.sqrt((p.x - c.cx) ** 2 + (p.y - c.cy) ** 2);
    c.drag = true;
    c.dragStartX = p.x; c.dragStartY = p.y;
    c.dragStartCx = c.cx; c.dragStartCy = c.cy; c.dragStartR = c.r;
    c.dragType = distBorda < 18 ? 'resize' : (distCentro < c.r ? 'move' : null);
    if (!c.dragType) c.drag = false;
  }
  function mover(e) {
    if (!_cropState || !_cropState.drag) return;
    e.preventDefault();
    const p = ponto(e);
    const c = _cropState;
    const dx = p.x - c.dragStartX, dy = p.y - c.dragStartY;
    if (c.dragType === 'move') {
      c.cx = Math.max(c.r, Math.min(c.W - c.r, c.dragStartCx + dx));
      c.cy = Math.max(c.r, Math.min(c.H - c.r, c.dragStartCy + dy));
    } else if (c.dragType === 'resize') {
      const novoR = Math.max(30, Math.min(
        Math.min(c.cx, c.W - c.cx, c.cy, c.H - c.cy),
        c.dragStartR + dx
      ));
      c.r = novoR;
    }
    desenharCrop(canvas);
  }
  function fim() { if (_cropState) _cropState.drag = false; }

  canvas.addEventListener('mousedown', inicio);
  canvas.addEventListener('mousemove', mover);
  canvas.addEventListener('mouseup', fim);
  canvas.addEventListener('touchstart', inicio, { passive: false });
  canvas.addEventListener('touchmove', mover, { passive: false });
  canvas.addEventListener('touchend', fim);
}

function confirmarCropFoto() {
  if (!_cropState) return;
  const { img, cx, cy, r, escala } = _cropState;

  const srcX = Math.max(0, (cx - r) / escala);
  const srcY = Math.max(0, (cy - r) / escala);
  const srcW = Math.min(img.width - srcX, (r * 2) / escala);
  const srcH = Math.min(img.height - srcY, (r * 2) / escala);

  // Guardar exactamente em proporção 4:5 (igual ao espaço no cabeçalho: 130×160)
  // — assim o browser não precisa de redimensionar na impressão e não distorce.
  const DEST_W = 520; // 4× a largura visual (130px) para boa qualidade
  const DEST_H = 640; // 4× a altura visual (160px)
  const offscreen = document.createElement('canvas');
  offscreen.width = DEST_W;
  offscreen.height = DEST_H;
  const ctx = offscreen.getContext('2d');
  ctx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, DEST_W, DEST_H);
  const fotoBase64 = offscreen.toDataURL('image/png');

  const db = loadDB();
  const sw = db.swimmers.find(function(s) { return s.id === _cropState.swimmerId; });
  if (!sw) { toast('Nadador não encontrado'); _cropState = null; return; }
  sw.foto = fotoBase64;
  saveDB(db);
  _cropState = null;
  document.getElementById('modalRoot').innerHTML = '';
  render();
}

function cancelarCropFoto() {
  _cropState = null;
  document.getElementById('modalRoot').innerHTML = '';
}

// Gera o HTML do avatar — foto circular se existir, iniciais caso contrário.
function avatarHtml(sw, tamanho, extra) {
  tamanho = tamanho || 44;
  extra = extra || '';
  return '<div class="swimmer-avatar" style="width:' + tamanho + 'px;height:' + tamanho + 'px;font-size:' + Math.round(tamanho * 0.36) + 'px;' + extra + '">' + iniciais(sw ? sw.nome : '?') + '</div>';
}

// ---- WAVEFORM E DETEÇÃO DE SINAL DE PARTIDA ----

// Extrai o áudio do vídeo e gera um waveform normalizado.
// Usa Web Audio API — funciona com o objectUrl do vídeo já carregado.
function extrairWaveform() {
  if (!state.video.objectUrl || state.video.waveform) return;
  const v = getVideoEl();
  if (!v) return;

  const areaEl = document.getElementById('waveformArea');
  areaEl.innerHTML = '<div class="waveform-analyzing">A analisar o áudio...</div>';

  fetch(state.video.objectUrl)
    .then(function(r) { return r.arrayBuffer(); })
    .then(function(buf) {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) throw new Error('não suportado');
      const ctx = new AudioCtx();
      return ctx.decodeAudioData(buf).then(function(decoded) {
        ctx.close();
        return decoded;
      });
    })
    .then(function(audioBuf) {
      const frameMs = 50;
      const sr = audioBuf.sampleRate;
      const frameSize = Math.round(sr * frameMs / 1000);
      const nFrames = Math.floor(audioBuf.length / frameSize);
      const nCh = audioBuf.numberOfChannels;
      const waveform = new Float32Array(nFrames);

      for (let f = 0; f < nFrames; f++) {
        let rms = 0;
        for (let ch = 0; ch < nCh; ch++) {
          const data = audioBuf.getChannelData(ch);
          for (let i = 0; i < frameSize; i++) {
            const s = data[f * frameSize + i];
            rms += s * s;
          }
        }
        waveform[f] = Math.sqrt(rms / (frameSize * nCh));
      }

      const maxVal = Math.max.apply(null, Array.from(waveform));
      if (maxVal > 0) { for (let i = 0; i < waveform.length; i++) waveform[i] /= maxVal; }

      state.video.waveform = waveform;
      state.video.waveformDuracao = audioBuf.duration;
      state.video.waveformSugestao = detetarSinalPartida(waveform, audioBuf.duration);
      renderVideoMarkSection();
    })
    .catch(function(err) {
      console.warn('Waveform não disponível:', err);
      // Mostrar waveform manual — sem análise automática, mas o utilizador
      // pode usar o vídeo normalmente para identificar a partida
      areaEl.innerHTML = '<div class="waveform-analyzing">Análise de áudio não disponível neste browser ou formato de vídeo. Avança o vídeo manualmente até ao frame da partida.</div>';
    });
}


// Detetar o sinal de partida: procura um pico breve e abrupto (apito/buzzer)
// após um período de silêncio relativo, ignorando sons prolongados como vozes.
// 
// A diferença entre "aos seus lugares" (voz) e o apito:
// - Voz: amplitude alta durante vários segundos, sobe gradualmente
// - Apito/buzzer: spike muito curto (<500ms), sobe e desce abruptamente
//
// Estratégia:
// 1. Calcular nível de "ruído de fundo" dos primeiros 3s
// 2. Procurar janelas de 500ms onde a amplitude média é alta
// 3. Preferir janelas onde a amplitude ANTES (300ms) é baixa — início abrupto
// 4. Ignorar regiões prolongadas de alta amplitude (voz)
function detetarSinalPartida(waveform, duracao) {
  const frameMs = 50;
  const n = waveform.length;
  const framesP3s = Math.round(3000 / frameMs);

  // Nível de fundo (silêncio) nos primeiros 3s
  let somaFundo = 0;
  for (let i = 0; i < Math.min(framesP3s, n); i++) somaFundo += waveform[i];
  const nivelFundo = somaFundo / Math.min(framesP3s, n);

  // Limiar para considerar "som relevante": 3× o fundo, mínimo 10%
  const limiar = Math.max(nivelFundo * 3, 0.10);

  // Janelas de análise: 300ms antes (deve ser baixo) e 300ms depois (pode ser alto)
  const framesAntes = Math.round(300 / frameMs); // ~6 frames
  const framesDepois = Math.round(500 / frameMs); // ~10 frames

  let melhorCandidato = null;
  let melhorPontuacao = -1;

  for (let i = framesP3s + framesAntes; i < n - framesDepois; i++) {
    // Amplitude actual
    const ampAtual = waveform[i];
    if (ampAtual < limiar) continue;

    // Média dos frames ANTES — deve ser baixa (silêncio antes do apito)
    let somaAntes = 0;
    for (let j = i - framesAntes; j < i; j++) somaAntes += waveform[j];
    const mediaAntes = somaAntes / framesAntes;

    // Média dos frames DEPOIS — deve cair rapidamente (apito é curto)
    let somaDepois = 0;
    for (let j = i + 1; j < i + framesDepois; j++) somaDepois += waveform[j];
    const mediaDepois = somaDepois / framesDepois;

    // Pontuação: favorece picos com silêncio antes (ratio alto/antes),
    // e que não se prolonguem demasiado (penaliza alta amplitude depois)
    const ratioSubida = mediaAntes > 0 ? ampAtual / mediaAntes : ampAtual / 0.01;
    const brevidade = 1 / (1 + mediaDepois); // quanto mais curto, melhor
    const pontuacao = ratioSubida * brevidade * ampAtual;

    if (pontuacao > melhorPontuacao) {
      melhorPontuacao = pontuacao;
      melhorCandidato = i;
    }
  }

  return melhorCandidato !== null ? (melhorCandidato * frameMs) / 1000 : null;
}

// Desenha o waveform num canvas, com:
// - linha do cursor (posição atual do vídeo)
// - marca da sugestão automática (a amarelo)
// - marca da partida confirmada (a verde)
function desenharWaveform(canvas) {
  if (!canvas || !state.video.waveform) return;
  const wf = state.video.waveform;
  const duracao = state.video.waveformDuracao;
  const W = canvas.width = canvas.offsetWidth || 320;
  const H = canvas.height = 80;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  // Fundo
  ctx.fillStyle = 'transparent';
  ctx.fillRect(0, 0, W, H);

  // Janela temporal: ±10s em torno da posição atual do vídeo
  const v = getVideoEl();
  const tAtual = v ? v.currentTime : 0;
  const MEIO = 10; // segundos de cada lado
  const janela = MEIO * 2;
  const inicio = Math.max(0, Math.min(duracao - janela, tAtual - MEIO));
  const fim = inicio + janela;

  function tempoParaX(t) { return ((t - inicio) / janela) * W; }

  // Desenhar waveform
  const frameMs = 50;
  ctx.beginPath();
  const meiH = H / 2;
  for (let x = 0; x < W; x++) {
    const t = inicio + (x / W) * janela;
    const frameIdx = Math.round(t * 1000 / frameMs);
    const amp = (frameIdx >= 0 && frameIdx < wf.length) ? wf[frameIdx] : 0;
    const h = amp * meiH * 0.9;
    if (x === 0) ctx.moveTo(x, meiH - h);
    else ctx.lineTo(x, meiH - h);
  }
  // Espelhar para baixo
  for (let x = W - 1; x >= 0; x--) {
    const t = inicio + (x / W) * janela;
    const frameIdx = Math.round(t * 1000 / frameMs);
    const amp = (frameIdx >= 0 && frameIdx < wf.length) ? wf[frameIdx] : 0;
    const h = amp * meiH * 0.9;
    ctx.lineTo(x, meiH + h);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,150,199,0.4)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,150,199,0.8)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Linha de sugestão (amarelo)
  if (state.video.waveformSugestao !== null) {
    const x = tempoParaX(state.video.waveformSugestao);
    ctx.strokeStyle = '#f4762a';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    ctx.setLineDash([]);
  }

  // A posição actual está sempre ao centro (a janela move-se com o vídeo),
  // por isso a linha branca é sempre vertical ao meio do canvas.
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H); ctx.stroke();

  // Labels de tempo
  ctx.font = '9px system-ui';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.textAlign = 'left';
  ctx.fillText(fmtNum(inicio, 1, 's'), 4, H - 4);
  ctx.textAlign = 'right';
  ctx.fillText(fmtNum(fim, 1, 's'), W - 4, H - 4);
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.fillText(fmtNum(tAtual, 2, 's'), W / 2, H - 4);
}

function onWaveformClick(evt) {
  const canvas = evt.currentTarget;
  const rect = canvas.getBoundingClientRect();
  const x = (evt.touches ? evt.touches[0].clientX : evt.clientX) - rect.left;
  const fracao = x / rect.width;
  const duracao = state.video.waveformDuracao;
  const vEl = getVideoEl();
  const tAtual = vEl ? vEl.currentTime : 0;
  const MEIO = 10;
  const janela = MEIO * 2;
  const inicio = Math.max(0, Math.min(duracao - janela, tAtual - MEIO));
  const t = inicio + fracao * janela;
  const tFinal = Math.max(0, Math.min(vEl ? vEl.duration : duracao, t));
  // Mover o vídeo para o ponto clicado
  if (vEl) { vEl.currentTime = tFinal; }
  // Mover a linha tracejada (sugestão) para este ponto — o utilizador
  // indica visualmente onde está a partida, e a linha segue o clique.
  state.video.waveformSugestao = tFinal;
  // Actualizar o painel de sugestão com o novo tempo
  renderWaveformArea();
}

function usarSugestaoPartida() {
  const t = state.video.waveformSugestao;
  if (t === null) return;
  const v = getVideoEl();
  if (v) {
    v.currentTime = t;

function renderSelecaoProva() {
  const estilos = [
    { id: 'LIVRES', nome: 'Livres' }, { id: 'COSTAS', nome: 'Costas' },
    { id: 'BRUCOS', nome: 'Bruços' }, { id: 'MARIPOSA', nome: 'Mariposa' },
    { id: 'ESTILOS', nome: 'Estilos' },
  ];
  const distanciasPorEstilo = {
    LIVRES: [50,100,200,400,800,1500], COSTAS: [50,100,200,400,800,1500],
    BRUCOS: [50,100,200,400,800,1500], MARIPOSA: [50,100,200,400,800,1500],
    ESTILOS: [200,400],
  };
  const p = state.novaAnalise.tamanhoPiscina;
  const e = state.novaAnalise.estilo;
  const d = state.novaAnalise.distancia;

  let html = '<div class="card"><div class="card-title">1. Tamanho da piscina</div><div class="style-grid">';
  TAMANHOS_PISCINA.forEach(function (tp) {
    html += '<div class="style-card' + (p === tp ? ' selected' : '') + '" onclick="selecionarTamanhoPiscina(' + tp + ')">Piscina ' + tp + 'm</div>';
  });
  html += '</div></div>';

  if (p) {
    html += '<div class="card"><div class="card-title">2. Estilo</div><div class="style-grid">';
    estilos.forEach(function (es) {
      html += '<div class="style-card' + (e === es.id ? ' selected' : '') + '" onclick="selecionarEstilo(\'' + es.id + '\')">' + es.nome + '</div>';
    });
    html += '</div></div>';
  }

  if (p && e) {
    html += '<div class="card"><div class="card-title">3. Distância</div><div class="dist-grid">';
    distanciasPorEstilo[e].forEach(function (dist) {
      html += '<div class="dist-card' + (d === dist ? ' selected' : '') + '" onclick="selecionarDistancia(' + dist + ')">' + dist + 'm</div>';
    });
    html += '</div></div>';
  }

  if (e && p && d) {
    html += '<button class="btn btn-primary" onclick="clicarContinuarSelecaoProva()">Continuar →</button>';
  }
  return html;
}

function mesmaProva(a, b) {
  return !!a && !!b && a.estilo === b.estilo && a.distancia === b.distancia && a.tamanhoPiscina === b.tamanhoPiscina;
}

function clicarContinuarSelecaoProva() {
  const provaAtual = { estilo: state.novaAnalise.estilo, distancia: state.novaAnalise.distancia, tamanhoPiscina: state.novaAnalise.tamanhoPiscina };
  const temDadosEmCurso = state.formData && Object.keys(state.formData).length > 0 && !state.editandoAnaliseId;

  if (temDadosEmCurso && mesmaProva(state.formDataProva, provaAtual)) {
    showConfirm('Continuar análise em curso?', 'Já tens dados preenchidos para esta prova. Escolhe "Confirmar" para continuar de onde estavas, ou fecha esta mensagem e toca em "Recomeçar" para começar do zero.', function () {
      nav('marcarVideo');
    });
    // adiciona um botão extra de "recomeçar do zero" ao modal já aberto
    const btnRow = document.querySelector('.modal-box .btn-row');
    if (btnRow) {
      const btnRecomeçar = document.createElement('button');
      btnRecomeçar.className = 'btn btn-ghost';
      btnRecomeçar.style.borderColor = 'rgba(239,68,68,0.3)';
      btnRecomeçar.style.color = '#f29999';
      btnRecomeçar.textContent = 'Recomeçar do zero';
      btnRecomeçar.onclick = function () { closeModal(); iniciarFormulario(); };
      btnRow.appendChild(btnRecomeçar);
    }
    return;
  }

  iniciarFormulario();
}

  state.novaAnalise.distancia = null;

}
function selecionarEstilo(estilo) {
  state.novaAnalise.estilo = estilo;
  state.novaAnalise.distancia = null;
  render();
}
function selecionarDistancia(distancia) {
  state.novaAnalise.distancia = distancia;

}
function iniciarFormulario() {
  state.formData = {};

  state.formStep = 'data';
  state.dataProva = new Date().toISOString().slice(0, 10);

function regravarDadosSemVideo(swimmerId, analiseId) {
  const sw = getSwimmer(swimmerId);

  if (!an) return;
  state.novaAnalise = { estilo: an.estilo, distancia: an.distancia, tamanhoPiscina: an.tamanhoPiscina || 50 };
  const dados = Object.assign({}, an.dadosBrutos || {});

  // Migrar IDs igual ao regravarDadosAnalise
  if (an.distancia === 200 && (an.tamanhoPiscina || 50) === 50) {
    var migrarTempos = { 'tt_45m': 'tt_p1', 'tt_95m': 'tt_p2', 'tt_145m': 'tt_p3', 'tt_195m': 'tt_p4',

    Object.keys(migrarTempos).forEach(function(antigo) {
      if (dados[antigo] !== undefined && dados[migrarTempos[antigo]] === undefined) {
        dados[migrarTempos[antigo]] = dados[antigo];
      }
    });
  }

  state.formData = dados;
  if (an.observacoes) state.formData['observacoes'] = an.observacoes;

    Object.keys(migrarTempos).forEach(function(antigo) {

    '<input type="date" id="editDataProva" value="' + dataAtual + '" style="width:100%;box-sizing:border-box">' +

    '<label class="field-label" style="margin-top:12px">Tamanho da piscina</label>' +
    '<div style="display:flex;gap:8px">' +
    '<div class="sexo-opt' + (piscinaAtual === 25 ? ' selected' : '') + '" id="piscina25" onclick="selPiscina(25)" style="flex:1;text-align:center">25m</div>' +

    '<label class="field-label" style="margin-top:12px">Estilo</label>' +
