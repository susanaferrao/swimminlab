function renderPerfil() {
  const sw = getSwimmer(state.swimmerId);
  if (!sw) return '<div class="empty-state"><p>Nadador não encontrado.</p></div>';

  const idadeAtual = calcularIdade(sw.dataNascimento, new Date().toISOString());

  if (sw.sexo) infoLinha.push(fmtSexo(sw.sexo));
  if (idadeAtual) infoLinha.push(fmtIdade(idadeAtual));
  if (sw.dataNascimento) infoLinha.push('nascido a ' + fmtData(sw.dataNascimento));

  let html = '<div class="card">' +
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">' +
    '<div><div class="card-title" style="margin-bottom:4px">Perfil</div>' +
    (infoLinha.length ? '<div style="font-size:13px;color:var(--txt2)">' + infoLinha.join(' · ') + '</div>' : '<div style="font-size:13px;color:var(--txt3)">Sexo e data de nascimento não definidos</div>') +
    '</div>' +
    '<button class="btn btn-ghost btn-sm" onclick="abrirEditarNadador(\'' + sw.id + '\')">Editar</button>' +
    '</div></div>';

  html += '<div class="card"><div class="card-title">Ações</div><div class="btn-row">' +
    '<button class="btn btn-primary" onclick="nav(\'novaAnalise\',{swimmerId:\'' + sw.id + '\'})">+ Nova análise</button>' +
    '<button class="btn btn-ghost btn-sm" onclick="apagarNadador(\'' + sw.id + '\')" style="flex:0 0 auto">Apagar perfil</button>' +
    '</div></div>';

  if (!sw.analises.length) {
    html += '<div class="empty-state"><p>Ainda não há análises registadas.<br>Cria a primeira para começar a construir o histórico deste nadador.</p></div>';
    return html;
  }

  // agrupar por estilo+distancia+tamanhoPiscina (provas em piscinas diferentes não se comparam)
  const grupos = {};
  sw.analises.forEach(function (a) {

    if (!grupos[k]) grupos[k] = { estilo: a.estilo, distancia: a.distancia, tamanhoPiscina: tp, lista: [] };
    grupos[k].lista.push(a);
  });

  Object.keys(grupos).sort().forEach(function (k) {

    const melhorId = g.lista.reduce(function (best, a) { return (!best || a.tempoTotal < best.tempoTotal) ? a : best; }, null).id;

    html += '<div class="card"><div class="card-title">' + ESTILOS_LABEL(g.estilo) + ' ' + g.distancia + 'm <span style="color:var(--txt3);font-weight:500">· piscina ' + g.tamanhoPiscina + 'm</span></div>';
    g.lista.forEach(function (a) {
      const isPB = a.id === melhorId && g.lista.length > 1;
      html += '<div class="history-row">' +
        '<div class="history-item' + (isPB ? ' is-pb' : '') + '" onclick="nav(\'relatorio\',{swimmerId:\'' + sw.id + '\',verAnaliseId:\'' + a.id + '\',compararPB:false})">' +
        '<div><div class="hi-date">' + fmtData(a.dataProva || a.criadoEm) + (isPB ? '<span class="hi-pb-tag"> · melhor registo</span>' : '') + '</div>' +
        '<div class="hi-time">' + fmtTempo(a.tempoTotal) + '</div></div>' +
        '<div class="chevron">›</div></div>' +
        '<button class="hi-delete-btn" onclick="apagarAnaliseDoHistorico(\'' + sw.id + '\',\'' + a.id + '\')" aria-label="Apagar análise">' +
        '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/></svg>' +
        '</button>' +
        '</div>';
    });
    html += '</div>';
  });

  return html;
}

/* ---------- ECRÃ: seleção de prova ---------- */

function renderSelecaoProva() {
  const estilos = [
    { id: 'LIVRES', nome: 'Livres' }, { id: 'COSTAS', nome: 'Costas' },
    { id: 'BRUCOS', nome: 'Bruços' }, { id: 'MARIPOSA', nome: 'Mariposa' },
    { id: 'ESTILOS', nome: 'Estilos' },
  ];
  const distanciasPorEstilo = {
    LIVRES: [50,100,200,400,800,1500], COSTAS: [50,100,200,400,800,1500],
    BRUCOS: [50,100,200,400,800,1500], MARIPOSA: [50,100,200,400,800,1500],
    ESTILOS: [200,400],
  };
  const p = state.novaAnalise.tamanhoPiscina;
  const e = state.novaAnalise.estilo;
  const d = state.novaAnalise.distancia;

  let html = '<div class="card"><div class="card-title">1. Tamanho da piscina</div><div class="style-grid">';
  TAMANHOS_PISCINA.forEach(function (tp) {
    html += '<div class="style-card' + (p === tp ? ' selected' : '') + '" onclick="selecionarTamanhoPiscina(' + tp + ')">Piscina ' + tp + 'm</div>';
  });
  html += '</div></div>';

  if (p) {
    html += '<div class="card"><div class="card-title">2. Estilo</div><div class="style-grid">';
    estilos.forEach(function (es) {
      html += '<div class="style-card' + (e === es.id ? ' selected' : '') + '" onclick="selecionarEstilo(\'' + es.id + '\')">' + es.nome + '</div>';
    });
    html += '</div></div>';
  }

  if (p && e) {
    html += '<div class="card"><div class="card-title">3. Distância</div><div class="dist-grid">';
    distanciasPorEstilo[e].forEach(function (dist) {
      html += '<div class="dist-card' + (d === dist ? ' selected' : '') + '" onclick="selecionarDistancia(' + dist + ')">' + dist + 'm</div>';
    });
    html += '</div></div>';
  }

  if (e && p && d) {
    html += '<button class="btn btn-primary" onclick="clicarContinuarSelecaoProva()">Continuar →</button>';
  }
  return html;
}

function mesmaProva(a, b) {
  return !!a && !!b && a.estilo === b.estilo && a.distancia === b.distancia && a.tamanhoPiscina === b.tamanhoPiscina;
}

function clicarContinuarSelecaoProva() {
  const provaAtual = { estilo: state.novaAnalise.estilo, distancia: state.novaAnalise.distancia, tamanhoPiscina: state.novaAnalise.tamanhoPiscina };
  const temDadosEmCurso = state.formData && Object.keys(state.formData).length > 0 && !state.editandoAnaliseId;

  if (temDadosEmCurso && mesmaProva(state.formDataProva, provaAtual)) {
    showConfirm('Continuar análise em curso?', 'Já tens dados preenchidos para esta prova. Escolhe "Confirmar" para continuar de onde estavas, ou fecha esta mensagem e toca em "Recomeçar" para começar do zero.', function () {
      nav('formulario');
    });
    // adiciona um botão extra de "recomeçar do zero" ao modal já aberto
    const btnRow = document.querySelector('.modal-box .btn-row');
    if (btnRow) {
      const btnRecomeçar = document.createElement('button');
      btnRecomeçar.className = 'btn btn-ghost';
      btnRecomeçar.style.borderColor = 'rgba(239,68,68,0.3)';
      btnRecomeçar.style.color = '#f29999';
      btnRecomeçar.textContent = 'Recomeçar do zero';
      btnRecomeçar.onclick = function () { closeModal(); iniciarFormulario(); };
      btnRow.appendChild(btnRecomeçar);
    }
    return;
  }

  iniciarFormulario();
}

function selecionarTamanhoPiscina(tamanho) {
  state.novaAnalise.tamanhoPiscina = tamanho;
  state.novaAnalise.estilo = null;
  state.novaAnalise.distancia = null;
  render();
}
function selecionarEstilo(estilo) {
  state.novaAnalise.estilo = estilo;
  state.novaAnalise.distancia = null;
  render();
}
function selecionarDistancia(distancia) {
  state.novaAnalise.distancia = distancia;
  render();
}
function iniciarFormulario() {
  state.formData = {};
  state.formDataProva = { estilo: state.novaAnalise.estilo, distancia: state.novaAnalise.distancia, tamanhoPiscina: state.novaAnalise.tamanhoPiscina };
  state.formStep = 'data';
  state.dataProva = new Date().toISOString().slice(0, 10);
  state.editandoAnaliseId = null;
  nav('formulario');
}

function editarAnalise(swimmerId, analiseId) {
  const sw = getSwimmer(swimmerId);
  const an = sw.analises.find(function (a) { return a.id === analiseId; });
  if (!an) return;
  state.novaAnalise = { estilo: an.estilo, distancia: an.distancia, tamanhoPiscina: an.tamanhoPiscina || 50 };
  state.formData = Object.assign({}, an.dadosBrutos);
  state.dataProva = an.dataProva || an.criadoEm.slice(0, 10);
  state.editandoAnaliseId = analiseId;
  state.formStep = 'data';
  nav('formulario', { swimmerId: swimmerId });
}

/* ---------- ECRÃ: formulário sequencial ---------- */

function renderFormulario() {
  if (state.formStep === 'data') {
    return renderFormularioData();
  }

  const campos = gerarCamposInput(state.novaAnalise.estilo, state.novaAnalise.distancia, state.novaAnalise.tamanhoPiscina, state.incluirOndulacoes, state.incluirRespiracoes);
  const lista = state.formStep === 'tempos' ? campos.tempos : campos.ciclos;
  const progresso = state.formStep === 'tempos' ? 66 : 100;

  let html = '<div class="progress-bar"><div class="progress-fill" style="width:' + progresso + '%"></div></div>';
  html += '<div class="step-label">Passo ' + (state.formStep === 'tempos' ? '2 de 3' : '3 de 3') + '</div>';
  html += '<div class="step-title">' + (state.formStep === 'tempos' ? 'Tempos cronometrados' : 'Ciclos, ondulações e saídas') + '</div>';

  if (state.formStep === 'tempos') {
    html += '<div class="card" style="background:var(--bg3);border-style:dashed;margin-bottom:18px"><p style="font-size:13px;color:var(--txt2);line-height:1.5">Insere os tempos exatamente como aparecem no cronómetro de vídeo, sempre acumulados desde a partida (não é a duração de cada troço).</p></div>';
    html += '<button class="btn btn-ghost" style="margin-bottom:18px" onclick="abrirMarcarVideo()">Marcar tempos a partir de um vídeo</button>';
  }

  let currentGroup = null;
  let currentSubgrupo = null;
  lista.forEach(function (campo) {
    if (campo.isHeader) {
      currentGroup = campo.group;
      currentSubgrupo = null;
      html += '<div class="section-divider">' + escapeHtml(campo.group) + '</div>';
      return;
    }
    if (campo.subgrupo && campo.subgrupo !== currentSubgrupo) {
      currentSubgrupo = campo.subgrupo;
      html += '<div class="section-subdivider">' + escapeHtml(campo.subgrupo) + '</div>';
    } else if (!campo.subgrupo) {
      currentSubgrupo = null;
    }
    const val = state.formData[campo.id] !== undefined ? state.formData[campo.id] : '';
    const isTempo = campo.unidade === 's';
    const isBoolean = campo.tipo === 'boolean';
    const displayVal = isTempo ? fmtTempoInput(val) : val;

// Campo de tempo "estilo cronómetro": o utilizador digita só dígitos em
// sequência (sem pontuação), e o campo formata-se sozinho em m:ss,cc.
// Lido da direita: últimos 2 dígitos = centésimos, 2 seguintes = segundos,
// o que sobra à esquerda = minutos. O valor guardado em state.formData
// é sempre em segundos decimais (ex: "64.53"), para os cálculos não mudarem.
function onTempoInput(input) {
  const field = input.dataset.field;
  const valorAnterior = input.dataset.rawValue || '';
  const valorAtual = input.value;
  const digitosAntigos = input.dataset.digitos || '';

  let digitos;
  if (valorAtual.length > valorAnterior.length) {
    // utilizador escreveu — o(s) caráter(es) novo(s) é o que foi acrescentado ao fim
    const acrescentado = valorAtual.slice(valorAnterior.length).replace(/\D/g, '');
    digitos = digitosAntigos + acrescentado;
  } else if (valorAtual.length < valorAnterior.length) {
    // utilizador apagou (backspace) — remove o último dígito
    digitos = digitosAntigos.slice(0, -1);
  } else {
    // mesmo comprimento (ex: selecionou tudo e escreveu por cima) — reconstrói do zero
    digitos = valorAtual.replace(/\D/g, '');
  }
  digitos = digitos.slice(-6); // limite razoável: até 99:99,99

  if (!digitos) {
    input.value = '';
    input.dataset.digitos = '';
    input.dataset.rawValue = '';
    delete state.formData[field];
    return;
  }

  const segundosDecimais = digitosParaSegundos(digitos);
  state.formData[field] = String(segundosDecimais);
  const formatado = fmtTempoInput(segundosDecimais, digitos);
  input.value = formatado;
  input.dataset.digitos = digitos;
  input.dataset.rawValue = formatado;
}

// Converte a string de dígitos (lida da direita: cc, ss, mm...) em segundos decimais.
function digitosParaSegundos(digitos) {
  digitos = digitos.replace(/\D/g, '');
  if (!digitos) return 0;
  const cc = digitos.slice(-2).padStart(2, '0');
  const resto = digitos.slice(0, -2);
  const ss = resto.slice(-2).padStart(2, '0');
  const mm = resto.slice(0, -2) || '0';
  return parseInt(mm, 10) * 60 + parseInt(ss, 10) + parseInt(cc, 10) / 100;
}

// Formata segundos decimais (ou a string de dígitos em digitação) para m:ss,cc.
function fmtTempoInput(valor, digitosEmCurso) {
  if (digitosEmCurso !== undefined) {
    const cc = digitosEmCurso.slice(-2).padStart(2, '0');
    const resto = digitosEmCurso.slice(0, -2);
    if (!resto) return '0:00,' + cc; // mostra zeros enquanto só há centésimos
    const ss = resto.slice(-2).padStart(2, '0');
    const mm = resto.slice(0, -2);
    return (mm || '0') + ':' + ss + ',' + cc;
  }
  if (valor === '' || valor === null || valor === undefined) return '';
  const s = parseFloat(valor);
  if (isNaN(s)) return '';
  const mm = Math.floor(s / 60);
  const ss = Math.floor(s % 60);
  const cc = Math.round((s - Math.floor(s)) * 100);
  return mm + ':' + String(ss).padStart(2, '0') + ',' + String(cc).padStart(2, '0');
}

// Converte segundos decimais de volta para a string de dígitos equivalente
// (inverso de digitosParaSegundos), usado para inicializar data-digitos
// quando o campo já tem um valor (ex: ao editar uma análise existente).
function segundosParaDigitos(valorSegundos) {
  const s = parseFloat(valorSegundos);
  if (isNaN(s)) return '';
  const mm = Math.floor(s / 60);
  const ss = Math.floor(s % 60);
  const cc = Math.round((s - Math.floor(s)) * 100);
  return String(mm) + String(ss).padStart(2, '0') + String(cc).padStart(2, '0');
}

function guardarAnalise() {
  const estilo = state.novaAnalise.estilo, distancia = state.novaAnalise.distancia, tamanhoPiscina = state.novaAnalise.tamanhoPiscina;
  const metrics = calcularMetricas(estilo, distancia, state.formData, tamanhoPiscina);
  if (!metrics.tempoTotal) {
    showConfirm('Tempo total em falta', 'Não inseriste o tempo total da prova. Continuar mesmo assim?', function () {
      finalizarGuardarAnalise(estilo, distancia, metrics);
    });
    return;
  }
  finalizarGuardarAnalise(estilo, distancia, metrics);
}

function finalizarGuardarAnalise(estilo, distancia, metrics) {
  const dados = {
    estilo: estilo, distancia: distancia,
    tamanhoPiscina: state.novaAnalise.tamanhoPiscina,
    dadosBrutos: state.formData,
    tempoTotal: metrics.tempoTotal,
    dataProva: state.dataProva,
  };
  let analise;
  if (state.editandoAnaliseId) {
    analise = updateAnalise(state.swimmerId, state.editandoAnaliseId, dados);
    toast('Análise atualizada');
  } else {
    analise = addAnalise(state.swimmerId, dados);
    toast('Análise guardada');
  }
  state.editandoAnaliseId = null;
  state.formDataProva = null;
  nav('relatorio', { verAnaliseId: analise.id, compararPB: false });
}

// Renderiza só a secção abaixo do player (botão de marcar partida, ou lista
// de pontos) — chamada via innerHTML pontual para nunca recriar o <video>,
// o que destruiria a posição de reprodução atual.
function renderVideoMarkSection() {
  let html = '';
  if (state.video.tempoPartidaAbsoluto === null) {
    html += '<div class="video-step-label">Avança até ao frame exato da partida (saída do nadador)</div>';
    html += '<button class="btn btn-primary" onclick="marcarPartidaVideo()">Marcar este frame como a Partida (t = 0)</button>';
  } else if (state.video.modo === 'ciclos') {
    html += renderVideoModoCiclos();
  } else {
    const pontos = listaPontosParaMarcar();
    html += '<div class="video-step-label">Marca cada ponto pela ordem, avançando o vídeo</div>';
    html += '<div class="video-mark-list">';
    pontos.forEach(function (p, idx) {
      const éDistancia = p.unidade === 'm';
      const marcado = state.formData[p.id] !== undefined;
      const isCurrent = idx === state.video.indiceMarcacaoAtual;
      const valorMostrado = marcado ? (éDistancia ? fmtNum(parseFloat(state.formData[p.id]), 2, ' m') : fmtTempoInput(state.formData[p.id])) : '';
      html += '<div class="video-mark-item' + (isCurrent ? ' is-current' : '') + (marcado ? ' is-marked' : '') + '">' +
        '<div class="vm-label">' + escapeHtml(p.label) + (p.sub ? '<span class="vm-sub">' + escapeHtml(p.sub) + '</span>' : '') + '</div>' +
        '<div class="vm-value">' + valorMostrado + '</div>' +
        '<div class="vm-btns">';
      if (éDistancia) {
        html += '<button class="vm-btn" onclick="abrirCalibracaoDistancia(\'' + p.id + '\')">' + (marcado ? 'Refazer' : 'Medir') + '</button>';
      } else {
        html += '<button class="vm-btn" onclick="marcarPontoVideo(' + idx + ')">' + (marcado ? 'Refazer' : 'Marcar') + '</button>';
      }
      html += '<button class="vm-btn-manual" onclick="marcarPontoManualmente(' + idx + ')">Manual</button>';
      html += '</div></div>';
    });
    html += '</div>';
    html += '<button class="btn btn-primary" style="margin-top:14px" onclick="avancarParaCiclosNoVideo()">Continuar para ciclos →</button>';
  }
  const el = document.getElementById('videoMarkSection');
  if (!el) return;

  // Preserva a posição de scroll do documento e da lista interna: atualizar
  // o innerHTML recria todos os botões, e alguns browsers tentam "trazer à
  // vista" o novo elemento que substitui o que tinha foco — isso faz a
  // página saltar para cima mesmo sem nenhum código nosso pedir scroll.
  const scrollDocAntes = window.scrollY;
  const listaAntiga = el.querySelector('.video-mark-list');
  const scrollListaAntes = listaAntiga ? listaAntiga.scrollTop : 0;

  el.innerHTML = html;

  const listaNova = el.querySelector('.video-mark-list');
  if (listaNova) listaNova.scrollTop = scrollListaAntes;
  window.scrollTo(0, scrollDocAntes);
  atualizarEstadoBotoesMarcar();
}

function getVideoEl() { return document.getElementById('videoPlayer'); }

function videoPlayPause() {
  const v = getVideoEl();
  if (!v) return;
  if (v.paused) { v.play(); document.getElementById('videoPlayBtn').textContent = '⏸ Pause'; }
  else { v.pause(); document.getElementById('videoPlayBtn').textContent = '▶ Play'; }
}

// Avança/recua um frame. Usa requestVideoFrameCallback quando disponível
// (mais preciso, segue o frame real do vídeo); caso contrário usa um
// incremento fixo de 1/30s como aproximação razoável.
//
// IMPORTANTE: definir v.currentTime é assíncrono — o browser só atualiza
// o valor real depois do evento 'seeked' disparar. Em Safari/iPad esse
// atraso é mais percetível do que noutros browsers, e se o utilizador
// tocar em "Marcar" antes do seek terminar, v.currentTime ainda devolve
// o valor ANTIGO — dando a sensação de que é preciso tocar duas vezes.
// Por isso marcamos o vídeo como "a mover" e só o desmarcamos quando o
// 'seeked' confirma que o novo frame está mesmo disponível.
function videoFrameStep(direcao) {
  const v = getVideoEl();
  if (!v) return;
  v.pause();
  document.getElementById('videoPlayBtn').textContent = '▶ Play';
  const incremento = (typeof v.getVideoPlaybackQuality === 'function') ? (1 / 60) : (1 / 30);
  marcarVideoComoEstabilizando(v);
  v.currentTime = Math.max(0, v.currentTime + direcao * incremento);
  atualizarRelogioVideo();
}

// Liga (uma única vez) o listener que sabe quando o vídeo terminou de
// "assentar" num novo frame após um seek, e usa isso para desbloquear os
// botões de marcação assim que currentTime estiver realmente fiável.
function marcarVideoComoEstabilizando(v) {
  state.video.estabilizando = true;
  atualizarEstadoBotoesMarcar();
  if (!v.dataset.seekedListenerAtivo) {
    v.dataset.seekedListenerAtivo = '1';
    v.addEventListener('seeked', function () {
      state.video.estabilizando = false;
      atualizarRelogioVideo();
      atualizarEstadoBotoesMarcar();
    });
  }
}

// Desativa visualmente os botões de marcação enquanto o vídeo ainda está
// a processar um seek, para impedir capturar um currentTime desatualizado.
function atualizarEstadoBotoesMarcar() {
  const desativar = !!state.video.estabilizando;
  document.querySelectorAll('.vm-btn, .vm-btn-manual').forEach(function (btn) {
    btn.disabled = desativar;
    btn.style.opacity = desativar ? '0.5' : '';
  });
}

function onScrubberInput(input) {
  const v = getVideoEl();
  if (!v) return;
  marcarVideoComoEstabilizando(v);
  v.currentTime = (parseFloat(input.value) / 100) * (v.duration || 0);
  atualizarRelogioVideo();
}

function atualizarRelogioVideo() {
  const v = getVideoEl();
  const overlay = document.getElementById('videoClockOverlay');
  const scrubber = document.getElementById('videoScrubber');
  if (!v || !overlay) return;
  if (scrubber && v.duration) scrubber.value = (v.currentTime / v.duration) * 100;
  if (state.video.tempoPartidaAbsoluto === null) {
    overlay.textContent = fmtTempoInput(v.currentTime) + ' (vídeo)';
  } else {
    const cronometro = v.currentTime - state.video.tempoPartidaAbsoluto;
    overlay.textContent = fmtTempoInput(Math.max(0, cronometro));
  }
}

function marcarPartidaVideo() {
  const v = getVideoEl();
  if (!v) return;
  state.video.tempoPartidaAbsoluto = v.currentTime;
  toast('Partida marcada — cronómetro a 0:00,00');
  renderVideoMarkSection();
  atualizarRelogioVideo();
  removerFocoAtivo();
}

function marcarPontoVideo(idx) {
  const v = getVideoEl();
  if (!v || state.video.tempoPartidaAbsoluto === null) return;
  const pontos = listaPontosParaMarcar();
  const ponto = pontos[idx];
  const cronometro = Math.max(0, v.currentTime - state.video.tempoPartidaAbsoluto);
  state.formData[ponto.id] = String(Math.round(cronometro * 100) / 100);
  state.video.indiceMarcacaoAtual = Math.min(idx + 1, pontos.length - 1);
  toast(ponto.label + ': ' + fmtTempoInput(cronometro));
  renderVideoMarkSection();
  removerFocoAtivo();
}

// Permite inserir manualmente o valor de um ponto, mesmo a meio da análise
// por vídeo — útil quando o vídeo não mostra claramente esse instante/zona.
function marcarPontoManualmente(idx) {
  const pontos = listaPontosParaMarcar();
  const ponto = pontos[idx];
  const éDistancia = ponto.unidade === 'm';
  const valorAtual = state.formData[ponto.id];

  if (éDistancia) {
    showPrompt('Inserir manualmente', ponto.label, 'metros', function (valor) {
      const v = parseFloat(valor.replace(',', '.'));
      if (isNaN(v)) { toast('Valor inválido'); return; }
      state.formData[ponto.id] = String(v);
      state.video.indiceMarcacaoAtual = Math.min(idx + 1, pontos.length - 1);
      renderVideoMarkSection();
    });
  } else {
    showPromptTempo('Inserir manualmente', ponto.label, valorAtual, function (segundos) {
      state.formData[ponto.id] = String(segundos);
      state.video.indiceMarcacaoAtual = Math.min(idx + 1, pontos.length - 1);
      renderVideoMarkSection();
    });
  }
}

// Remove o foco do elemento ativo (normalmente um botão acabado de clicar)
// sem deixar o browser tentar "trazer à vista" esse elemento — isso é o que
// provoca o documento principal a saltar para cima durante a marcação de
// vídeo, mesmo quando o elemento já estava visível dentro da lista interna.
function removerFocoAtivo() {
  if (document.activeElement && document.activeElement !== document.body) {
    try { document.activeElement.blur(); } catch (e) {}
  }
}

// Avança do modo "tempos" (marcar por frame) para o modo "ciclos" dentro do
// MESMO ecrã de vídeo, sem fechar o vídeo — porque contar braçadas/ondulações/
// respirações exige continuar a ver o vídeo, só que aqui são números inseridos
// manualmente (não há "marcar o frame exato" para uma contagem).
function avancarParaCiclosNoVideo() {
  state.video.modo = 'ciclos';
  renderVideoMarkSection();
}

function renderVideoModoCiclos() {
  const campos = gerarCamposInput(state.novaAnalise.estilo, state.novaAnalise.distancia, state.novaAnalise.tamanhoPiscina, state.incluirOndulacoes, state.incluirRespiracoes);
  let html = '<div class="video-step-label">Conta enquanto vês o vídeo e preenche os números</div>';
  html += '<div class="video-mark-list video-mark-list-ciclos">';
  let currentSubgrupo = null;
  campos.ciclos.forEach(function (campo) {
    if (campo.isHeader) { currentSubgrupo = null; return; } // os cabeçalhos de grupo não fazem falta aqui, só há 1 grupo
    if (campo.subgrupo && campo.subgrupo !== currentSubgrupo) {
      currentSubgrupo = campo.subgrupo;
      html += '<div class="video-ciclos-subdivider">' + escapeHtml(campo.subgrupo) + '</div>';
    } else if (!campo.subgrupo) {
      currentSubgrupo = null;
    }
    const val = state.formData[campo.id] !== undefined ? state.formData[campo.id] : '';
    if (campo.tipo === 'boolean') {
      const marcado = val === 'sim';
      html += '<div class="video-mark-item">' +
        '<div class="vm-label">' + escapeHtml(campo.label) + '</div>' +
        '<label class="switch"><input type="checkbox" ' + (marcado ? 'checked' : '') + ' onchange="onBooleanInput(this, \'' + campo.id + '\')"><span class="slider"></span></label>' +
        '</div>';
    } else {
      html += '<div class="video-mark-item">' +
        '<div class="vm-label">' + escapeHtml(campo.label) + (campo.sub ? '<span class="vm-sub">' + escapeHtml(campo.sub) + '</span>' : '') + '</div>' +
        '<input type="text" inputmode="decimal" class="video-ciclos-input" value="' + val + '" data-field="' + campo.id + '" oninput="onFormInput(this)">' +
        '<div class="ir-unit">' + campo.unidade + '</div>' +
        '</div>';
    }
  });
  html += '</div>';
  html += '<div class="btn-row" style="margin-top:14px">';
  html += '<button class="btn btn-ghost" onclick="voltarParaTemposNoVideo()">← Voltar aos tempos</button>';
  html += '<button class="btn btn-primary" onclick="concluirMarcacaoVideo()">Concluir análise</button>';
  html += '</div>';
  return html;
}

function voltarParaTemposNoVideo() {
  state.video.modo = 'tempos';
  renderVideoMarkSection();
}

function concluirMarcacaoVideo() {
  fecharVideo();
  state.formStep = 'ciclos';
  nav('formulario');
}

// Liga os listeners do <video> (timeupdate para atualizar o relógio em
// tempo real durante reprodução normal, não só nos passos manuais).
function ligarListenersVideo() {
  const v = getVideoEl();
  if (!v || v.dataset.listenersAtivos) return;
  v.dataset.listenersAtivos = '1';
  v.addEventListener('timeupdate', atualizarRelogioVideo);
  v.addEventListener('loadedmetadata', atualizarRelogioVideo);
  ligarGestosZoomVideo(v);
}

/* ============================================================
   ZOOM / PAN no vídeo principal — pinch com 2 dedos, arrasto com 1
   dedo quando ampliado, e botões +/− para quem usa rato.
   ============================================================ */

const ZOOM_MIN = 1, ZOOM_MAX = 4;

function aplicarTransformZoomVideo() {
  const v = getVideoEl();
  if (!v) return;
  const z = state.video.zoom;
  v.style.transform = 'scale(' + z + ') translate(' + state.video.panX + 'px, ' + state.video.panY + 'px)';
  const wrap = document.getElementById('videoPlayerWrap');
  if (wrap) wrap.classList.toggle('is-zoomed', z > 1);
  const label = document.getElementById('zoomLevelLabel');
  if (label) label.textContent = Math.round(z * 100) + '%';
  const btn = document.getElementById('videoZoomBtn');
  if (btn) btn.innerHTML = iconeZoomSvg(z > 1);
  const controls = document.getElementById('videoZoomControls');
  if (controls) controls.style.display = z > 1 ? 'flex' : 'none';
}

function iconeZoomSvg(ativo) {
  return ativo
    ? '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35M8 11h6"/></svg>'
    : '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35M11 8v6M8 11h6"/></svg>';
}

function toggleZoomVideo() {
  if (state.video.zoom > 1) {
    resetZoomVideo();
  } else {
    state.video.zoom = 2;
    state.video.panX = 0; state.video.panY = 0;
    aplicarTransformZoomVideo();
  }
}
function ajustarZoomVideo(delta) {
  state.video.zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, state.video.zoom + delta));
  if (state.video.zoom === ZOOM_MIN) { state.video.panX = 0; state.video.panY = 0; }
  aplicarTransformZoomVideo();
}
function resetZoomVideo() {
  state.video.zoom = 1; state.video.panX = 0; state.video.panY = 0;
  aplicarTransformZoomVideo();
}

function ligarGestosZoomVideo(v) {
  let pinchDistInicial = null, zoomInicial = 1;
  let arrastoAtivo = false, arrastoInicioX = 0, arrastoInicioY = 0, panInicioX = 0, panInicioY = 0;

  function distanciaToques(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  v.addEventListener('touchstart', function (evt) {
    if (evt.touches.length === 2) {
      pinchDistInicial = distanciaToques(evt.touches);
      zoomInicial = state.video.zoom;
      arrastoAtivo = false;
    } else if (evt.touches.length === 1 && state.video.zoom > 1) {
      arrastoAtivo = true;
      arrastoInicioX = evt.touches[0].clientX;
      arrastoInicioY = evt.touches[0].clientY;
      panInicioX = state.video.panX;
      panInicioY = state.video.panY;
    }
  }, { passive: true });

  v.addEventListener('touchmove', function (evt) {
    if (evt.touches.length === 2 && pinchDistInicial) {
      const distAtual = distanciaToques(evt.touches);
      const fator = distAtual / pinchDistInicial;
      state.video.zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoomInicial * fator));
      if (state.video.zoom === ZOOM_MIN) { state.video.panX = 0; state.video.panY = 0; }
      aplicarTransformZoomVideo();
      evt.preventDefault();
    } else if (arrastoAtivo && evt.touches.length === 1) {
      const dx = (evt.touches[0].clientX - arrastoInicioX) / state.video.zoom;
      const dy = (evt.touches[0].clientY - arrastoInicioY) / state.video.zoom;
      state.video.panX = panInicioX + dx;
      state.video.panY = panInicioY + dy;
      aplicarTransformZoomVideo();
      evt.preventDefault();
    }
  }, { passive: false });

  v.addEventListener('touchend', function (evt) {
    if (evt.touches.length < 2) pinchDistInicial = null;
    if (evt.touches.length === 0) arrastoAtivo = false;
  }, { passive: true });

  // duplo clique/tap para alternar zoom rapidamente (rato/desktop)
  v.addEventListener('dblclick', function () { toggleZoomVideo(); });
}

/* ============================================================
   CALIBRAÇÃO DE DISTÂNCIA — overlay sobre o vídeo
   Mecânica: o utilizador marca 2 pares de pontos (cada par numa
   marca de metro conhecida da corda, um ponto na corda esquerda
   e outro na direita). Os pontos médios desses pares definem os
   extremos de uma linha vermelha perpendicular (a "linha central
   da pista" entre essas duas marcas). O utilizador desliza uma
   bolinha ao longo dessa linha até à posição do nadador; a app
   interpola linearmente entre os dois valores de metro conhecidos.
   Coordenadas guardadas em fração (0–1) do frame do vídeo, para
   serem independentes do tamanho de ecrã.
   ============================================================ */

function abrirCalibracaoDistancia(campoId) {
  const v = getVideoEl();
  if (!v) return;
  v.pause();
  state.calibDistancia = {
    ativo: true, campoDestino: campoId, passo: 'linha1_metro',
    linha1: { metros: null, esq: null, dir: null },
    linha2: { metros: null, esq: null, dir: null },
    t: 0.5,
  };
  renderCalibracaoOverlay();
}

function fecharCalibracaoDistancia() {
  state.calibDistancia.ativo = false;
  const cv = document.getElementById('calibVideo');
  if (cv) { try { cv.pause(); } catch (e) {} }
  const root = document.getElementById('calibRoot');
  if (root) root.remove();
}

function renderCalibracaoOverlay() {
  let root = document.getElementById('calibRoot');
  const jaExiste = !!root;

  if (!jaExiste) {
    root = document.createElement('div');
    root.id = 'calibRoot';
    document.body.appendChild(root);
    const videoOriginal = getVideoEl();
    const srcAtual = videoOriginal ? videoOriginal.currentSrc || videoOriginal.src : '';
    const tempoAtual = videoOriginal ? videoOriginal.currentTime : 0;

    root.innerHTML = '<div class="calib-overlay">' +
      '<div class="calib-header"><div class="ch-title">Medir distância</div><button class="ch-close" onclick="fecharCalibracaoDistancia()">✕</button></div>' +
      '<div class="calib-frame-wrap" id="calibFrameWrap">' +
        '<video id="calibVideo" src="' + srcAtual + '" playsinline muted></video>' +
        '<svg id="calibSvg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>' +
      '</div>' +
      '<div class="calib-footer" id="calibFooter"></div>' +
      '</div>';

    const cv = document.getElementById('calibVideo');
    if (cv) {
      cv.addEventListener('loadedmetadata', function () { cv.currentTime = tempoAtual; desenharCalibracaoSvg(); }, { once: true });
    }
    ligarInteracaoSvg();
  }

  renderCalibFooter();
  desenharCalibracaoSvg();
}

// Atualiza só o conteúdo do footer (instruções, input de metro, resultado),
// sem nunca tocar no <video> nem no <svg> do player — evita que o vídeo
// recarregue/redimensione e "salte" entre passos da calibração.
function renderCalibFooter() {
  const footer = document.getElementById('calibFooter');
  if (!footer) return;
  const c = state.calibDistancia;
  const instrucoes = {
    linha1_metro: 'Indica a que metro corresponde a 1ª marca de referência que vais usar (ex: 20)',
    linha1_esq: 'Marca essa marca (' + c.linha1.metros + 'm) na corda ESQUERDA',
    linha1_dir: 'Agora marca a MESMA marca (' + c.linha1.metros + 'm) na corda DIREITA',
    linha2_metro: 'Indica a que metro corresponde a 2ª marca de referência (diferente da 1ª, ex: 25)',
    linha2_esq: 'Marca essa marca (' + c.linha2.metros + 'm) na corda ESQUERDA',
    linha2_dir: 'Agora marca a MESMA marca (' + c.linha2.metros + 'm) na corda DIREITA',
    ajustar: 'Arrasta o ponto vermelho até à posição do nadador',
  };

  let html = '';
  if (c.passo === 'linha1_metro' || c.passo === 'linha2_metro') {
    html += '<div class="calib-instruction">' + instrucoes[c.passo] + '</div>';
    const qual = c.passo === 'linha1_metro' ? 1 : 2;
    const valorAtual = qual === 1 ? c.linha1.metros : c.linha2.metros;
    html += '<div class="calib-metro-row">' +
      '<input type="text" inputmode="decimal" id="calibMetroInput" placeholder="metros" value="' + (valorAtual !== null ? valorAtual : '') + '" oninput="onCalibMetroInput(this, ' + qual + ')">' +
      '<button class="btn btn-primary" onclick="confirmarMetroCalib()">Marcar</button>' +
      '</div>';
  } else if (c.passo !== 'ajustar') {
    html += '<div class="calib-instruction">' + instrucoes[c.passo] + '</div>';
    html += '<div class="calib-instruction-sub">Toca no vídeo para marcar o ponto.</div>';
  } else {
    html += '<div class="calib-instruction">' + instrucoes.ajustar + '</div>';
    html += '<div class="calib-result" id="calibResultado">—</div>';
    html += '<button class="btn btn-primary" onclick="confirmarCalibracaoDistancia()">Usar esta posição</button>';
  }
  footer.innerHTML = html;

  const metroInput = document.getElementById('calibMetroInput');
  if (metroInput) {
    setTimeout(function () { metroInput.focus(); }, 100);
    metroInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') confirmarMetroCalib(); });
  }
}

function onCalibMetroInput(input, qual) {
  const v = parseFloat(input.value);
  if (qual === 1) state.calibDistancia.linha1.metros = isNaN(v) ? null : v;
  else state.calibDistancia.linha2.metros = isNaN(v) ? null : v;
}

function confirmarMetroCalib() {
  const c = state.calibDistancia;
  if (c.passo === 'linha1_metro') {
    if (c.linha1.metros === null) { toast('Indica o metro desta marca'); return; }
    c.passo = 'linha1_esq';
  } else if (c.passo === 'linha2_metro') {
    if (c.linha2.metros === null) { toast('Indica o metro desta marca'); return; }
    if (c.linha2.metros === c.linha1.metros) { toast('Tem de ser um metro diferente do 1º'); return; }
    c.passo = 'linha2_esq';
  }
  renderCalibracaoOverlay();
}

// Converte um clique/touch em coordenadas SVG (0-100) em fração relativa do frame (0-1).
function eventoParaFracao(evt) {
  const svg = document.getElementById('calibSvg');
  const rect = svg.getBoundingClientRect();
  const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
  const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
  return {
    x: Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)),
    y: Math.max(0, Math.min(1, (clientY - rect.top) / rect.height)),
  };
}

function ligarInteracaoSvg() {
  const svg = document.getElementById('calibSvg');
  if (!svg) return;
  svg.onclick = function (evt) {
    const c = state.calibDistancia;
    const p = eventoParaFracao(evt);
    if (c.passo === 'linha1_esq') { c.linha1.esq = p; c.passo = 'linha1_dir'; }
    else if (c.passo === 'linha1_dir') { c.linha1.dir = p; c.passo = 'linha2_metro'; }
    else if (c.passo === 'linha2_esq') { c.linha2.esq = p; c.passo = 'linha2_dir'; }
    else if (c.passo === 'linha2_dir') { c.linha2.dir = p; c.passo = 'ajustar'; c.t = 0.5; }
    else return; // 'ajustar' e os passos de input de metro não reagem a clique no SVG
    renderCalibracaoOverlay();
  };

  // arrasto da bolinha vermelha, só ao longo da linha (passo 'ajustar').
  // Usa Pointer Capture no próprio <svg> (que nunca é destruído durante o
  // arrasto — só o seu innerHTML interno é atualizado a cada frame), em
  // vez de no <circle> do nadador, que é recriado a cada desenharCalibracaoSvg()
  // e por isso perderia a captura do ponteiro a meio do gesto.
  let arrastando = false;
  svg.onpointerdown = function (evt) {
    if (state.calibDistancia.passo !== 'ajustar') return;
    const target = evt.target;
    if (target && target.id === 'calibSwimmerDot') {
      arrastando = true;
      try { svg.setPointerCapture(evt.pointerId); } catch (e) {}
      evt.preventDefault();
    }
  };
  svg.onpointermove = function (evt) {
    if (!arrastando) return;
    const p = eventoParaFracao(evt);
    state.calibDistancia.t = projetarTSobreLinha(p);
    desenharCalibracaoSvg();
    evt.preventDefault();
  };
  svg.onpointerup = function (evt) {
    arrastando = false;
    try { svg.releasePointerCapture(evt.pointerId); } catch (e) {}
  };
  svg.onpointercancel = function () { arrastando = false; };
}

// Dados os pontos médios das 2 linhas (extremos da linha vermelha) e um
// ponto P qualquer, devolve o parâmetro t (0–1) da projeção de P sobre essa
// linha — ou seja, "o quanto P está entre o centro1 e o centro2".
function projetarTSobreLinha(p) {
  const c = state.calibDistancia;
  const c1 = pontoMedioCalib(c.linha1.esq, c.linha1.dir);
  const c2 = pontoMedioCalib(c.linha2.esq, c.linha2.dir);
  const dx = c2.x - c1.x, dy = c2.y - c1.y;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return 0.5;
  const t = ((p.x - c1.x) * dx + (p.y - c1.y) * dy) / len2;
  // Permite estender até 50% da distância calibrada para cada lado (t entre
  // -0.5 e 1.5), para cobrir casos em que o nadador já saiu do intervalo
  // visível das duas marcas de referência usadas na calibração.
  return Math.max(-0.5, Math.min(1.5, t));
}
function pontoMedioCalib(a, b) {
  if (!a || !b) return { x: 0.5, y: 0.5 };
  return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
}

function desenharCalibracaoSvg() {
  const svg = document.getElementById('calibSvg');
  if (!svg) return;
  const c = state.calibDistancia;

  // O viewBox é 0–100 quadrado mas o frame real do vídeo normalmente não é
  // quadrado (ex: 16:9), e preserveAspectRatio="none" estica o conteúdo para
  // encher o rectângulo real. Isso faz com que um <circle> (raio igual em X
  // e Y no viewBox) apareça ESTICADO/elíptico no ecrã. Para desenhar pontos
  // visualmente redondos e finos, calculamos o raio em X e em Y separadamente,
  // compensando a proporção real largura/altura do elemento SVG no ecrã.
  const rect = svg.getBoundingClientRect();
  const proporcao = (rect.width > 0 && rect.height > 0) ? (rect.height / rect.width) : 1;
  // raio base pequeno (em % da largura do frame) — pedido explícito: muito mais fino
  const rPontoX = 0.7, rPontoY = rPontoX * proporcao;
  const rBolaX = 0.55, rBolaY = rBolaX * proporcao;
  const espessuraLinha = 0.35; // espessura das linhas, em % da largura do frame

  function elipsePonto(p, rx, ry, classe) {
    return '<ellipse class="' + classe + '" cx="' + (p.x*100) + '" cy="' + (p.y*100) + '" rx="' + rx + '" ry="' + ry + '"/>';
  }

  let elementos = '';
  // linha 1 (amarela)
  if (c.linha1.esq && c.linha1.dir) {
    elementos += '<line class="calib-line-yellow" style="stroke-width:' + espessuraLinha + '" x1="' + (c.linha1.esq.x*100) + '" y1="' + (c.linha1.esq.y*100) + '" x2="' + (c.linha1.dir.x*100) + '" y2="' + (c.linha1.dir.y*100) + '"/>';
  }
  if (c.linha1.esq) elementos += elipsePonto(c.linha1.esq, rPontoX, rPontoY, 'calib-point');
  if (c.linha1.dir) elementos += elipsePonto(c.linha1.dir, rPontoX, rPontoY, 'calib-point');
  // linha 2 (amarela)
  if (c.linha2.esq && c.linha2.dir) {
    elementos += '<line class="calib-line-yellow" style="stroke-width:' + espessuraLinha + '" x1="' + (c.linha2.esq.x*100) + '" y1="' + (c.linha2.esq.y*100) + '" x2="' + (c.linha2.dir.x*100) + '" y2="' + (c.linha2.dir.y*100) + '"/>';
  }
  if (c.linha2.esq) elementos += elipsePonto(c.linha2.esq, rPontoX, rPontoY, 'calib-point');
  if (c.linha2.dir) elementos += elipsePonto(c.linha2.dir, rPontoX, rPontoY, 'calib-point');

  // linha vermelha central + bolinha
  if (c.linha1.esq && c.linha1.dir && c.linha2.esq && c.linha2.dir) {
    const c1 = pontoMedioCalib(c.linha1.esq, c.linha1.dir);
    const c2 = pontoMedioCalib(c.linha2.esq, c.linha2.dir);
    const dx = c2.x - c1.x, dy = c2.y - c1.y;
    // ponto a t qualquer, ao longo da reta que liga c1 (t=0) a c2 (t=1)
    function pontoEmT(t) { return { x: c1.x + dx * t, y: c1.y + dy * t }; }
    const extA = pontoEmT(-0.5), extB = pontoEmT(1.5);

    // extensão (zona extrapolada, fora do intervalo calibrado) — mais ténue
    elementos += '<line class="calib-line-red calib-line-red-ext" style="stroke-width:' + espessuraLinha + '" x1="' + (extA.x*100) + '" y1="' + (extA.y*100) + '" x2="' + (extB.x*100) + '" y2="' + (extB.y*100) + '"/>';
    // segmento principal (entre as duas marcas calibradas) — bem visível, por cima
    elementos += '<line class="calib-line-red" style="stroke-width:' + espessuraLinha + '" x1="' + (c1.x*100) + '" y1="' + (c1.y*100) + '" x2="' + (c2.x*100) + '" y2="' + (c2.y*100) + '"/>';

    if (c.passo === 'ajustar') {
      const p = pontoEmT(c.t);
      elementos += '<ellipse id="calibSwimmerDot" class="calib-swimmer-dot" cx="' + (p.x*100) + '" cy="' + (p.y*100) + '" rx="' + rBolaX + '" ry="' + rBolaY + '"/>';
      const metros = c.linha1.metros + c.t * (c.linha2.metros - c.linha1.metros);
      const resEl = document.getElementById('calibResultado');
      if (resEl) resEl.textContent = fmtNum(metros, 2, ' m');
    }
  }
  svg.innerHTML = elementos;
}

function confirmarCalibracaoDistancia() {
  const c = state.calibDistancia;
  if (c.linha1.metros === null || c.linha2.metros === null) return;
  const metros = c.linha1.metros + c.t * (c.linha2.metros - c.linha1.metros);
  state.formData[c.campoDestino] = String(Math.round(metros * 100) / 100);
  fecharCalibracaoDistancia();
  toast('Distância marcada: ' + fmtNum(metros, 2, ' m'));
  renderVideoMarkSection();
}

/* ---------- ECRÃ: relatório ---------- */


let chartInstances = [];


// Formata um valor numérico para eixos/tooltips de gráficos: no máximo 2 casas
// decimais, sem zeros à direita desnecessários (22 fica "22", não "22.00").
function fmtEixo(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  const r = Math.round(v * 100) / 100;
  return (r % 1 === 0) ? String(r) : r.toFixed(2);
}
// Variante com no máximo 1 casa decimal, para eixos de velocidade, frequência,
// distância/ciclo e tempo de viragem.
function fmtEixo1(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  const r = Math.round(v * 10) / 10;
  return (r % 1 === 0) ? String(r) : r.toFixed(1);
}
// Variante estritamente inteira, para eixos de ciclos e ondulações (contagens).
function fmtEixoInt(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return String(Math.round(v));
}

function renderRelatorio() {
  const sw = getSwimmer(state.swimmerId);
  const an = sw.analises.find(function (a) { return a.id === state.verAnaliseId; });
  if (!an) return '<div class="empty-state"><p>Análise não encontrada.</p></div>';

  const metrics = calcularMetricas(an.estilo, an.distancia, an.dadosBrutos, an.tamanhoPiscina);
  const melhor = getMelhorAnalise(sw, an.estilo, an.distancia, an.id, an.tamanhoPiscina);
  const éPB = melhor ? an.tempoTotal < melhor.tempoTotal : true;
  const temOutras = getAnalisesDaProva(sw, an.estilo, an.distancia, an.tamanhoPiscina).length > 1;
  const dataDaProva = an.dataProva || an.criadoEm;
  const idadeNaProva = calcularIdade(sw.dataNascimento, dataDaProva);

  const provaLabel = ESTILOS_LABEL(an.estilo) + ' ' + an.distancia + 'm · piscina ' + (an.tamanhoPiscina || 50) + 'm';
  let infoLinha = [fmtData(dataDaProva)];
  if (sw.sexo) infoLinha.push(fmtSexo(sw.sexo));
  if (idadeNaProva) infoLinha.push(fmtIdade(idadeNaProva));

  let html = '<div class="rep-header">' +
    '<div class="rep-swimmer-name">' + escapeHtml(sw.nome) + '</div>' +
    '<div class="rep-prova-label">' + escapeHtml(provaLabel) + '</div>' +
    '<div class="rep-time">' + fmtTempo(metrics.tempoTotal) + '</div>' +
    '<div class="rep-sub">' + escapeHtml(infoLinha.join(' · ')) + '</div>';
  if (temOutras) {
    html += éPB ? '<div class="rep-pb">Melhor registo nesta prova</div>' : '<div class="rep-sub" style="margin-top:8px">Melhor registo: ' + fmtTempo(melhor.tempoTotal) + '</div>';
  }
  html += '</div>';

  if (temOutras) {
    html += '<div class="rep-toggle"><div><div class="ct-label">Comparar com melhor registo</div>' +
      '<div class="ct-sub">Sobrepõe o melhor resultado histórico nos gráficos</div></div>' +
      '<label class="switch"><input type="checkbox" ' + (state.compararPB ? 'checked' : '') + ' onchange="toggleComparar(this.checked)"><span class="slider"></span></label></div>';
  }

  const metricsPB = (state.compararPB && melhor) ? calcularMetricas(melhor.estilo, melhor.distancia, melhor.dadosBrutos, melhor.tamanhoPiscina) : null;

  html += '<div id="chartsContainer">' + renderGraficos(an, metrics, metricsPB) + '</div>';

  html += '<button class="rep-btn rep-btn-ghost" onclick="editarAnalise(\'' + sw.id + '\',\'' + an.id + '\')">Editar dados desta análise</button>';
  html += '<div style="display:flex;gap:10px;margin-top:10px">' +
    '<button class="rep-btn rep-btn-primary" style="margin-top:0" onclick="confirmarGuardarRelatorio()">Guardar</button>' +
    '<button class="rep-btn rep-btn-ghost" style="margin-top:0" onclick="exportarRelatorio()">Exportar</button>' +
    '</div>';
  html += '<button class="rep-btn rep-btn-danger" onclick="apagarAnaliseAtual()">Apagar esta análise</button>';

  return html;
}

function confirmarGuardarRelatorio() {
  // Os dados já ficam persistidos ao chegar ao relatório (ou ao editar);
  // este botão existe para dar confirmação explícita ao utilizador de que está guardado.
  toast('Análise guardada');
}

function toggleComparar(checked) {
  state.compararPB = checked;
  render();
}

function apagarAnaliseAtual() {
  showConfirm('Apagar análise', 'Apagar esta análise permanentemente?', function () {
    deleteAnalise(state.swimmerId, state.verAnaliseId);
    nav('perfil', { swimmerId: state.swimmerId });
  });
}

function renderGraficos(an, m, mPB) {
  let html = '';

  // --- Velocidade, Frequência, Distância/ciclo por troço ---
  html += chartCard('chart_vel', 'Velocidade de nado', 'm/s por troço de piscina limpa');
  html += chartCard('chart_freq', 'Frequência de braçada', 'ciclos por minuto, por troço');
  html += chartCard('chart_dpc', 'Distância por ciclo', 'metros por ciclo, por troço');

  if (m.porViragem.length) {
    html += chartCard('chart_viragem', 'Tempo de viragem', 'aproximação + saída (s), por viragem');
    html += chartCard('chart_saida', 'Breakout de viragem', 'distância de breakout (m) após cada viragem');
  }

  html += chartCard('chart_ciclos50', 'Ciclos de braçada', 'contagem a cada 50m');

  if (m.ondulacoes.length) {
    html += chartCard('chart_ond', 'Movimentos ondulatórios', 'contagem pós-partida e pós-viragem');
  }

  if (m.respiracoes.length) {
    html += chartCard('chart_resp', 'Respirações', 'contagem por troço');
  }
  if (m.respirouNaChegada !== null) {
    html += '<div class="rep-card"><div class="rep-card-title">Respiração na chegada</div><div class="rep-card-desc">Últimos 5m antes de tocar na parede</div>' +
      '<div class="rep-row"><div class="rep-row-label">Respirou nos últimos 5m</div><div class="rep-row-value">' + (m.respirouNaChegada ? 'Sim' : 'Não') + '</div></div></div>';
  }

  html += chartCard('chart_parc50', 'Parciais a cada 50m', 'tempo de cada parcial (s)');
  if (m.parciais100.length > 1) {
    html += chartCard('chart_parc100', 'Parciais a cada 100m', 'tempo de cada parcial (s)');
  }

  // --- Partida (tabela simples, não gráfico) ---
  html += '<div class="rep-card"><div class="rep-card-title">Partida</div><div class="rep-card-desc">Valores cronometrados na saída</div>';
  const estiloPartida = an.isMedley || an.estilo === 'ESTILOS' ? 'MARIPOSA' : an.estilo;
  const camposPartida = familiaPartida(estiloPartida);
  camposPartida.forEach(function (c) {
    const v = m.partida[c.id];
    const vPB = mPB ? mPB.partida[c.id] : null;
    html += '<div class="rep-row"><div class="rep-row-label">' + c.label + '</div>' +
      '<div class="rep-row-value">' + (v !== null && v !== undefined ? v + ' ' + c.unidade : '—') +
      (vPB !== null && vPB !== undefined ? '<span class="rep-row-pb">PB: ' + vPB + '</span>' : '') + '</div></div>';
    // duração de voo é calculada (não inserida) e aparece logo após o campo de entrada das mãos
    if (c.id === 'tempo_entrada_maos_s') {
      const voo = m.partida.duracao_voo_s, vooPB = mPB ? mPB.partida.duracao_voo_s : null;
      html += '<div class="rep-row"><div class="rep-row-label">Duração de voo</div>' +
        '<div class="rep-row-value">' + (voo !== null && voo !== undefined ? fmtNum(voo, 2, ' s') : '—') +
        (vooPB !== null && vooPB !== undefined ? '<span class="rep-row-pb">PB: ' + fmtNum(vooPB, 2, ' s') + '</span>' : '') + '</div></div>';
    }
  });
  html += '</div>';

  if (m.seg50) {
    html += '<div class="rep-card"><div class="rep-card-title">Segmentos da prova (50m)</div><div class="rep-card-desc">Divisão em três fases</div>' +
      '<div class="rep-row"><div class="rep-row-label">Até aos 15m</div><div class="rep-row-value">' + fmtTempo(m.seg50.ate15m) + '</div></div>' +
      '<div class="rep-row"><div class="rep-row-label">Nado (15m–45m)</div><div class="rep-row-value">' + fmtTempo(m.seg50.nadoCentral) + '</div></div>' +
      '<div class="rep-row"><div class="rep-row-label">Chegada (últimos 5m)</div><div class="rep-row-value">' + fmtTempo(m.seg50.chegada) + '</div></div></div>';
  } else if (m.tempoChegada5m !== null) {
    const chegadaPB = mPB ? mPB.tempoChegada5m : null;
    html += '<div class="rep-card"><div class="rep-card-title">Chegada</div><div class="rep-card-desc">Tempo dos últimos 5m antes de tocar na parede</div>' +
      '<div class="rep-row"><div class="rep-row-label">Últimos 5m</div><div class="rep-row-value">' + fmtTempo(m.tempoChegada5m) +
      (chegadaPB !== null ? '<span class="rep-row-pb">PB: ' + fmtTempo(chegadaPB) + '</span>' : '') + '</div></div></div>';
  }

  if (m.mediaParcial50 !== null || m.mediaParcial100 !== null) {
    html += '<div class="rep-card"><div class="rep-card-title">Médias de parciais</div><div class="rep-card-desc">Referência para regularidade de ritmo</div>';
    if (m.mediaParcial50 !== null) html += '<div class="rep-row"><div class="rep-row-label">Média parcial 50m</div><div class="rep-row-value">' + fmtTempo(m.mediaParcial50) + '</div></div>';
    if (m.mediaParcial100 !== null) html += '<div class="rep-row"><div class="rep-row-label">Média parcial 100m</div><div class="rep-row-value">' + fmtTempo(m.mediaParcial100) + '</div></div>';
    html += '</div>';
  }

  return html;
}

function chartCard(id, title, desc) {
  return '<div class="rep-card"><div class="rep-card-title">' + title + '</div><div class="rep-card-desc">' + desc + '</div><canvas id="' + id + '"></canvas></div>';
}

/* ---------- ECRÃ: relatório comparativo (2 análises, mesmo ou diferente nadador) ---------- */

function renderCompararRelatorio() {
  const sel = state.comparacao.selecionadas;
  if (sel.length !== 2) return '<div class="empty-state"><p>Seleção inválida.</p></div>';

  const item1 = { swimmer: getSwimmer(sel[0].swimmerId), analise: encontrarAnalise(sel[0].swimmerId, sel[0].analiseId) };
  const item2 = { swimmer: getSwimmer(sel[1].swimmerId), analise: encontrarAnalise(sel[1].swimmerId, sel[1].analiseId) };
  if (!item1.analise || !item2.analise) return '<div class="empty-state"><p>Análise não encontrada.</p></div>';

  const m1 = calcularMetricas(item1.analise.estilo, item1.analise.distancia, item1.analise.dadosBrutos, item1.analise.tamanhoPiscina);
  const m2 = calcularMetricas(item2.analise.estilo, item2.analise.distancia, item2.analise.dadosBrutos, item2.analise.tamanhoPiscina);
  const maisRapida = m1.tempoTotal <= m2.tempoTotal ? 1 : 2;

  const nome1 = item1.swimmer.nome, nome2 = item2.swimmer.nome;
  const mesmoNadador = item1.swimmer.id === item2.swimmer.id;
  const label1 = mesmoNadador ? (nome1 + ' · ' + fmtData(item1.analise.dataProva || item1.analise.criadoEm)) : nome1;
  const label2 = mesmoNadador ? (nome2 + ' · ' + fmtData(item2.analise.dataProva || item2.analise.criadoEm)) : nome2;
  const provaLabel = ESTILOS_LABEL(item1.analise.estilo) + ' ' + item1.analise.distancia + 'm · piscina ' + (item1.analise.tamanhoPiscina || 50) + 'm';

  let html = '<div class="rep-header">';
  html += '<div class="rep-prova-label" style="text-align:center;margin-bottom:12px">' + escapeHtml(provaLabel) + '</div>';
  html += '<div class="rep-vs-header">';
  html += '<div class="rep-vs-side"><div class="rep-vs-name">' + escapeHtml(label1) + '</div><div class="rep-vs-time' + (maisRapida===1?' is-winner':'') + '">' + fmtTempo(m1.tempoTotal) + '</div></div>';
  html += '<div class="rep-vs-sep">VS</div>';
  html += '<div class="rep-vs-side"><div class="rep-vs-name">' + escapeHtml(label2) + '</div><div class="rep-vs-time' + (maisRapida===2?' is-winner':'') + '">' + fmtTempo(m2.tempoTotal) + '</div></div>';
  html += '</div>';
  const diff = Math.abs(m1.tempoTotal - m2.tempoTotal);
  html += '<div class="rep-diff">Diferença: ' + fmtTempo(diff) + '</div>';
  html += '</div>';

  html += '<div id="chartsContainer">' + renderGraficos(item1.analise, m1, m2) + '</div>';

  html += '<button class="rep-btn rep-btn-ghost" onclick="state.comparacao.selecionadas=[];nav(\'compararSelecao\')">Nova comparação</button>';

  return html;
}

function afterRenderCompararRelatorio() {
  const sel = state.comparacao.selecionadas;
  if (sel.length !== 2) return;

  const item1 = { swimmer: getSwimmer(sel[0].swimmerId), analise: encontrarAnalise(sel[0].swimmerId, sel[0].analiseId) };
  const item2 = { swimmer: getSwimmer(sel[1].swimmerId), analise: encontrarAnalise(sel[1].swimmerId, sel[1].analiseId) };
  if (!item1.analise || !item2.analise) return;

  const m = calcularMetricas(item1.analise.estilo, item1.analise.distancia, item1.analise.dadosBrutos, item1.analise.tamanhoPiscina);
  const mPB = calcularMetricas(item2.analise.estilo, item2.analise.distancia, item2.analise.dadosBrutos, item2.analise.tamanhoPiscina);

  const mesmoNadador = item1.swimmer.id === item2.swimmer.id;
  const labelSerie1 = mesmoNadador ? fmtData(item1.analise.dataProva || item1.analise.criadoEm) : item1.swimmer.nome;
  const labelSerie2 = mesmoNadador ? fmtData(item2.analise.dataProva || item2.analise.criadoEm) : item2.swimmer.nome;

  desenharGraficosComLabels(item1.analise, m, mPB, labelSerie1, labelSerie2);
}

function afterRenderRelatorio() {
  const sw = getSwimmer(state.swimmerId);
  const an = sw.analises.find(function (a) { return a.id === state.verAnaliseId; });
  if (!an) return;
  const m = calcularMetricas(an.estilo, an.distancia, an.dadosBrutos, an.tamanhoPiscina);
  const melhor = getMelhorAnalise(sw, an.estilo, an.distancia, an.id, an.tamanhoPiscina);
  const mPB = (state.compararPB && melhor) ? calcularMetricas(melhor.estilo, melhor.distancia, melhor.dadosBrutos, melhor.tamanhoPiscina) : null;
  desenharGraficosComLabels(an, m, mPB, 'Atual', 'Melhor registo');
}

// Desenha todos os gráficos do relatório (cards já criados por renderGraficos)
// a partir de duas séries de métricas, com os nomes de legenda indicados.
// Reutilizada tanto pelo relatório normal (Atual vs Melhor registo) como
// pelo relatório comparativo (nadador/data vs nadador/data).
function desenharGraficosComLabels(an, m, mPB, labelSerie1, labelSerie2) {
  chartInstances.forEach(function (c) { c.destroy(); });
  chartInstances = [];

  // O relatório usa sempre uma paleta fixa clara (azul da app + laranja do
  // Swimmin), independente do tema dark/light geral da aplicação — para que
  // o relatório funcione como um "cartão" pronto a exportar/partilhar.
  const colAccent = '#0096c7';   // azul principal (1ª série / análise única)
  const colGold = '#f4762a';     // laranja (2ª série / comparação ou PB)
  const colTxt2 = '#5b6b78';
  const colBorder = '#e3e7eb';
  Chart.defaults.color = colTxt2;
  Chart.defaults.font.size = 11;
  Chart.defaults.borderColor = colBorder;
  if (window.ChartDataLabels) { try { Chart.register(window.ChartDataLabels); } catch (e) {} }

  function mkLineBar(canvasId, labels, dataset, datasetPB, type, unidade, opts) {
    opts = opts || {};
    const formatador = opts.formatador || fmtEixo;
    const beginAtZero = opts.beginAtZero !== undefined ? opts.beginAtZero : false;
    // Por defeito mostramos sempre os valores em cima dos pontos/barras —
    // é a marca visual do estilo "cartão de Instagram" que queremos.
    const mostrarValores = opts.mostrarValores !== false;
    const el = document.getElementById(canvasId);
    if (!el) return;
    const datasets = [{
      label: labelSerie1, data: dataset,
      backgroundColor: type === 'bar' ? colAccent : 'rgba(0,150,199,0.10)',
      borderColor: colAccent, borderWidth: type === 'bar' ? 0 : 3,
      borderRadius: type === 'bar' ? { topLeft: 10, topRight: 10, bottomLeft: 0, bottomRight: 0 } : 0, borderSkipped: 'bottom',
      tension: 0.35, pointRadius: type === 'line' ? 4 : 0, pointBackgroundColor: colAccent,
      pointBorderColor: '#ffffff', pointBorderWidth: 2, fill: type === 'line',
      barPercentage: 0.62, categoryPercentage: 0.8,
    }];
    if (datasetPB) {
      datasets.push({
        label: labelSerie2, data: datasetPB,
        backgroundColor: type === 'bar' ? colGold : 'rgba(244,118,42,0.10)',
        borderColor: colGold, borderWidth: type === 'bar' ? 0 : 3,
        borderRadius: type === 'bar' ? { topLeft: 10, topRight: 10, bottomLeft: 0, bottomRight: 0 } : 0, borderSkipped: 'bottom',
        tension: 0.35, pointRadius: type === 'line' ? 4 : 0, pointBackgroundColor: colGold,
        pointBorderColor: '#ffffff', pointBorderWidth: 2, fill: type === 'line',
        barPercentage: 0.62, categoryPercentage: 0.8,
      });
    }
    const plugins = {
      legend: { display: !!datasetPB, position: 'bottom', labels: { boxWidth: 10, boxHeight: 10, padding: 14, font: { size: 11, weight: '700' }, color: '#14202b' } },
      tooltip: { callbacks: { label: function (ctx) {
        const v = ctx.parsed.y;
        return ctx.dataset.label + ': ' + formatador(v) + (unidade || '');
      } } },
    };
    if (mostrarValores && window.ChartDataLabels) {
      plugins.datalabels = {
        color: function (ctx) { return ctx.dataset.borderColor || colAccent; },
        anchor: type === 'line' ? 'end' : 'end',
        align: type === 'line' ? 'top' : 'end',
        offset: type === 'bar' ? 4 : 6,
        font: { size: 12, weight: '800' },
        formatter: function (v) { return v === null || v === undefined ? '' : formatador(v) + (unidade || ''); },
      };
    }
    el.style.height = '230px';
    el.style.display = 'block';
    const c = new Chart(el, {
      type: type, data: { labels: labels, datasets: datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 18 } },
        plugins: plugins,
        scales: {
          y: { beginAtZero: beginAtZero, grid: { color: '#eef1f4' }, ticks: { color: '#93a1ac', callback: function (v) { return formatador(v) + (unidade || ''); } } },
          x: { grid: { display: false }, ticks: { color: '#5b6b78', font: { size: 10, weight: '700' } } },
        },
      },
    });
    chartInstances.push(c);
  }

  const labelsTroço = m.porTroço.map(function (t) { return t.label; });
  mkLineBar('chart_vel', labelsTroço, m.porTroço.map(function(t){return t.vel?+t.vel.toFixed(2):null;}), mPB ? mPB.porTroço.map(function(t){return t.vel?+t.vel.toFixed(2):null;}) : null, 'line', '', { formatador: fmtEixo1 });
  mkLineBar('chart_freq', labelsTroço, m.porTroço.map(function(t){return t.freq?+t.freq.toFixed(1):null;}), mPB ? mPB.porTroço.map(function(t){return t.freq?+t.freq.toFixed(1):null;}) : null, 'line', '', { formatador: fmtEixo1 });
  mkLineBar('chart_dpc', labelsTroço, m.porTroço.map(function(t){return t.distPorCiclo?+t.distPorCiclo.toFixed(2):null;}), mPB ? mPB.porTroço.map(function(t){return t.distPorCiclo?+t.distPorCiclo.toFixed(2):null;}) : null, 'bar', 'm', { formatador: fmtEixo1, mostrarValores: true });

  if (m.porViragem.length) {
    const labelsV = m.porViragem.map(function (v) { return v.emMetros + 'm'; });
    mkLineBar('chart_viragem', labelsV, m.porViragem.map(function(v){return v.tTotal?+v.tTotal.toFixed(2):null;}), mPB ? mPB.porViragem.map(function(v){return v.tTotal?+v.tTotal.toFixed(2):null;}) : null, 'bar', 's', { formatador: fmtEixo1, beginAtZero: true });
    mkLineBar('chart_saida', labelsV, m.porViragem.map(function(v){return v.distSaida;}), mPB ? mPB.porViragem.map(function(v){return v.distSaida;}) : null, 'bar', 'm', { beginAtZero: true });
  }

  const labelsB50 = m.porBloco50.map(function (b) { return b.label; });
  mkLineBar('chart_ciclos50', labelsB50, m.porBloco50.map(function(b){return b.ciclos;}), mPB ? mPB.porBloco50.map(function(b){return b.ciclos;}) : null, 'bar', '', { formatador: fmtEixoInt, beginAtZero: true });

  if (m.ondulacoes.length) {
    mkLineBar('chart_ond', m.ondulacoes.map(function(o){return o.label;}), m.ondulacoes.map(function(o){return o.valor;}),
      mPB ? mPB.ondulacoes.map(function(o){return o.valor;}) : null, 'bar', '', { formatador: fmtEixoInt, beginAtZero: true });
  }

  if (m.respiracoes.length) {
    mkLineBar('chart_resp', m.respiracoes.map(function(r){return r.label;}), m.respiracoes.map(function(r){return r.valor;}),
      mPB ? mPB.respiracoes.map(function(r){return r.valor;}) : null, 'bar', '', { formatador: fmtEixoInt, beginAtZero: true });
  }

  mkLineBar('chart_parc50', m.parciais50.map(function(p){return p.metros+'m';}), m.parciais50.map(function(p){return p.parcial?+p.parcial.toFixed(2):null;}),
    mPB ? mPB.parciais50.map(function(p){return p.parcial?+p.parcial.toFixed(2):null;}) : null, 'bar', 's', { beginAtZero: true });
  if (m.parciais100.length > 1) {
    mkLineBar('chart_parc100', m.parciais100.map(function(p){return p.metros+'m';}), m.parciais100.map(function(p){return p.parcial?+p.parcial.toFixed(2):null;}),
      mPB ? mPB.parciais100.map(function(p){return p.parcial?+p.parcial.toFixed(2):null;}) : null, 'bar', 's', { beginAtZero: true });
  }
}


function exportarRelatorio() {
  const sw = getSwimmer(state.swimmerId);
  const an = sw.analises.find(function (a) { return a.id === state.verAnaliseId; });
  toast('A gerar imagem...');
  const container = document.getElementById('app');
  html2canvas(container, { backgroundColor: '#07111f', scale: 2 }).then(function (canvas) {
    const link = document.createElement('a');
    link.download = 'relatorio_' + (sw ? sw.nome.replace(/\s+/g,'_') : 'nadador') + '_' + an.estilo + an.distancia + '_' + fmtData(an.dataProva || an.criadoEm).replace(/\//g,'-') + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }).catch(function () { toast('Não foi possível exportar. Tenta novamente.'); });
}

/* ============================================================
   TEMA — claro/escuro, persistido em localStorage
   ============================================================ */

const THEME_KEY = 'swimlab_theme_v1';

function aplicarTema(modo) {
  const isLight = modo === 'light';
  document.documentElement.classList.toggle('light-mode', isLight);
  const moon = document.getElementById('themeIconMoon');
  const sun = document.getElementById('themeIconSun');
  if (moon && sun) {
    moon.style.display = isLight ? 'none' : 'block';
    sun.style.display = isLight ? 'block' : 'none';
  }
}

function toggleTema() {
  const atual = localStorage.getItem(THEME_KEY) === 'light' ? 'light' : 'dark';
  const novo = atual === 'light' ? 'dark' : 'light';
  localStorage.setItem(THEME_KEY, novo);
  aplicarTema(novo);
  // se houver gráficos visíveis (ecrã de relatório), recriá-los com as cores do novo tema
  if (state.screen === 'relatorio') afterRenderRelatorio();
}

function initTema() {
  const guardado = localStorage.getItem(THEME_KEY);
  aplicarTema(guardado === 'light' ? 'light' : 'dark');
}

/* ---------- INICIALIZAÇÃO ---------- */
initTema();
nav('lista');
